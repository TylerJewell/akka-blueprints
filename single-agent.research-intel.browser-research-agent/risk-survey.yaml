schema_version: 1
sample_id: reddit-search

# ---- Purpose ----
purpose:
  primary_function: reddit-research-extraction
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: informational-output
  user_type: researcher-or-analyst

# ---- Data ----
data:
  inputs:
    - submitted-research-topics
    - scraped-reddit-post-content
    - scraped-reddit-comment-content
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    publicly-posted-user-content: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  browser_accesses_third_party_content: true

# ---- Decisions ----
decisions:
  authority_level: informational-only
  decision_subject: research-topic-query
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_output_before_action: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Failure ----
failure:
  blast_radius: single-research-session
  failure_modes:
    - hallucinated-post-summary
    - off-domain-navigation
    - runaway-page-visit-loop
    - content-injection-via-scraped-page
    - budget-overrun
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - headless-browser-navigation
    - headless-browser-page-read
  rate_limit_per_job: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  browser_runtime: TO_BE_COMPLETED_BY_DEPLOYER   # playwright | e2b | modal | robocorp | mock

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  terms-of-service-compliance-for-scraped-site: TO_BE_COMPLETED_BY_DEPLOYER
  content-license-review-completed: TO_BE_COMPLETED_BY_DEPLOYER

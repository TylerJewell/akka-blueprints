schema_version: 1
sample_id: job-posting-eeo

# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

# ---- Purpose ----
purpose:
  primary_function: job-posting-generation
  sector: hr-recruiting
  decisions_surface: draft-only
  user_type: recruiter

# ---- Data ----
data:
  inputs:
    - company-name
    - role-title
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: draft-only
  decision_subject: prospective-job-applicants
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  affects_protected_class: true
  employment_decision: false

# ---- Failure ----
failure:
  blast_radius: single-customer
  failure_modes:
    - discriminatory-language
    - encoded-protected-class-preference
    - missing-eeo-statement
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: monthly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - seeded-market-research
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  content_generation: true
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the team-poems-multi-agent Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: team-poems-multi-agent-sample
  display_name: Team Poems Multi-Agent (Akka Sample)
  one_line_description: >
    A poetry-director agent assigns stanzas to a shared board; poet agents claim
    assignments on their own, draft verse under a content guardrail, pass a quality
    gate, and coordinate with each other when they need to match tone or meter.
  scenario: |
    A user (or simulator) submits a writing prompt. A PoetryDirector agent
    decomposes it into a dependency-ordered list of stanza assignments, and a
    DirectionWorkflow writes one StanzaEntity per assignment onto a shared board
    (status OPEN). A fixed roster of poet agents — each a durable PoetWorkflow —
    polls the board, claims an eligible OPEN stanza atomically, runs the PoetAgent
    to produce a DraftVerse, and runs the draft through a deterministic quality
    gate. A passing draft marks the stanza DONE; a failing one retries then blocks.
    When a poet needs another poet's output for continuity it raises a coordination
    request, which blocks the stanza and lands a message in the target poet's
    mailbox; a reply unblocks it. An editor can pause the whole team at any time.
    There is no external publishing and no real content delivery — the verse
    workspace, the quality gate, and the prompt intake are all modelled in-process
    with Akka primitives. The scenario is the canonical "team-shared-list" pattern
    in the content-editorial domain.

  primary_regulations: []  # toy creative-writing sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - real publishing or content delivery
    - access to external content repositories
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric processing
    - frontier-scale training compute


schema_version: 1
sample_id: sdlc-technical-designer

# ---- Purpose ----
purpose:
  primary_function: technical-architecture-design
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: software-engineer-or-architect

# ---- Data ----
data:
  inputs:
    - submitted-feature-descriptions
    - project-context-profiles
    - technical-constraint-lists
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    source-code-snippets: TO_BE_COMPLETED_BY_DEPLOYER
    internal-architecture-documents: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: software-component-architecture
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_proposal_before_implementation: true

# ---- Failure ----
failure:
  blast_radius: single-feature-scope
  failure_modes:
    - hallucinated-component
    - missing-decision-rationale
    - incompatible-pattern-selection
    - incomplete-data-model
    - non-actionable-api-surface
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: software-engineer-or-architect
  reviewer_must_approve_before_implementation: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_design: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  feature-description-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  ip-or-trade-secret-classification-of-inputs: TO_BE_COMPLETED_BY_DEPLOYER

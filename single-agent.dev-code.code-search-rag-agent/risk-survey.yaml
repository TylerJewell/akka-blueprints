schema_version: 1
sample_id: code-search-rag-agent

# ---- Purpose ----
purpose:
  primary_function: code-repository-question-answering
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: informational-only
  user_type: software-developer

# ---- Data ----
data:
  inputs:
    - natural-language-code-questions
    - retrieved-code-chunks
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    source-code: true
    secrets-in-source: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  secrets_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: informational-only
  decision_subject: code-navigation-answer
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  developer_reads_every_answer_before_acting: true

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - hallucinated-file-path
    - stale-index
    - secret-leakage-via-llm
    - ungrounded-citation
    - missing-relevant-chunk
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: software-developer
  developer_must_verify_file-paths_before_acting: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  source-code-ip-ownership-cleared: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  repository-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

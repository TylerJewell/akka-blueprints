schema_version: 1
sample_id: campaign-optimizer-loop

# ---- Purpose ----
purpose:
  primary_function: marketing-campaign-automation
  sector: sales-marketing
  decisions_surface: assisted-action
  user_type: marketing-professional

# ---- Data ----
data:
  inputs:
    - campaign-brief-free-text
    - crm-audience-segment-fixtures
    - brand-voice-fixtures
    - channel-endpoint-fixtures
    - kpi-performance-fixtures
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-human-approval
  decision_subject: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: single-campaign-scope
  failure_modes:
    - non-compliant-copy-reaches-channel
    - campaign-launched-without-approval
    - audience-selection-too-broad
    - kpi-monitor-misses-threshold-regression
    - approval-timeout-stalls-pipeline
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: continuous
  operator_pause_control: false

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - simulated-copy-generation
    - simulated-audience-segmentation
    - simulated-asset-publishing
    - simulated-kpi-read
    - marketing-platform-api
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

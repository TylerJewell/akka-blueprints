schema_version: 1
sample_id: deal-strategy-analyst

# ---- Purpose ----
purpose:
  primary_function: sales-deal-strategy-recommendation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: sales-representative-or-account-executive

# ---- Data ----
data:
  inputs:
    - submitted-deal-context-bundles
    - stakeholder-signal-lists
    - crm-snapshot-text
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    nda-restricted-company-names: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: sales-deal-next-steps
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_recommendation_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-deal
  failure_modes:
    - hallucinated-stakeholder
    - missed-concern
    - pii-leakage-via-llm
    - urgency-miscalibration
    - actionless-recommendation
    - competitor-name-leakage
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: sales-representative-or-account-executive
  reviewer_must_read_recommendation_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_deal: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  deal-context-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

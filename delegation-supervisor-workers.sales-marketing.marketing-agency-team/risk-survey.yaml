# Risk Survey for the marketing-agency-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: marketing-agency-team-sample
  display_name: Marketing Agency Team (Akka Sample)
  one_line_description: >
    A campaign director delegates website launch planning to one specialist and marketing
    strategy to another in parallel, then synthesises a brand-safe marketing plan.
  scenario: |
    A user (or simulator) submits a campaign brief with a name and objective.
    A CampaignDirector decomposes it into a launch scope for the WebsiteLauncher and a
    strategy brief for the StrategyAdvisor. Both agents run in parallel: WebsiteLauncher
    returns a LaunchBrief (checklist + channel recommendation) and StrategyAdvisor returns
    a StrategyFramework (positioning + messaging pillars). The CampaignDirector merges both
    into a SynthesisedPlan. A brand-safety guardrail vets the plan before it is surfaced;
    a periodic eval sampler scores the synthesis decision. There is no real external channel
    integration in this sample — the tools are modelled in-process. The scenario is the
    canonical "delegation-supervisor-workers" pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


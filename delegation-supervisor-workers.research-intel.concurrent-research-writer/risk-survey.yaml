# Risk Survey for the concurrent-research-writer Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: concurrent-research-writer-sample
  display_name: Concurrent Research Writer (Akka Sample)
  one_line_description: >
    A coordinator delegates source gathering to a SourceResearcher and narrative
    drafting to a DraftWriter in parallel, then assembles one polished written report.
  scenario: |
    A user (or simulator) submits a writing topic. A ReportCoordinator decomposes it into
    a source query and a narrative brief. A SourceResearcher gathers reference material
    and a DraftWriter produces a narrative section, running in parallel. The Coordinator
    merges both into an AssembledReport. An output guardrail vets the report before it is
    surfaced; a periodic quality sampler scores the assembly decision. There is no real
    external search target in this sample — the lookup tools are modelled in-process. The
    scenario is the canonical "delegation-supervisor-workers" pattern in the research-intel
    domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


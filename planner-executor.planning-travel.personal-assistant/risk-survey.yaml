schema_version: 1
sample_id: line-personal-assistant

# ---- Purpose ----
purpose:
  primary_function: personal-scheduling-and-communication-assistant
  sector: personal-productivity
  decisions_surface: assisted-action
  user_type: end-user-consumer

# ---- Data ----
data:
  inputs:
    - free-text-natural-language-messages
    - google-calendar-event-metadata
    - gmail-recipient-and-subject-data
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-confirmation
  decision_subject: outbound-calendar-and-email-actions
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: single-user-account-scope
  failure_modes:
    - email-sent-to-unintended-recipient
    - calendar-event-created-with-wrong-time
    - confirmation-gate-bypassed
    - stale-confirmation-not-expired
    - planner-misparses-ambiguous-intent
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: end-user-as-confirmer
  audit_frequency: per-conversation
  operator_pause_control: false

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - google-calendar-api
    - gmail-send-api
    - line-messaging-api-reply
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

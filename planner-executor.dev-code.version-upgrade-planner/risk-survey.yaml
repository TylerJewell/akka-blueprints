schema_version: 1
sample_id: version-upgrade-planner

# ---- Purpose ----
purpose:
  primary_function: software-version-upgrade-automation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: assisted-action
  user_type: platform-engineer

# ---- Data ----
data:
  inputs:
    - source-and-target-version-strings
    - airflow-environment-configuration-fixtures
    - migration-script-definitions
    - test-suite-results
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-human-approval
  decision_subject: apache-airflow-environment-migration-phases
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: airflow-environment-scope
  failure_modes:
    - destructive-migration-applied-without-approval
    - test-regression-not-caught-before-next-phase
    - planner-loops-without-progress
    - approval-timeout-leaving-environment-inconsistent
    - stuck-job-after-partial-migration
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: per-upgrade-phase
  operator_pause_control: true

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - simulated-compatibility-check
    - simulated-test-execution
    - simulated-migration-application
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

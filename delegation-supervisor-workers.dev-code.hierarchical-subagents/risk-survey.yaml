# Risk Survey for the hierarchical-subagents Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: hierarchical-subagents-sample
  display_name: Hierarchical Sub-Agent Delegation (Akka Sample)
  one_line_description: >
    A task orchestrator validates each specialist's input, delegates design work to an
    ArchitectSpecialist and implementation outlining to an ImplementationSpecialist in
    parallel, then synthesises one structured solution summary.
  scenario: |
    A user (or simulator) submits a coding task description. A TaskOrchestrator decomposes
    it into a designQuery and an implementationQuery. Before invoking either specialist,
    the workflow validates the plan schema. An ArchitectSpecialist produces a DesignProposal
    and an ImplementationSpecialist produces an ImplementationOutline, running in parallel.
    The orchestrator merges both into a SynthesisedSolution. A ContributionEvaluator scores
    each specialist's output independently. There are no external code-execution targets in
    this sample — the specialist tools are modelled in-process. The scenario is the
    "delegation-supervisor-workers" pattern with hierarchical sub-agent isolation in the
    dev-code domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


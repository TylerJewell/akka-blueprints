schema_version: 1
sample_id: durable-workflow-backed-agent

# ---- Purpose ----
purpose:
  primary_function: ops-incident-remediation-pipeline
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-action
  user_type: ops-engineer-or-sre

# ---- Data ----
data:
  inputs:
    - alertId
    - serviceId
    - in-process-metric-and-log-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: automated-action
  decision_subject: ops-incident-remediation
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  ops_team_reviews_durability_report_before_escalation: true

# ---- Failure ----
failure:
  blast_radius: single-service
  failure_modes:
    - budget-cap-exceeded
    - misdiagnosed-root-cause
    - failed-action-confirmation
    - false-positive-resolution
    - step-timeout
    - workflow-failover
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reader_role: ops-engineer-or-sre
  ops_team_monitors_durability_dashboard: true
  audit_frequency: hourly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_incident: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  metric-and-log-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

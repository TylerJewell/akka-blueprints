schema_version: 1
sample_id: core-semantic-router

# ---- Purpose ----
purpose:
  primary_function: employee-self-service
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: employee-answer
  user_type: employee

# ---- Data ----
data:
  inputs:
    - inbound-employee-hr-and-finance-queries
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    employee-financial-records: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous-with-guardrail
  decision_subject: employee
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: no-action-taken-answers-only
  routing_decisions_made_by_ai: true
  answer_decisions_made_by_ai: true

# ---- Failure ----
failure:
  blast_radius: single-employee
  failure_modes:
    - wrong-domain-routing
    - out-of-scope-answer
    - pii-leakage-via-llm
    - unauthorized-domain-access
    - low-confidence-route-reaching-specialist
    - incorrect-policy-citation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: hr-operations-manager
  reviewer_must_approve_every_outgoing: false
  reviewer_must_unblock_guardrail_failures: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  employee_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER

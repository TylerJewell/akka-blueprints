# Risk Survey for the meeting-assistant Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: meeting-assistant-sample
  display_name: Meeting Assistant Pipeline (Akka Sample)
  one_line_description: >
    A sequential pipeline that redacts personal data from meeting notes, extracts
    action items with an agent, and fans them out to Trello cards and a Slack
    message.
  scenario: |
    A user (or simulator) submits raw meeting notes. PipelineWorkflow first runs
    a deterministic PII redactor over the text, then asks ActionExtractorAgent to
    produce a summary and a list of action items. For each action item, a
    before-tool-call guardrail vets the target Trello board and Slack channel
    against an allowlist; allowed writes create a Trello card and post a Slack
    summary. By default the Trello and Slack targets are in-process simulators;
    real services are used when their credentials are present.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


# Risk Survey for the supervisor-subagents Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: supervisor-subagents-sample
  display_name: Supervisor with Subagents (Akka Sample)
  one_line_description: >
    A supervisor agent classifies an incoming task and delegates subtasks to specialized
    subagents in parallel, then assembles their outputs into a final result.
  scenario: |
    A user (or simulator) submits a task description. A TaskSupervisor classifies it and
    produces a RoutingPlan directing a DataSubagent and a SummarySubagent. A routing guardrail
    checks the plan before any subagent is invoked. Both subagents run in parallel; the
    supervisor assembles their outputs into a TaskResult. A periodic eval sampler scores the
    routing decision for accuracy. There are no external data sources in this sample — subagent
    tools are modelled in-process. The scenario is the canonical "delegation-supervisor-workers"
    pattern in the general domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


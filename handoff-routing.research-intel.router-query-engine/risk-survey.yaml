schema_version: 1
sample_id: router-query-engine

# ---- Purpose ----
purpose:
  primary_function: research-intelligence
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: research-answer
  user_type: knowledge-worker

# ---- Data ----
data:
  inputs:
    - inbound-research-questions
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    proprietary-corpus: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  corpus_access_controlled: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: draft-only
  decision_subject: knowledge-worker
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  routing_decisions_made_by_ai: true
  answer_decisions_made_by_ai: true

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - wrong-engine-routing
    - fabricated-source-references
    - incorrect-aggregation-result
    - missed-relevant-documents
    - hallucinated-statistical-values
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: research-team-lead
  reviewer_must_approve_every_outgoing: false
  reviewer_must_unblock_guardrail_failures: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  corpus_licensing_reviewed: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER

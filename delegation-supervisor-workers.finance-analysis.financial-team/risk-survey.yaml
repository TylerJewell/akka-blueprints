# Risk Survey for the financial-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: financial-assistant-sample
  display_name: Financial Assistant — Multi-Agent (Akka Sample)
  one_line_description: >
    A coordinator delegates market research to a MarketResearcher, portfolio planning to a
    PortfolioPlanner, and report drafting to a ReportDrafter in parallel, then synthesises
    one consolidated financial report.
  scenario: |
    A user (or simulator) submits a financial query. A FinancialCoordinator decomposes it
    into three parallel work assignments: a market-data query, a risk/return planning
    question, and a narrative framing. MarketResearcher, PortfolioPlanner, and ReportDrafter
    run concurrently. The Coordinator merges all three into a ConsolidatedReport. A
    finance-sector sanitizer scrubs regulated phrases; an output guardrail performs a final
    compliance check before the report is published. A periodic eval sampler scores synthesis
    quality. Financial data tools are modelled in-process; no real brokerage or market-data
    API is required to run this sample. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the finance-analysis domain.

  primary_regulations: []  # community sample; deployers should add MiFID II, SEC IA rules,
                           # FINRA guidance, or jurisdiction-appropriate frameworks here.

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


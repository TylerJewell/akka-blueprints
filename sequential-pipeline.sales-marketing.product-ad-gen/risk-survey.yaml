schema_version: 1
sample_id: product-catalog-ad-generation

# ---- Purpose ----
purpose:
  primary_function: product-ad-generation-pipeline
  sector: sales-marketing
  decisions_surface: recommend-only
  user_type: marketing-team-member

# ---- Data ----
data:
  inputs:
    - product-name-or-catalog-entry
    - in-process-product-catalog
    - in-process-brand-policy-files
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: product-advertisement-copy
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  marketing_team_reviews_every_ad_before_placement: true

# ---- Failure ----
failure:
  blast_radius: single-ad-job
  failure_modes:
    - prohibited-word-in-copy
    - missing-brand-element
    - cta-slug-invalid
    - placement-over-char-limit
    - enrichment-missing-attribute
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: marketing-team-member
  reviewer_must_approve_ad_before_placement: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_job: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  product-catalog-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  advertising-standards-compliance-reviewed: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the medical-triage-delegation Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: medical-triage-delegation-sample
  display_name: Medical Agent Delegation (Akka Sample)
  one_line_description: >
    A triage coordinator delegates an incoming medical question to three specialist agents
    in parallel, applies a safety guardrail, and synthesises a patient-safe response.
  scenario: |
    A user (or simulator) submits a medical question. A TriageCoordinator classifies the
    question and decomposes it into three specialist queries. A SymptomsSpecialist assesses
    symptoms, a MedicationsSpecialist checks drug interactions and contraindications, and a
    CarePathwaySpecialist recommends the appropriate care pathway — all running in parallel.
    The TriageCoordinator merges the three outputs into a SynthesisedResponse. A
    before-agent-response safety guardrail vets the response for diagnosis claims before it
    is surfaced. A human-on-the-loop event flags every successful response for clinical
    compliance review. A special-category sanitizer strips PII and GDPR Article 9 health
    markers before any agent receives the question. There is no real external clinical
    database in this sample — specialist knowledge is modelled in-process. The scenario
    is the canonical "delegation-supervisor-workers" pattern in the healthcare domain.

  primary_regulations: []  # deployer must supply jurisdiction-specific anchors (GDPR, MDR, HIPAA, etc.)

  explicitly_not_applicable:
    - autonomous diagnostic decision
    - prescribing authority (no medication orders)
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


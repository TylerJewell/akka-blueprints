schema_version: 1
sample_id: multi-tool-agent

# ---- Purpose ----
purpose:
  primary_function: multi-tool-query-answering
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: answer-only
  user_type: general-end-user

# ---- Data ----
data:
  inputs:
    - natural-language-user-requests
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  external_tool_endpoints:
    - weather-api (simulated in baseline)
    - currency-conversion-api (simulated in baseline)
    - unit-conversion-api (simulated in baseline)

# ---- Decisions ----
decisions:
  authority_level: answer-only
  decision_subject: user-query
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_answer_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-session
  failure_modes:
    - wrong-tool-selected
    - invalid-api-input-reaching-external-service
    - hallucinated-tool-result
    - rate-limit-exhaustion-on-external-api
    - iteration-budget-exceeded
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - weather-tool
    - currency-tool
    - unit-tool
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: long-term-memory-agent

# ---- Purpose ----
purpose:
  primary_function: conversational-agent-with-persistent-memory
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: conversational
  user_type: end-user

# ---- Data ----
data:
  inputs:
    - user-messages
    - recalled-memory-entries
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true
  # Note: sanitizer runs between agent output and memory persistence,
  # not between user input and agent call. User messages reach the model
  # in their original form; only extracted memories are sanitized before storage.
  pii_sanitization_stage: post-agent-extraction

# ---- Decisions ----
decisions:
  authority_level: conversational
  decision_subject: conversational-response
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-user
  failure_modes:
    - pii-in-stored-memory
    - stale-memory-recall
    - irrelevant-memory-injection
    - session-context-loss
    - memory-recall-hallucination
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  max_turns_per_session: 50
  memory_recall_top_k: 10

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  memory_retention_policy_documented: TO_BE_COMPLETED_BY_DEPLOYER
  user_right_to_delete_memories: TO_BE_COMPLETED_BY_DEPLOYER

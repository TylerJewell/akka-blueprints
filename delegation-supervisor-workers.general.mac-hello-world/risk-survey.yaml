# Risk Survey for the mac-hello-world Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: mac-hello-world-sample
  display_name: Multi-Agent Hello World (Akka Sample)
  one_line_description: >
    A coordinator delegates greeting-message drafting to a GreetingWriter and follow-up
    action suggestion to an ActionAdvisor in parallel, then composes one response.
  scenario: |
    A user (or simulator) submits a name and context string. A GreetingCoordinator
    decomposes the request into a writing spec and an advisory spec. A GreetingWriter
    drafts a greeting message and an ActionAdvisor suggests a follow-up action, running
    in parallel. The Coordinator merges both into a GreetingResponse. No guardrail or
    eval-event control is layered on; this sample is the minimal delegation-supervisor-workers
    pattern demonstration in the general domain.

  primary_regulations: []  # general-domain baseline sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


# Risk Survey for the debate Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: debate-sample
  display_name: Multi-Perspective Debate (Akka Sample)
  one_line_description: >
    A DebateModerator runs up to five alternating rounds between an Advocate and
    a Critic on a topic, then a Synthesizer returns a balanced conclusion.
  scenario: |
    A user (or simulator) submits a debate topic. The DebateModerator workflow
    runs the Advocate and the Critic across up to five alternating rounds,
    recording each round on a DebateEntity. A Synthesizer then writes a balanced
    conclusion and a list of key arguments; a before-agent-response guardrail
    checks the synthesis for balance and safety before it is persisted. An
    on-decision-eval scores the synthesis for balance and faithfulness to the
    recorded rounds. There is no external system; all argumentation is generated
    in-process. The scenario is the canonical debate-multi-perspective pattern in
    the general domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)


# Risk Survey for the real-estate-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: real-estate-investment-sample
  display_name: Real Estate Investment Multi-Agent (Akka Sample)
  one_line_description: >
    A coordinator delegates market research to a MarketSpecialist and financial modeling
    to a FinanceSpecialist in parallel, then synthesises one investment recommendation
    gated by a sector sanitizer and an output guardrail.
  scenario: |
    A user (or simulator) submits a property deal (address, property type, asking price).
    A sector sanitizer screens the submission for excluded property categories; rejected
    deals receive no agent processing. For passing submissions, a DealCoordinator decomposes
    the deal into a market research query and a financial modeling question. MarketSpecialist
    gathers comparable sales and trend data; FinanceSpecialist models cap rate, NOI,
    cash-on-cash return, and DSCR — both running in parallel. The Coordinator merges both
    outputs into an InvestmentRecommendation gated by an output guardrail. The system
    produces recommend-only output; no binding investment decisions are made. The canonical
    "delegation-supervisor-workers" pattern in the finance-analysis domain.

  primary_regulations: []  # community sample; deployer adds jurisdiction-specific anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - binding financial advice (system is recommend-only)


# Risk Survey for the order-processing Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: order-processing-sample
  display_name: HITL Order Processing (Akka Sample)
  one_line_description: >
    A simulated order pipeline where an LLM validates and prices an order,
    a human gates approval, and a second agent dispatches fulfillment.
  scenario: |
    An operator submits an order with a customer id and line items. ValidationAgent
    reviews the order contents, estimates a total, and flags any risk indicators.
    The review is persisted on an OrderEntity and the OrderWorkflow pauses at an
    approval task. A human reviewer reads the validation summary in the UI and
    either approves or rejects via REST. On approval, FulfillmentAgent invokes a
    simulated dispatch tool, the order transitions to FULFILLED, and a tracking id
    appears. There is no real external fulfillment target; the dispatch step is
    in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text


name: Deploy index.html to Pages

# Publishes ONLY index.html (plus .nojekyll) to GitHub Pages.
# The 416 blueprint folders stay in the repo for browsing on github.com
# but are NOT part of the Pages site.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage Pages artifact (index.html only)
        run: |
          mkdir _site
          cp index.html _site/index.html
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - id: deployment
        uses: actions/deploy-pages@v4

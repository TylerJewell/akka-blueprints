schema_version: 1
sample_id: open-loop-chaser

# ---- Purpose ----
purpose:
  primary_function: ops-automation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: notify-only
  user_type: knowledge-worker-operator

# ---- Data ----
data:
  inputs:
    - meeting-notes
    - internal-messages
    - documents
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    internal-identifiers: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: notify-only
  decision_subject: team-member
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  # Nudges are informational; closing or snoozing an item is always available.

# ---- Failure ----
failure:
  blast_radius: single-team-member
  failure_modes:
    - pii-leakage-via-llm
    - nudge-sent-to-wrong-owner
    - action-item-not-detected
    - stale-item-not-nudged-due-to-missing-owner-confirmation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: team-operator
  owner_must_be_confirmed_before_nudge: true
  operator_can_close_or_snooze_any_item: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    # The simulated sendNudge tool is in-process; replace with real messaging API when deploying.
  rate_limit_per_item: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  employee_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER

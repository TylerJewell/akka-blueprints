# Risk Survey for the user-confirmation-agent Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: user-confirmation-agent-sample
  display_name: User Confirmation Agents (Akka Sample)
  one_line_description: >
    A general-purpose agent pipeline where a planner proposes an action group,
    a human gates confirmation, and an executor runs only confirmed actions.
  scenario: |
    A user submits a request description. PlannerAgent proposes a list of actions
    to fulfil that request. The plan is persisted on a RequestEntity and the
    ConfirmationWorkflow pauses at a confirmation task. A human reviewer reads the
    proposed actions in the UI and either confirms or cancels via REST. On
    confirmation, ExecutorAgent invokes a simulated action-execution tool, the
    request transitions to EXECUTED, and an execution summary appears. There is no
    real external action target; the execute step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


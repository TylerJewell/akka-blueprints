# Risk Survey for the travel-concierge Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: travel-concierge-sample
  display_name: Travel Concierge (Akka Sample)
  one_line_description: >
    A coordinator delegates destination research and fare estimation to specialist agents in
    parallel, then assembles a personalised itinerary and holds for user approval before
    committing any booking.
  scenario: |
    A user (or simulator) submits a trip request with a destination, dates, traveller count,
    and budget. TripCoordinator decomposes the request into a destination query for
    DestinationScout and a fare query for FareAgent, which run in parallel. TripCoordinator
    assembles both outputs into a TripItinerary. The workflow pauses for human-in-the-loop
    confirmation; if the user approves, a before-tool-call guardrail vets the booking
    payload before any external booking action fires. There is no real booking API in this
    sample — booking tools are modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the planning-travel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - biometric identification at scale

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["travel and hospitality", "consumer booking automation"]
  decisions.types: ["itinerary recommendations", "booking actions on user's behalf"]
  decisions.automated: false
  decisions.authority_level: recommend-only
  decisions.categories: ["travel itineraries", "fare estimates"]
  runtime.human_review_required: true

  data.types:

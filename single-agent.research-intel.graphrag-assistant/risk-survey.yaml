schema_version: 1
sample_id: graphrag-assistant

# Pre-filled from the blueprint's nature. Deployer-specific fields carry the
# literal string TO_BE_COMPLETED_BY_DEPLOYER so the Risk Survey tab fades them out.

purpose:
  primary_function: Answer research questions over an indexed document corpus with cited, grounded retrieval.
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: advisory-only
  user_type: TO_BE_COMPLETED_BY_DEPLOYER

data:
  inputs:
    - user question text
    - indexed corpus documents
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER   # corpus may carry PII; S1 sanitizer redacts it
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

decisions:
  authority_level: recommend-only
  decision_subject: research questions over a document corpus
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible

failure:
  blast_radius: single-user
  failure_modes:
    - ungrounded or fabricated answer (mitigated by G1 grounding guardrail)
    - PII leakage from corpus chunk (mitigated by S1 sanitizer)
    - stale or incomplete index
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - local-search (in-process CorpusIndex)
    - global-search (in-process CorpusIndex)
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  content_generation: true
  synthetic_media: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER

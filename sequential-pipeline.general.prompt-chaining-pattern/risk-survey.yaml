schema_version: 1
sample_id: prompt-chaining-workflow

# ---- Purpose ----
purpose:
  primary_function: document-drafting-pipeline
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: author-or-researcher

# ---- Data ----
data:
  inputs:
    - user-supplied-prompt
    - in-process-template-corpus
    - in-process-citation-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: document-drafting
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reader_reviews_every_document_before_publishing: true

# ---- Failure ----
failure:
  blast_radius: single-draft
  failure_modes:
    - hallucinated-citation
    - missing-section-coverage
    - output-below-quality-threshold
    - structural-parity-failure
    - refine-step-retry-exhausted
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: author-or-researcher
  reader_must_review_document_before_publishing: true
  audit_frequency: weekly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_draft: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  template-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

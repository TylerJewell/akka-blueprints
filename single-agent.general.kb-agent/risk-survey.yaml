schema_version: 1
sample_id: kb-agent

# ---- Purpose ----
purpose:
  primary_function: retrieval-augmented-question-answering
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: answer-only
  user_type: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Data ----
data:
  inputs:
    - natural-language-questions
    - knowledge-base-documents
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  kb_documents_screened_before_indexing: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: answer-only
  decision_subject: knowledge-base-question
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  user_acts_on_answer_without_human_review: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - hallucinated-passage-reference
    - retrieval-miss-relevant-document
    - answer-without-supporting-evidence
    - out-of-scope-answer-presented-as-grounded
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: TO_BE_COMPLETED_BY_DEPLOYER
  human_on_loop: false
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  groundedness_score_surfaced_to_user: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  retrieval_strategy: tfidf-cosine-similarity
  top_k_passages: 5
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  kb_document_copyright_cleared_for_ai: TO_BE_COMPLETED_BY_DEPLOYER

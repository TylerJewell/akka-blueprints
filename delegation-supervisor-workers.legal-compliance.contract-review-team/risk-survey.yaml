# Risk Survey for the contract-review-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: contract-review-team-sample
  display_name: Contract Assistant Multi-Agent (Akka Sample)
  one_line_description: >
    A supervisor delegates clause analysis, risk scoring, and redline drafting to three
    specialist agents in parallel, then consolidates a reviewed contract package that a
    lawyer approves or rejects.
  scenario: |
    A user (or simulator) submits a contract text. A ReviewSupervisor decomposes it into
    three parallel tasks: clause extraction for ClauseAnalyst, risk scoring for RiskScorer,
    and redline drafting for Redliner. A legal-sector sanitizer runs before any agent
    receives the text and rejects prohibited content immediately. The supervisor merges all
    three worker outputs into a ReviewPackage. A before-agent-response guardrail vets the
    package; on pass it moves to AWAITING_APPROVAL where a lawyer must explicitly approve
    or reject it. A periodic ReviewSampler scores approved reviews for quality. The contract
    tools are modelled in-process; no external document store is required. The scenario is
    the canonical "delegation-supervisor-workers" pattern in the legal-compliance domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial adjudication (this system assists review, not adjudication)
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


# Risk Survey for the hitl-agent Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hitl-agent-sample
  display_name: Human-in-the-Loop Agent (Akka Sample)
  one_line_description: >
    A general-purpose HITL pipeline where an LLM proposes an action,
    a human gates approval, and a second agent executes it.
  scenario: |
    A user submits a request text. ProposalAgent analyses the request and produces
    an ActionProposal containing a summary, rationale, and risk level. The proposal
    is persisted on an ActionEntity and the ActionWorkflow pauses at an approval
    task. A human reviewer reads the proposal in the UI and either approves or
    rejects it via REST. On approval, ExecutionAgent invokes a simulated execution
    tool, the action transitions to EXECUTED, and an outcome appears. There is no
    real external execution target; the execute step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media generation


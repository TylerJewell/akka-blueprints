# Eval Matrix for the publishing Akka sample.
#
# Note on schema fit: framework/schema/control.schema.yaml requires regulation_anchors
# on each control. This is a community-content sample (content-editorial domain) with no
# industry- or jurisdiction-bound anchors, so regulation_anchors is intentionally an empty
# list across all controls.

schema_version: 1
sample_id: publishing
generated_at: 2026-06-28

matrix_cell:
  coordination_pattern: human-in-loop-gate
  domain: content-editorial

integration_tier: runs-out-of-the-box

controls:
  - id: H1
    name: Pause the pipeline at a human approval gate
    mechanism:
      kind: hitl
      flavor: application
    enforcement: blocking
    rationale: >
      A drafted post is public content that must not publish without a person's
      decision. The approval gate between draft and publish is the defining
      characteristic of the human-in-loop-gate coordination pattern.
    implementation: >
      PublishingWorkflow pauses in awaitApprovalStep, polling PostEntity status.
      POST /api/posts/{id}/approve and POST /api/posts/{id}/reject transition the
      entity; the workflow resumes on the next poll.
    regulation_anchors: []

  - id: G1
    name: Block the publish tool unless the post is approved
    mechanism:
      kind: guardrail
      hook: before-tool-call
      flavor: tool-permission
    enforcement: blocking
    rationale: >
      The publish step is an external, destructive write in the production analog.
      A pre-tool guardrail keeps it from running on a post that has not been
      approved.
    implementation: >
      before-tool-call guardrail on PublishingAgent re-reads PostEntity.status and
      allows the simulated publish tool only when status is APPROVED.
    regulation_anchors: []

  - id: G2
    name: Quality-check the drafted post before human review
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: llm-content-evaluation
    enforcement: blocking
    rationale: >
      The draft is public-facing content. An output guardrail keeps content that
      fails a basic quality bar from reaching the reviewer.
    implementation: >
      before-agent-response guardrail on ContentAgent checks length and topic
      adherence before the DraftPost is persisted for review.
    regulation_anchors: []

simplified_view:
  - id: H1
    name: Human approval gate
    mechanism: "hitl · application"
    short: Workflow pauses for human approve/reject.
  - id: G1
    name: Guard publish tool
    mechanism: "guardrail · before-tool-call"
    short: Block publish unless status is APPROVED.
  - id: G2
    name: Draft quality gate
    mechanism: "guardrail · before-agent-response"
    short: Block low-quality drafts from reaching reviewer.

# Risk Survey for the publishing Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: publishing-sample
  display_name: HITL Blog Publishing (Akka Sample)
  one_line_description: >
    A simulated content publishing pipeline where an LLM drafts a blog post,
    a human gates approval, and a second agent publishes.
  scenario: |
    A user submits a topic. ContentAgent drafts a blog post on that topic. The
    draft is persisted on a PostEntity and the PublishingWorkflow pauses at an
    approval task. A human reviewer reads the draft in the UI and either approves
    or rejects it via REST. On approval, PublishingAgent invokes a simulated
    publish tool, the post transitions to PUBLISHED, and a URL appears. There is
    no real external publishing target; the publish step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation

answers:

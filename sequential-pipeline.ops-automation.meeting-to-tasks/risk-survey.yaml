# Risk Survey for the meeting-to-tasks Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: meeting-to-tasks-sample
  display_name: Meeting To Tasks (Akka Sample)
  one_line_description: >
    A sequential pipeline that turns meeting notes into a task list, redacts PII,
    gates one human approval, then writes the tasks to a board, a CSV, and a chat
    notification.
  scenario: |
    A user (or simulator) submits meeting notes. A sanitizer redacts attendee names
    and emails. An extraction agent reads the sanitized notes and returns a structured
    task list. The pipeline pauses for one human approval. On approval, each task is
    validated and pushed to a Trello board, exported to a CSV file, and announced via
    a Slack notification. Without UI interaction, a simulator drips canned meeting
    notes so the pipeline runs on its own. The third-party writes default to in-process
    facades and flip to the real services when their env vars are set.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - biometric identification
    - emotion recognition
    - autonomous lethal targeting
    - behavioral manipulation

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["operations automation", "team productivity tooling"]

  decisions.types: ["task assignment suggestions"]
  decisions.automated: false
  decisions.categories: ["work-item creation"]
  runtime.human_review_required: true

  data.types:

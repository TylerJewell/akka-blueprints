schema_version: 1
sample_id: realtime-conversational-agent

# ---- Purpose ----
purpose:
  primary_function: real-time-customer-support-conversation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: fully-autonomous
  user_type: end-customer

# ---- Data ----
data:
  inputs:
    - customer-messages
    - conversation-history
    - agent-persona-config
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  customer_messages_stored_on_entity: true

# ---- Decisions ----
decisions:
  authority_level: fully-autonomous
  decision_subject: customer-support-reply
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: irreversible-once-delivered
  reviewer_reads_every_reply_before_delivery: false

# ---- Failure ----
failure:
  blast_radius: per-conversation-session
  failure_modes:
    - policy-violating-reply
    - off-topic-hallucination
    - guardrail-exhaustion
    - session-summary-mismatch
    - pii-exposure-in-reply
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: cx-operations-team
  reviewer_reviews_session_logs: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  ai-generated-content-disclosure-to-customer: TO_BE_COMPLETED_BY_DEPLOYER

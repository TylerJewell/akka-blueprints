schema_version: 1
sample_id: guardrails-baseline

# ---- Purpose ----
purpose:
  primary_function: content-moderation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-with-human-review
  user_type: trust-and-safety-operator

# ---- Data ----
data:
  inputs:
    - submitted-user-messages
    - submitted-policy-rule-sets
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: automated-with-human-review
  decision_subject: user-submitted-message
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_flagged_decisions_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-message
  failure_modes:
    - missed-policy-violation
    - false-positive-block
    - pii-leakage-via-llm
    - forbidden-tool-invocation
    - malformed-decision-propagation
    - verdict-rule-inconsistency
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: trust-and-safety-operator
  escalated_decisions_require_human_review: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_moderation: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  message-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

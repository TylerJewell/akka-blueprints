schema_version: 1
sample_id: task-insight-memory

# ---- Purpose ----
purpose:
  primary_function: task-execution-memory
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: advisory
  user_type: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Data ----
data:
  inputs:
    - free-text-task-description
    - task-type-identifier
    - acceptance-criteria-string
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: advisory
  decision_subject: task-execution-result
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: TO_BE_COMPLETED_BY_DEPLOYER
  failure_modes:
    - biased-insight-accumulation
    - pii-leakage-into-memory-store
    - confidence-score-calibration-drift
    - evaluator-overfitting-to-task-type
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
    synthetic-media: false
    content-generation: true
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

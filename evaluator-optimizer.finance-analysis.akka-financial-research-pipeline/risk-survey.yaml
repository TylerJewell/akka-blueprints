schema_version: 1
sample_id: financial-research-pipeline

# ---- Purpose ----
purpose:
  primary_function: financial-research-report-generation
  sector: financial-services
  decisions_surface: advisory-draft-only
  user_type: financial-analyst

# ---- Data ----
data:
  inputs:
    - research-query-text
    - sector-tag-enum
    - word-ceiling-integer
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: advisory-draft-only
  decision_subject: financial-research-report
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible

# ---- Failure ----
failure:
  blast_radius: single-user
  failure_modes:
    - verifier-impossible-rubric
    - word-ceiling-loop
    - source-retrieval-gap
    - sector-tag-mismatch
    - compliance-queue-backlog
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: compliance-officer
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
    synthetic-media: false
    content-generation: true
    financial-advice: true
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

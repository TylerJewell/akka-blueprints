# Risk Survey for the traced-manager-search Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: traced-manager-search-sample
  display_name: Inspect Multi-Agent Run — Phoenix (Akka Sample)
  one_line_description: >
    A manager agent delegates web search to a search agent, assembles an OpenInference/Phoenix
    trace, and synthesises a final answer with per-step token and timing attribution.
  scenario: |
    A user (or simulator) submits a research query. A ManagerAgent decomposes it into a
    SearchPlan. A SearchAgent executes web search and page visits subject to a URL allow-list
    guardrail. The workflow assembles a RunTrace from Phoenix spans captured during each
    tool call. A TraceInspector agent analyses the trace and returns a TraceReport. The
    ManagerAgent synthesises a final answer. An allow-list guardrail blocks prohibited URLs
    before any fetch is issued; a periodic eval sampler scores the synthesis decision for
    quality. The scenario is the delegation-supervisor-workers pattern with instrumented
    observability in the research-intel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


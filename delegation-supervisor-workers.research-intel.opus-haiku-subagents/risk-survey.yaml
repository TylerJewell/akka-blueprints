# Risk Survey for the haiku-subagents-under-opus Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: haiku-subagents-under-opus
  display_name: Haiku Sub-Agents under Opus — multimodal (Akka Sample)
  one_line_description: >
    An Opus coordinator decomposes a multimodal image-batch question into per-image tasks,
    delegates each to a Haiku sub-agent in parallel, and synthesises their reports into one
    answer.
  scenario: |
    A user (or simulator) submits a batch of images with an open-ended question.
    An OpusCoordinator decomposes the question into per-image instructions. Each image
    is first passed through PiiSanitizer, which redacts faces and visible document text.
    One HaikuImageAnalyst processes each sanitized image in parallel and returns an
    ImageReport. OpusCoordinator synthesises all reports into a SynthesisedAnswer.
    An output guardrail vets the answer for PII bleed-through and factual inconsistencies
    before it is surfaced. A periodic eval sampler scores the synthesis decision. The
    sample uses the "delegation-supervisor-workers" coordination pattern in the
    research-intel domain, with Opus handling reasoning and Haiku handling repetitive
    per-item work.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


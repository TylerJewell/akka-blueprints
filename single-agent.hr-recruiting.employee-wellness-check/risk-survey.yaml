schema_version: 1
sample_id: wellness-check-agent

# ---- Purpose ----
purpose:
  primary_function: employee-wellness-check-in
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: hr-coordinator

# ---- Data ----
data:
  inputs:
    - employee-check-in-responses
    - check-in-question-sets
    - campaign-configuration
  data_classes:
    pii: true
    special_category_wellness: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  special_category_handled_by_sanitizer_before_llm: true
  employee_consent_to_wellness_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: employee-morale-assessment
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_analysis_before_action: true
  crisis_routing_to_human: true

# ---- Failure ----
failure:
  blast_radius: single-employee-check-in
  failure_modes:
    - crisis-missed
    - morale-miscalibration
    - special-category-leakage-via-llm
    - false-crisis-escalation
    - recommendation-too-generic
    - aggregate-risk-suppressed-by-low-response-rate
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  human_on_loop_mechanism: post-market-surveillance-review
  reviewer_role: hr-decision-maker
  crisis_responder_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: true
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  emotion_recognition_scope: morale-classification-from-voluntary-text
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  employee_works_council_notified: TO_BE_COMPLETED_BY_DEPLOYER
  legitimate_basis_for_special_category_processing: TO_BE_COMPLETED_BY_DEPLOYER

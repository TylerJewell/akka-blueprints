schema_version: 1
sample_id: fomc-event-analyst

# ---- Purpose ----
purpose:
  primary_function: fomc-policy-analysis-pipeline
  sector: financial-services
  decisions_surface: recommend-only
  user_type: financial-analyst-or-portfolio-manager

# ---- Data ----
data:
  inputs:
    - user-supplied-fomc-event-identifier
    - in-process-market-indicator-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: fomc-policy-analysis
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  analyst_reviews_every_analysis_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-analysis
  failure_modes:
    - ungrounded-rate-attribution
    - empty-sections
    - guardrail-rejection-loop
    - stale-market-data
    - misclassified-rate-move-direction
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: financial-analyst-or-portfolio-manager
  reader_must_review_analysis_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_analysis: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  market-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  financial-advice-regulatory-status: TO_BE_COMPLETED_BY_DEPLOYER

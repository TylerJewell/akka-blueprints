  # "Who may be affected by this AI System?"
  subjects.affected_persons: TO_BE_COMPLETED_BY_DEPLOYER

  # "What is the deploying organization's annual revenue?"
  organization.annual_revenue: TO_BE_COMPLETED_BY_DEPLOYER


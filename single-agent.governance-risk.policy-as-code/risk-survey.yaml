schema_version: 1
sample_id: policy-as-code

# ---- Purpose ----
purpose:
  primary_function: automated-policy-enforcement
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: enforce
  user_type: platform-engineer-or-devops-operator

# ---- Data ----
data:
  inputs:
    - submitted-change-payloads
    - submitted-policy-rules
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    infrastructure-configuration: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  sensitive_payload_types:
    - cloud-resource-identifiers
    - network-topology-details
    - secret-references-in-configs

# ---- Decisions ----
decisions:
  authority_level: enforce
  decision_subject: infrastructure-or-configuration-change
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: not-applicable
  gate_decision_is_final: true

# ---- Failure ----
failure:
  blast_radius: single-change-request
  failure_modes:
    - false-positive-block
    - missed-violation
    - disallowed-tool-data-used
    - gate-bypass-on-timeout
    - severity-miscalibration
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER
  gate_override_mechanism: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - lookup-policy-metadata
    - query-resource-registry
  rate_limit_per_change: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  change-payload-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  policy-rules-reviewed-by-qualified-author: TO_BE_COMPLETED_BY_DEPLOYER

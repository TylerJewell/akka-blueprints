# Risk Survey for the surprise-trip-planner Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: surprise-trip-planner-sample
  display_name: Delegation Supervisor-Workers Surprise Trip Planner (Akka Sample)
  one_line_description: >
    A supervisor agent delegates destination research, logistics, and activities
    to worker agents and assembles a surprise travel itinerary from a traveler's
    preferences.
  scenario: |
    A traveler submits a preference set (vibe, budget band, dates, party size,
    no-go list). A TripWorkflow runs a TripSupervisorAgent that delegates to
    three workers — DestinationAgent picks a destination, LogisticsAgent plans
    transport and lodging, ActivitiesAgent builds a day-by-day plan. The
    supervisor assembles the worker outputs into one itinerary. A before-tool-call
    guardrail constrains which external search/booking tools each worker may
    invoke; a before-agent-response guardrail grounds the assembled travel facts
    against canned reference data before the itinerary is shown. There is no real
    external booking target — search and booking tools are modeled in-process.
    The scenario is the canonical delegation-supervisor-workers pattern in the
    planning-travel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - biometric identification
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


# Risk Survey for the startup-advisor-mcp Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies for the sales-marketing domain.
# Deployer-specific answers are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this
# survey is used to materialise a deployer Eval Matrix.

archetype:
  id: startup-advisor-mcp-sample
  display_name: Startup Advisor (MCP) (Akka Sample)
  one_line_description: >
    An advisor coordinator delegates market research to a MarketResearcher and channel
    strategy to a GrowthAnalyst in parallel via MCP-exposed tools, then synthesises
    actionable go-to-market guidance.
  scenario: |
    A user (or simulator) submits a startup brief. An AdvisorCoordinator decomposes it into
    a market research query and a channel strategy question. A MarketResearcher gathers market
    data via MCP tools and a GrowthAnalyst evaluates channel options via MCP tools, both
    running in parallel. The Coordinator merges their outputs into GtmGuidance. A
    before-tool-call guardrail enforces an allow-list on every MCP tool invocation; a periodic
    eval sampler scores the synthesis decision. The MCP tool surface is modelled in-process
    in this sample — no real external tools are required. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


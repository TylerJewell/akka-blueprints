# Risk Survey for the stock-fundamentals-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: stock-fundamentals-team-sample
  display_name: AI Team for Fundamental Stock Analysis (Akka Sample)
  one_line_description: >
    A coordinator delegates financial metrics extraction, news sentiment gathering, and
    ratio computation to three specialist agents in parallel, then synthesises a single
    stock recommendation with a no-advice guardrail and sector sanitizer.
  scenario: |
    A user (or simulator) submits a stock ticker. An AnalysisCoordinator decomposes it
    into three parallel subtasks: a financials query for FinancialsAgent, a news query
    for NewsAgent, and a ratios query for RatioAgent. All three agents run concurrently.
    The Coordinator merges their outputs into a StockRecommendation. An output guardrail
    blocks direct investment advice; a sector sanitizer redacts price-sensitive language.
    A periodic EvalSampler scores the synthesis for factual accuracy. There is no live
    market data feed in this sample — financial data and news are modelled in-process.
    The scenario is the canonical "delegation-supervisor-workers" pattern in the
    finance-analysis domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - autonomous trading execution
    - portfolio management with execution authority


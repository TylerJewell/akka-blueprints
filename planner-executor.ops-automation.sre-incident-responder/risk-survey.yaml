schema_version: 1
sample_id: sre-incident-responder

# ---- Purpose ----
purpose:
  primary_function: ops-automation-incident-response
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: human-approved-action
  user_type: site-reliability-engineer

# ---- Data ----
data:
  inputs:
    - alert-descriptions
    - metric-time-series-fixtures
    - log-excerpt-fixtures
    - trace-summary-fixtures
    - runbook-fixture-files
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-human-approval
  decision_subject: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: multi-service-infrastructure
  failure_modes:
    - incorrect-root-cause-hypothesis
    - out-of-policy-remediation-proposal
    - approval-timeout-leaving-incident-unresolved
    - cascading-failure-from-remediation-action
    - stale-incident-no-progress
    - investigation-replan-budget-exhausted
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: per-incident
  operator_pause_control: true

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - simulated-metrics-retrieval
    - simulated-log-retrieval
    - simulated-trace-retrieval
    - simulated-runbook-lookup
    - simulated-remediation-execution
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

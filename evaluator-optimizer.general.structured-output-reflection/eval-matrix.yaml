schema_version: 1
sample_id: structured-output-reflection
coordination_pattern: evaluator-optimizer
domain: general

controls:
  - id: G1
    name: Reject schema-invalid output before the semantic critic runs
    mechanism:
      kind: guardrail
      hook: after-llm-response
      flavor: output-policy
    enforcement: blocking
    rationale: |
      The reflection loop's entire premise is that the Critic evaluates semantic
      quality. If a document fails basic JSON parsing or is missing required
      schema fields, the Critic has no reliable surface to reason about — it
      would either hallucinate a structural critique or fail to return a typed
      ValidationReport. A deterministic pre-critic guardrail catches structural
      failures, returns a precise feedback note to the Generator, and keeps the
      Critic's evaluation scope limited to content quality rather than format
      repair.
    implementation: |
      Wired as the `guardrailStep` of `ReflectionWorkflow`, immediately after
      `generateStep`. A pure-function check on `output.parseable()` and a
      schema-required-field check against a static registry (product, event-record,
      contact). On failure, emits `AttemptGuardrailVerdictRecorded` with
      `verdict.passed = false` and `reasonCode = "SCHEMA_INVALID"`, then
      transitions back to `generateStep` with a fixed `ValidationNotes`
      ("Output is not valid JSON or is missing required schema fields; correct
      and resubmit."). The Generator's next call sees the structured feedback as
      the prior notes. The cycle still counts toward `maxAttempts`.
    regulation_anchors: []

  - id: E1
    name: Record every cycle's validation verdict as an eval event
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      The critic's pass-or-revise verdict is the highest-information signal the
      loop produces per attempt. Recording it as a typed event gives operators a
      continuous quality stream — pass rate by attempt number, average score per
      schema type, frequency of schema-invalid drafts — without instrumenting the
      workflow directly. This stream is the primary input for any downstream
      quality-monitoring or fine-tuning pipeline operating on the same service.
    implementation: |
      `EvalSampler` (TimedAction) fires every 30 s. Queries
      `GenerationsView.getAllGenerations`, finds attempts that have been validated
      but do not yet have a matching `EvalRecorded` event, and calls
      `GenerationEntity.recordEval(attemptNumber, verdict, score, schemaFailed)`.
      The call is idempotent on `(generationId, attemptNumber)`. The workflow
      itself also emits one `EvalRecorded` event on the terminal transition
      (GenerationPassed or GenerationFailedFinal) carrying the loop-level outcome.
    regulation_anchors: []

  - id: HT1
    name: Halt the reflection loop gracefully at the retry ceiling
    mechanism:
      kind: halt
      flavor: graceful-degradation
    enforcement: system-level
    rationale: |
      An uncapped reflection loop against a strict schema can loop indefinitely
      when the Generator fails to learn from feedback — especially on schemas
      with tightly constrained value domains. Allowing indefinite retries blocks
      workflow resources, accumulates unbounded event history on the entity, and
      prevents the caller from receiving any usable output. The halt mechanism
      provides a guaranteed upper bound on loop length while preserving the
      best-scoring output and the full audit trail, so operators can diagnose
      why convergence failed.
    implementation: |
      `ReflectionWorkflow` reads `structured-output-reflection.max-attempts`
      (default 4) at start. Before scheduling the next `generateStep`, it checks
      `attemptCount < maxAttempts`. If the ceiling is hit, the workflow
      transitions to `failStep`, which emits `GenerationFailedFinal` with the
      highest-scoring attempt's document as best-of and a structured
      `failureReason` ("max attempts reached" plus the count).
      `defaultStepRecovery(maxRetries(2).failoverTo(failStep))` ensures any
      unrecoverable agent failure also lands in the same terminal state rather
      than hanging.
    regulation_anchors: []

simplified_view:

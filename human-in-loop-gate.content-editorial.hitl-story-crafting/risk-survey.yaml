# Risk Survey for the hitl-story-crafting Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hitl-story-crafting-sample
  display_name: HITL Story Crafting (Akka Sample)
  one_line_description: >
    An interactive story-writing system where an LLM drafts chapters one turn at
    a time, pausing between each chapter to collect reader direction.
  scenario: |
    A reader submits a story premise. StoryDrafterAgent writes the first chapter.
    ContentGuardAgent screens it for content policy. If it passes, the chapter is
    persisted on StoryEntity and StoryWorkflow pauses awaiting direction. The reader
    reads the chapter in the UI and either provides direction for the next chapter
    (continue) or ends the story. On continue, the workflow drafts the next chapter
    incorporating the direction. On end, the story transitions to COMPLETED. If the
    content guard rejects a draft at any turn, the story transitions to SCREENED_OUT
    and no further chapters are written.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - biometric identification or categorisation
    - law enforcement authorization


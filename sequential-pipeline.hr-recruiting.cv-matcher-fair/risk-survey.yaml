# Risk Survey for the cv-matcher-fair Akka sample.
#
# Pre-filled answers reflect the sample's surface. Deployer-specific answers are
# TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: cv-matcher-fair-sample
  display_name: Fair CV Matcher (Akka Sample)
  one_line_description: >
    A sequential pipeline that extracts a structured profile from a CV, strips
    protected-class signals, scores fit against job postings, and releases the
    matches for human-on-the-loop review.
  scenario: |
    A user submits raw CV text plus a list of job postings. An ExtractionAgent
    produces a structured CvProfile. A deterministic sanitize step strips
    special-category signals (name, photo reference, address, age, gender
    markers), recording each as a RedactedSignal. A MatchingAgent then scores
    the redacted profile against each posting, producing a ranked list. The
    candidate is released for a human reviewer to monitor. A FairnessMonitor
    periodically checks selection-rate parity across demographic slices.

    Employment screening is a high-risk use under the EU AI Act (Annex III).
    The sample wires a sanitizer, a periodic fairness eval, and a
    human-on-the-loop oversight gate accordingly.

  primary_regulations:
    - eu-ai-act
    - gdpr

  explicitly_not_applicable:
    - synthetic media generation
    - clinical decision support
    - judicial process
    - predictive policing
    - mass surveillance
    - biometric identification
    - autonomous lethal targeting


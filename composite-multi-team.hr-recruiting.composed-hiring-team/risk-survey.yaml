# Risk Survey for the composed-hiring-workflow Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: composed-hiring-workflow-sample
  display_name: Composed Hiring Workflow (Akka Sample)
  one_line_description: >
    A multi-team hiring pipeline where a hiring-manager agent opens a requisition,
    a screening desk delegates to screeners, a CV improvement loop runs a
    coach-critic cycle, and an interview panel scores the candidate before an
    offer is extended.
  scenario: |
    A user (or simulator) submits a job application. A HiringManager agent opens
    a HiringBrief. A CandidateWorkflow (nested) runs a screening delegation: a
    ScreeningLead plans dimensions, several Screener instances each write a note
    into a shared workspace, and the lead synthesises a ScreeningReport. A
    CvImprovementLoop (nested) runs a coach-critic feedback cycle: a CvCoach
    rewrites the CV, a CvCritic scores it, and the loop iterates up to three times
    until the critic passes. An interview panel of Interviewer instances each score
    the candidate on one competency axis, and a deterministic PanelRule turns the
    scores into a PanelVerdict. On a PROCEED verdict the HiringManager drafts an
    OfferLetter under a before-agent-response guardrail and the application moves
    to OFFER_EXTENDED.

    Every nested workflow boundary is vetted by a before-agent-invocation guardrail.
    Each stage result is scored by a non-blocking eval. After an offer is extended,
    a compliance officer can post a post-hire review that is recorded without
    changing the offer state. There is no real external ATS integration in this
    sample; all data is managed in-process. The scenario is the canonical
    "composite-multi-team" pattern in the hr-recruiting domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - autonomous lethal targeting
    - predictive policing
    - mass surveillance
    - behavioral manipulation
    - children data (unless deployer configures otherwise)
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute
    - synthetic media beyond text


# Risk Survey for the dev-team-task-board Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: dev-team-task-board-sample
  display_name: Self-Organising Dev Team on a Shared Task Board (Akka Sample)
  one_line_description: >
    A team-lead agent splits a software project into tasks on a shared board;
    developer agents claim tasks on their own, write code under a tool guardrail,
    pass a test gate, and message each other when they need to coordinate.
  scenario: |
    A user (or simulator) submits a software project brief. A TeamLead agent
    decomposes it into a dependency-ordered task list, and a PlanningWorkflow
    writes one TaskEntity per task onto a shared board (status OPEN). A fixed
    roster of developer agents — each a durable DeveloperWorkflow — polls the
    board, claims an eligible OPEN task atomically, runs the DeveloperAgent to
    produce a code artifact, and runs the artifact through a deterministic test
    gate. A passing artifact marks the task DONE; a failing one retries then
    blocks. When a developer needs another developer's output it raises a peer
    request, which blocks the task and lands a message in the target developer's
    mailbox; a reply unblocks it. An operator can halt the whole team at any
    time. There is no external code execution and no real shell — the workspace,
    the test runner, and the project intake are all modelled in-process with
    Akka primitives. The scenario is the canonical "team-shared-list" pattern in
    the dev-code domain.

  primary_regulations: []  # community developer-tooling sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - real shell or code execution on the host
    - access to production source repositories
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric processing
    - frontier-scale training compute


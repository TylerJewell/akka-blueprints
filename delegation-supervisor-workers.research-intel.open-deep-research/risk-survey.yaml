# Risk Survey for the open-deep-research Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: open-deep-research-sample
  display_name: Open Deep Research (Akka Sample)
  one_line_description: >
    A manager agent decomposes a research question into parallel retrieval tasks, delegates
    web-browsing and document-reading to two worker agents, then synthesises a cited answer.
  scenario: |
    A user (or simulator) submits a research question. A ResearchManager decomposes it into
    a list of URLs to fetch and a document reference to read. A WebBrowsingAgent fetches the
    URLs (each checked against an allow-list before execution) and a FileReaderAgent reads
    the document, both running in parallel. A PII sanitization pass runs over the retrieved
    content before it enters the synthesis prompt. The manager merges both outputs into a
    SynthesisedAnswer with citations. A periodic eval sampler scores completed answers; a
    monitoring flag surfaces runs that exceed the retry budget. There is no real browser
    binary in this sample — fetch and read tools are modelled in-process. The scenario is
    the canonical "delegation-supervisor-workers" pattern in the research-intel domain,
    replicating the architecture of open-ended multi-step deep research pipelines.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute

answers:

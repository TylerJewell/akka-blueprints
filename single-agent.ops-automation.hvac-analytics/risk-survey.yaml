schema_version: 1
sample_id: hvac-analytics

# ---- Purpose ----
purpose:
  primary_function: hvac-telemetry-analytics
  sector: building-operations
  decisions_surface: recommend-only
  user_type: building-engineer-or-facilities-manager

# ---- Data ----
data:
  inputs:
    - natural-language-analytical-questions
    - hvac-telemetry-snapshots
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  equipment_serial_numbers_stripped_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: hvac-zone-operating-condition
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_answer_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-building-zone
  failure_modes:
    - inaccurate-trend-classification
    - missing-data-points
    - non-actionable-recommendation
    - stale-telemetry-response
    - wrong-zone-scope
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: building-engineer-or-facilities-manager
  reviewer_must_act_on_answer: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  telemetry-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

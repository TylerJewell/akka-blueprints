schema_version: 1
sample_id: citation-rag
coordination_pattern: sequential-pipeline
domain: research-intel

controls:
  - id: G1
    name: Verify every composed claim carries a valid citation before committing the answer
    mechanism:
      kind: guardrail
      hook: after-llm-response
      flavor: after-llm-response
    enforcement: blocking
    rationale: |
      In a citation RAG pipeline, the highest-risk moment is after the COMPOSE task
      returns but before the answer is written to the entity. At that point the LLM
      has already produced prose — but the prose may include claims whose
      `citedPassageId` is null, was hallucinated, or points to a passage that was
      never actually retrieved. A before-tool-call check cannot catch this because
      the violation is in the output, not the input. The after-llm-response hook is
      the correct cut: it runs on the completed COMPOSE response, iterates every
      claim, resolves each `citedPassageId` against the recorded `PassageSet`, and
      rejects the entire answer if any claim fails the check. Blocking here means an
      uncited claim never enters the entity event log and never reaches a researcher.
    implementation: |
      `CitationGuardrail` is registered on `CitationAgent` via the agent's
      guardrail-configuration block, bound to the `after-llm-response` hook. It fires
      only when the active task is `COMPOSE_ANSWER`. For each `Claim` in the returned
      `Answer`, it checks (a) `claim.citedPassageId != null` and (b) that the id
      resolves in the `PassageSet` recorded on `QueryEntity` for the `queryId` carried
      in the in-flight `TaskDef.metadata`. If any claim fails, the guardrail returns
      `Guardrail.reject("uncited-claim: claim <claimId> has no valid citation in the
      recorded PassageSet")` to the agent loop and calls
      `QueryEntity.recordCitationGuardrailRejection(claimId, reason)` so the rejection
      is visible in the UI's rejection-log strip and in the audit log. The agent loop
      retries within its 4-iteration budget; if all 4 iterations fail, the workflow
      step fails over to the error step and the entity transitions to FAILED.
    regulation_anchors: []

  - id: E1
    name: Score every composed answer for citation coverage before surfacing it
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      Even an answer that passes the citation guardrail can have subtler quality
      defects: a passage cited by no claim (a decoration reference that inflates the
      source count without grounding a statement), a claim count of zero (a trivially
      empty answer), or a citation pointing to a passage whose text does not support
      the claim's assertion. The on-decision evaluator surfaces these patterns without
      blocking the answer, giving the researcher a fast signal about which answers
      warrant deeper review before being cited in a document. A score of 1 on a
      well-formed answer that passed the guardrail indicates a structural quality gap
      the guardrail was not designed to catch.
    implementation: |
      `CoverageScorer` runs inside `CitationQueryWorkflow.evalStep`, fired immediately
      after `AnswerComposed` lands on `QueryEntity`. The scorer is deterministic and
      rule-based (no LLM call — keeping the single-agent sequential-pipeline invariant
      honest). Four checks, one point per check satisfied on a base of 1:
      (1) full attribution — every `Answer.claims[i].citedPassageId` is non-null.
      (2) resolved citations — every cited `passageId` appears in the recorded
      `PassageSet.passages[].passageId`.
      (3) non-empty answer — `answer.claims.size() > 0`.
      (4) no decoration citations — every passage in `PassageSet` that appears in any
      `Citation.passageId` is cited by at least one claim (no passage cited in the
      citations list but unlinked from all claims).
      Emits `CitationScored{score: 1-5, rationale: String}` with a rationale sentence
      naming the largest gap. Scores ≤ 2 are flagged in the App UI with a red card
      border; the researcher sees the rationale inline.
    regulation_anchors: []

simplified_view:
  - id: G1
    label: Citation-gate guardrail
    mechanism: Guardrail
    implementation: after-llm-response
    source: —
  - id: E1
    label: Citation coverage eval
    mechanism: Eval · event
    implementation: on-decision-eval
    source: —

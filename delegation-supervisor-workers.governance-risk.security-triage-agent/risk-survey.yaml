# Risk Survey for the security-triage-agent Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: security-triage-agent-sample
  display_name: AI Security Triage Agent (Akka Sample)
  one_line_description: >
    A coordinator delegates vulnerability scanning to a VulnerabilityScanner and
    threat-context gathering to a ThreatContextAgent in parallel, then merges their
    findings into a triage report that a security officer must approve before any
    mitigation executes.
  scenario: |
    An operator (or simulator) submits an incident signal for a specific asset.
    A SecurityCoordinator decomposes the signal into a vulnerability scan query and
    a threat-context query. VulnerabilityScanner identifies and scores CVEs; ThreatContextAgent
    retrieves threat-actor context and attack-pattern history; both run in parallel.
    The Coordinator merges both into a TriageReport with a riskLevel and mitigationPlan.
    The workflow parks at AWAITING_APPROVAL until a named security officer approves or
    rejects via the REST API. On approval, the mitigation plan is executed. A periodic eval
    sampler scores the triage decision for risk-level accuracy. There are no real external
    CVE databases or threat-intel feeds in this sample — the tools are modelled in-process.
    The scenario is the canonical "delegation-supervisor-workers" pattern in the
    governance-risk domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


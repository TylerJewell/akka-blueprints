# Risk Survey for the content-pipeline Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: content-pipeline-sample
  display_name: Sequential Content Pipeline (Akka Sample)
  one_line_description: >
    A content pipeline where a research agent gathers sources, a writer agent
    drafts an article, a self-critique pass scores it, and the article publishes.
  scenario: |
    A user (or a simulator) submits a topic. A ResearchAgent built on an LLM calls
    an in-process web-search tool, restricted to an allowed-domain list, and
    returns a sourced brief. A WriterAgent drafts an article from the brief; a
    terminal style and safety check runs before the draft is returned. A
    CritiqueAgent scores the draft. The article then publishes with a synthesized
    URL. Every stage is event-sourced on an ArticleEntity and projected to a view
    the UI streams. There is no real external publishing target; the publish step
    is in-process. The scenario is the canonical sequential-pipeline pattern in
    the content-editorial domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute

answers:

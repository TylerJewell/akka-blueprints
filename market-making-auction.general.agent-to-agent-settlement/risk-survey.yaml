# Risk Survey for the agent-to-agent-settlement Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: agent-to-agent-settlement-sample
  display_name: Agent-to-Agent Commerce Settlement (Akka Sample)
  one_line_description: >
    Autonomous buyer agents discover service listings, submit bids through a brokered
    auction, and settle the winning transaction — with a precondition guardrail that gates
    payment and a human-in-the-loop path for disputed orders.
  scenario: |
    A service listing is published (by a user or by ListingSimulator). BuyerAgent evaluates
    the listing and submits a Bid with a reasoned price. AuctionWorkflow closes the auction,
    selects the winning bid, and creates an Order. SettlementAgent then runs a precondition
    check covering counterparty credentials, buyer balance, and listing integrity. If the
    check passes the order is settled; if it fails the order is cancelled with a reason.
    A settled order may later be disputed by the buyer; DisputeMonitor detects DISPUTED
    orders and writes an OperatorTask for human review. The operator resolves the dispute
    via the API. There is no real payment processor in this sample — settlement is modelled
    in-process. The scenario is the canonical "market-making-auction" pattern in the general
    domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


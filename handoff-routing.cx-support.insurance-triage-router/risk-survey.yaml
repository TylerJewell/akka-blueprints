schema_version: 1
sample_id: auto-insurance-agent

# ---- Purpose ----
purpose:
  primary_function: customer-support
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: member-response
  user_type: insurance-member

# ---- Data ----
data:
  inputs:
    - inbound-member-requests
    - claim-status-inquiries
    - policy-coverage-questions
    - rewards-redemption-requests
    - roadside-assistance-requests
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: false
    biometric: false
    location-fine-grained: TO_BE_COMPLETED_BY_DEPLOYER  # roadside dispatch may require location
    vehicle-identification-number: true
    drivers-license-number: true
    policy-number: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous-with-guardrail
  decision_subject: insurance-member
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible-until-published
  routing_decisions_made_by_ai: true
  resolution_decisions_made_by_ai: true
  claim_settlement_decisions_made_by_ai: false  # specialists may not settle; only acknowledge

# ---- Failure ----
failure:
  blast_radius: single-member
  failure_modes:
    - wrong-category-routing
    - inappropriate-response-content
    - pii-leakage-via-llm
    - invented-settlement-amount
    - invented-coverage-discount
    - invented-roadside-eta
    - out-of-scope-legal-advice
    - out-of-scope-medical-advice
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: insurance-supervisor
  reviewer_must_approve_every_outgoing: false
  reviewer_must_unblock_guardrail_failures: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_request: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  member_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER
  insurance_regulatory_body: TO_BE_COMPLETED_BY_DEPLOYER

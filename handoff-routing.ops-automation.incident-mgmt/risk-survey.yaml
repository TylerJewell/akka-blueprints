schema_version: 1
sample_id: incident-management

# ---- Purpose ----
purpose:
  primary_function: incident-management
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: ops-runbook-action
  user_type: site-reliability-engineer

# ---- Data ----
data:
  inputs:
    - inbound-incident-reports
    - alert-payloads
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    alert-metadata: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false

# ---- Decisions ----
decisions:
  authority_level: autonomous-with-guardrail
  decision_subject: production-system
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  routing_decisions_made_by_ai: true
  remediation_decisions_made_by_ai: true

# ---- Failure ----
failure:
  blast_radius: single-service
  failure_modes:
    - wrong-category-routing
    - inappropriate-remediation-action
    - destructive-action-on-critical-host
    - peak-hours-write
    - alert-token-echo-in-summary
    - out-of-authority-change-execution
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: incident-commander
  reviewer_must_approve_every_outgoing: false
  reviewer_must_unblock_guardrail_failures: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_incident: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: retention-outreach

# ---- Purpose ----
purpose:
  primary_function: student-retention-outreach
  sector: education
  decisions_surface: draft-only
  user_type: academic-advisor

# ---- Data ----
data:
  inputs:
    - student-engagement-signals
    - lms-participation-records
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: draft-only
  decision_subject: student
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible-until-sent

# ---- Failure ----
failure:
  blast_radius: single-student
  failure_modes:
    - inappropriate-outreach-content
    - factual-error-in-outreach
    - pii-leakage-via-llm
    - missed-at-risk-student
    - false-positive-alarm-well-performing-student
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: academic-advisor
  reviewer_must_approve_every_outgoing: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    # The simulated sendOutreach tool is in-process; replace with real email/LMS API when deploying.
  rate_limit_per_message: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  student_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  ferpa_compliance_officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

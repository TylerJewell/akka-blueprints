# Risk Survey for the sales-offer-generator Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: sales-offer-generator-sample
  display_name: Sequential-Pipeline Sales Offer Generator (Akka Sample)
  one_line_description: >
    A four-stage pipeline that turns a customer brief into a policy-checked offer:
    analyze needs, match products, build a pricing strategy, compose the offer.
  scenario: |
    A user (or simulator) submits a free-text customer brief. PiiSanitizer redacts
    contact identifiers at the boundary. NeedsAnalyst turns the sanitized brief into
    structured needs. ProductMatcher selects fitting products from an in-process
    catalog. PricingStrategist builds a pricing strategy within policy bounds.
    OfferComposer writes a persuasive offer document, which a before-agent-response
    guardrail checks for total accuracy and discount policy before it is stored.
    Offers that pass are approved; those that fail are rejected with a reason. The
    pipeline is the canonical "sequential-pipeline" pattern in the sales-marketing
    domain. There is no real CRM or billing target; the offer is held in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


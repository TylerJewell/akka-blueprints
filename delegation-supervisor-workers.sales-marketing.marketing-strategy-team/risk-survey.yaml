# Risk Survey for the marketing-strategy-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: marketing-strategy-team-sample
  display_name: Marketing Strategy Team (Akka Sample)
  one_line_description: >
    A supervisor agent delegates research, strategy, and content work to specialist
    agents and assembles one grounded marketing plan with a self-evaluation score.
  scenario: |
    A user (or simulator) submits a project brief. A StrategyWorkflow delegates work to
    role-playing agents: a research agent grounds findings in an in-process web-search
    source, a strategy agent produces positioning and channels, a content agent drafts
    taglines and posts, and a supervisor agent assembles the plan. A claim-grounding
    guardrail blocks any plan whose claims are not present in the research findings, and
    a self-evaluation pass scores the plan against the brief. No external marketing system
    is touched; all artifacts are produced in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


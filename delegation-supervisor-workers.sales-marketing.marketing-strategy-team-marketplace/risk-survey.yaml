# Risk Survey for the marketing-strategy-team-marketplace Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: marketing-strategy-team-marketplace-sample
  display_name: Marketing Strategy Team (Akka Sample)
  one_line_description: >
    A campaign director delegates market research, audience targeting, messaging, and channel
    planning to four specialist agents in parallel, then assembles a compliant campaign brief.
  scenario: |
    A user (or simulator) submits a campaign objective. A CampaignDirector decomposes it into
    four parallel work items: a market-research query, an audience-targeting question, a
    messaging brief, and a channel-planning directive. MarketResearcher, AudienceTargeter,
    MessageStrategist, and ChannelPlanner each run concurrently and return typed payloads.
    The CampaignDirector assembles all four into an AssembledBrief. A before-agent-response
    guardrail vets the brief for brand and legal compliance before it is surfaced; a periodic
    eval sampler scores the assembly decision for strategic coherence. Marketing tools are
    modelled in-process — no external ad platforms are called. The scenario is the
    delegation-supervisor-workers pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation beyond standard advertising
    - frontier-scale training compute


# Eval Matrix for the social-post-team Akka sample.
#
# Schema fit: framework/schema/control.schema.yaml requires regulation_anchors on
# each control. This is a community-content sample (sales-marketing domain) with no
# industry- or jurisdiction-bound anchors, so regulation_anchors is an empty list
# across all controls.
#
# G1, G2, H1 map directly to the three governance cells of the corpus entry
# (before-tool-call guardrail, before-agent-response guardrail, hitl application).
# P1 and A1 are operational controls the pipeline wires for stale-post escalation
# and the pre-deploy test gate.

schema_version: 1
sample_id: social-post-team
generated_at: 2026-06-28

matrix_cell:
  coordination_pattern: sequential-pipeline
  domain: sales-marketing

integration_tier: runs-out-of-the-box

controls:
  - id: G1
    name: Allowlist URLs before any external fetch
    mechanism:
      kind: guardrail
      hook: before-tool-call
      flavor: tool-permission
    enforcement: blocking
    rationale: >
      The research agent fetches pages through the search and browse tools. A
      compromised or hallucinated URL must not be fetched. The guard runs before
      the side-effecting tool call.
    implementation: >
      before-tool-call guardrail on the WebTools endpoint and the ResearchAgent
      tool path checks each requested host against an approved allowlist and
      rejects anything outside it.
    regulation_anchors: []

  - id: G2
    name: Check brand voice and platform policy before content emits
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: llm-content-evaluation
    enforcement: blocking
    rationale: >
      A caption or visual brief that breaks brand voice or Instagram platform
      policy must not reach the marketer for approval. The check runs before the
      agent result is persisted.
    implementation: >
      before-agent-response guardrail in PostWorkflow.brandCheckStep evaluates the
      CaptionDraft and VisualBrief for brand-voice fit, banned terms, and platform
      policy; a failing post transitions to REJECTED with the check notes as reason.
    regulation_anchors: []

  - id: H1
    name: Human sign-off gate before publish
    mechanism:
      kind: hitl
      flavor: application
    enforcement: blocking
    rationale: >
      Marketing teams gate brand posts on human approval; this is the defining
      governance characteristic of the pipeline.
    implementation: >
      PostWorkflow pauses in awaitApprovalStep; POST /api/posts/{id}/approve and
      POST /api/posts/{id}/reject transition the workflow.
    regulation_anchors: []

  - id: P1
    name: Stale-post escalation watch
    mechanism:
      kind: eval-periodic
      flavor: performance-monitor
    enforcement: non-blocking
    rationale: >
      Posts awaiting approval beyond a threshold are escalated so they are not
      silently stuck. Service-level objective for reviewer throughput.
    implementation: >
      StalePostMonitor TimedAction runs every 30s, queries PostsView.getAllPosts,
      filters AWAITING_APPROVAL posts older than 2 minutes, and calls
      PostEntity.markEscalated.
    regulation_anchors: []

  - id: A1
    name: Test-gate before deployment
    mechanism:
      kind: ci-gate
      flavor: test-gate
    enforcement: build-gate
    rationale: >
      The pipeline publishes brand content and includes a human gate; tests must
      pass before any deploy.
    implementation: >
      Maven test phase plus an integration test driving the full
      concept -> research -> compose -> approve -> publish flow against the
      in-memory testkit.
    regulation_anchors: []

simplified_view:
  - id: G1
    name: URL allowlist
    mechanism: "guardrail · before-tool-call"
    short: Block fetches to hosts outside the approved list.
  - id: G2
    name: Brand + platform check
    mechanism: "guardrail · before-agent-response"
    short: Block off-brand or off-policy content before review.
  - id: H1
    name: Human sign-off
    mechanism: "hitl · application"
    short: Workflow pauses for marketer approve/reject.
  - id: P1
    name: Stale-post watch
    mechanism: "eval-periodic · performance-monitor"
    short: Escalate if awaiting approval > 2 min.
  - id: A1
    name: Test gate
    mechanism: "ci-gate · test-gate"
    short: Tests must pass before deploy.

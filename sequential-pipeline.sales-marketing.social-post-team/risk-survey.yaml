# Risk Survey for the social-post-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey
# is used to materialize a deployer Eval Matrix.

archetype:
  id: social-post-team-sample
  display_name: Sequential Social Post Team (Akka Sample)
  one_line_description: >
    A pipeline of agents researches a creative concept, writes Instagram caption
    copy and visual direction, runs a brand and platform-policy check, and pauses
    for a human to approve before the post is marked published.
  scenario: |
    A marketer (or simulator) submits a creative concept. A research agent gathers
    context using in-process web-search and page-browse tools, a copy agent writes
    a caption with hashtags, and a visual-director agent writes a visual brief. A
    before-agent-response guardrail checks the content for brand voice and Instagram
    platform policy. The post then waits in an approval state until a human approves
    or rejects it. On approval, the post is marked published with a generated
    permalink; posts left awaiting approval beyond two minutes are escalated.

    There is no real external publishing target in this sample; the search, browse,
    and publish steps are in-process and reversible by restoring state. The scenario
    is the canonical sequential-pipeline pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


schema_version: 1
sample_id: mcp-github-bot

# ---- Purpose ----
purpose:
  primary_function: developer-tooling-automation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: autonomous-action
  user_type: software-developer-or-devops-engineer

# ---- Data ----
data:
  inputs:
    - natural-language-user-requests
    - github-repository-metadata
    - github-issue-content
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  credential_in_transit_only: true   # GITHUB_TOKEN forwarded to MCP config; never persisted

# ---- Decisions ----
decisions:
  authority_level: autonomous-action
  decision_subject: github-repository-state
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible   # issues can be closed; comments cannot be deleted
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-repository
  failure_modes:
    - unintended-issue-creation
    - runaway-comment-spam
    - token-exposure-in-logs
    - tool-not-in-allowlist
    - agent-hallucinated-repo-target
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  operator_can_halt_writes: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - github-mcp-server
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  github-terms-of-service-compliance: TO_BE_COMPLETED_BY_DEPLOYER
  repository-owner-consent-to-ai-writes: TO_BE_COMPLETED_BY_DEPLOYER
  credential-rotation-policy: TO_BE_COMPLETED_BY_DEPLOYER

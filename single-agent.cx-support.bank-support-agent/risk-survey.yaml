schema_version: 1
sample_id: bank-support-agent

# ---- Purpose ----
purpose:
  primary_function: banking-customer-support
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: customer-support-agent-or-self-service-customer

# ---- Data ----
data:
  inputs:
    - customer-enquiry-text
    - account-lookup-results
  data_classes:
    pii: true
    phi: false
    payment-card-data: true
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_log: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: customer-account-action
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_response_before_action: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Failure ----
failure:
  blast_radius: single-customer-account
  failure_modes:
    - false-card-block
    - missed-fraud-signal
    - pii-leakage-via-log
    - risk-score-miscalibration
    - unhelpful-answer-to-genuine-query
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  card_block_requires_human_confirmation: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - account-lookup-in-process
  rate_limit_per_enquiry: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  psd2_or_open_banking_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  card_scheme_rules_in_scope: TO_BE_COMPLETED_BY_DEPLOYER

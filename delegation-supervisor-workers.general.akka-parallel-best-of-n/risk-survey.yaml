# Risk Survey for the akka-parallel-best-of-n Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: akka-parallel-best-of-n-sample
  display_name: Parallel Best-of-N (Akka Sample)
  one_line_description: >
    A supervisor fans a translation job out to N parallel worker agents with different
    style instructions, collects all variants, and selects the best one.
  scenario: |
    A user (or simulator) submits a source text and target language. A TranslationSupervisor
    decomposes the job into three variant instructions (formal, informal, literal register).
    Three TranslationWorker branches run concurrently, each producing one TranslationVariant.
    The Supervisor receives all variants and selects the best, producing a SelectionResult.
    An output guardrail vets the selected translation before it is surfaced; a periodic eval
    sampler scores the selection decision. There is no real external translation API in this
    sample — the workers are modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" parallelization pattern in the general domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification
    - frontier-scale training compute


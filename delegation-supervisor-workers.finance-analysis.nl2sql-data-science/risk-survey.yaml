# Risk Survey for the nl2sql-data-science Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: nl2sql-data-science-sample
  display_name: Multi-Agent NL2SQL Data Science (Akka Sample)
  one_line_description: >
    A coordinator translates a financial question to SQL, delegates data retrieval to a
    DataRetriever and statistical modeling to a StatisticsModeler in parallel, then
    synthesises a unified data science report.
  scenario: |
    A user (or simulator) submits a natural-language financial question. A QueryCoordinator
    translates it into a SQL plan targeting a modelled BigQuery schema. A before-tool-call
    guardrail vets the SQL for destructive keywords before any worker executes it. A
    DataRetriever runs the SQL and returns a structured dataset; a StatisticsModeler applies
    BQML-style computations and returns model metrics — both run in parallel. The Coordinator
    merges both into a DataReport. A periodic eval sampler scores the NL2SQL translation
    fidelity. There is no live BigQuery connection in this sample; the schema and tools are
    modelled in-process. The scenario is the canonical "delegation-supervisor-workers" pattern
    in the finance-analysis domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


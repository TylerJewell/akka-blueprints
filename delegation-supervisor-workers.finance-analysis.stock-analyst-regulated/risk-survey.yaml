# Risk Survey for the stock-analyst-regulated Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: stock-analyst-regulated-sample
  display_name: Stock Analysis Team (Akka Sample)
  one_line_description: >
    A supervisor delegates news search, SEC 10-Q/10-K review, and summarization
    to worker agents, then a recommendation agent emits a disclosed, sector-
    scrubbed BUY/HOLD/SELL call held for live compliance review.
  scenario: |
    A user or simulator submits a stock ticker. A supervisor workflow delegates
    research to a news agent and a filings agent, fuses their findings with a
    summary agent, sanitizes the text for fair-disclosure compliance, then asks a
    recommendation agent for a BUY/HOLD/SELL call. A before-agent-response
    guardrail enforces a regulatory disclaimer and a safety check. The
    recommendation is issued in ISSUED_PENDING_REVIEW and a compliance reviewer
    can clear or retract it live. A drift monitor periodically flags a skewed
    recommendation distribution. News and SEC filings are modeled in-process from
    sample files; there is no real market data feed.

  primary_regulations: []  # demonstrative sample; deployer anchors jurisdictions

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - biometric identification
    - autonomous order execution (recommendations are advisory only)


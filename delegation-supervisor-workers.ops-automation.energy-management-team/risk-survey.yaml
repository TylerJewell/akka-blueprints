# Risk Survey for the energy-management-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: energy-management-team-sample
  display_name: Energy Efficiency Management Agent (Akka Sample)
  one_line_description: >
    A coordinator dispatches HVAC, lighting, and equipment analysis to three specialist agents
    in parallel, gates every control action through a safety guardrail, and consolidates results
    into one actionable efficiency report.
  scenario: |
    A user (or simulator) triggers an optimization cycle for a building zone. EnergyCoordinator
    decomposes the cycle into three parallel subsystem queries. HvacSpecialist, LightingSpecialist,
    and EquipmentSpecialist analyse their respective telemetry and return typed reports. Before
    any control-action tool executes, a before-tool-call guardrail checks it against safety and
    comfort thresholds. The Coordinator consolidates all three reports into a ConsolidatedReport
    estimating energy savings. A periodic eval sampler scores the consolidated report quality.
    Building telemetry and control tools are modelled in-process — no external BMS integration
    is required for this sample. The scenario is the canonical "delegation-supervisor-workers"
    pattern in the ops-automation domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - financial advice or credit decisions


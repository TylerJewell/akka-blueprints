# Risk Survey for the trip-planner-team-mac Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: trip-planner-sample
  display_name: Trip Planner Multi-Agent (Akka Sample)
  one_line_description: >
    A supervisor delegates destination research, itinerary drafting, and booking preparation
    to three specialists in parallel, then waits for explicit user approval before confirming.
  scenario: |
    A user (or simulator) submits a trip request with a destination, dates, traveller count,
    and budget. TripSupervisor decomposes the request into three parallel work items. A
    DestinationResearcher gathers climate, visa, and highlights data. An ItineraryPlanner
    drafts a day-by-day itinerary. A BookingAgent constructs flight and accommodation
    reservation payloads. TripSupervisor compiles all three into a TripPlan. A budget
    guardrail fires before the approval step; if proposals exceed the stated budget, the trip
    is blocked. Otherwise an ApprovalEntity token is issued and the user must explicitly
    approve or reject before the trip is confirmed. No external booking system is called in
    this sample — reservation payloads are modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the planning-travel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


# Risk Survey for the parallel-hiring-reviewers Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: parallel-hiring-reviewers-sample
  display_name: Parallel Multi-Reviewer Workflow (Akka Sample)
  one_line_description: >
    A multi-perspective hiring panel where a coordinator briefs an HR reviewer,
    a manager reviewer, and a team reviewer, runs them in parallel over the same
    candidate profile, and aggregates their perspectives into one hiring
    recommendation.
  scenario: |
    A recruiter (or simulator) submits a candidate profile. A deterministic
    sanitizer redacts protected attributes from the résumé text before anything
    else runs, so only a redacted version is persisted or shown to an agent.
    The PanelCoordinator briefs three specialist reviewer agents on their axes.
    The HrReviewer, the ManagerReviewer, and the TeamReviewer run in parallel
    and each returns a typed PerspectiveReview with a per-axis decision, a
    score, and a findings list. The Coordinator aggregates the three perspectives
    into a HiringRecommendation, which an output guardrail vets before the
    evaluation is marked DECIDED.

    If a reviewer times out, the Coordinator aggregates from the remaining
    perspectives and the evaluation is marked DEGRADED. Every ten minutes a
    FairnessJudge scores how proportionately the three reviewer perspectives
    drove the overall recommendation. This sample produces an advisory
    recommendation; a human recruiter or hiring manager makes the final call.
    The scenario is the canonical "debate-multi-perspective" pattern in the
    hr-recruiting domain.

  primary_regulations: []  # community sample; deployers add jurisdiction-specific entries

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification or categorisation
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute


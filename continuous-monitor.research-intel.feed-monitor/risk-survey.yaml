schema_version: 1
sample_id: feed-monitor

# ---- Purpose ----
purpose:
  primary_function: research-intelligence-monitoring
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: notify-only
  user_type: research-analyst

# ---- Data ----
data:
  inputs:
    - rss-feed-content
    - web-feed-content
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  feed_content_licensed_for_summarization: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: notify-only
  decision_subject: research-item
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible-via-review-override

# ---- Failure ----
failure:
  blast_radius: channel-audience
  failure_modes:
    - off-channel-post
    - summary-quality-degradation
    - false-negative-classification-suppressing-high-signal-items
    - hallucinated-content-in-summary
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: research-analyst
  human_review_required_for: REVIEW-classified-items-only
  audit_frequency: weekly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - slack-post (stubbed; replace with real Slack API call at deployment)
  rate_limit_per_item: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  feed-content-copyright-cleared: TO_BE_COMPLETED_BY_DEPLOYER

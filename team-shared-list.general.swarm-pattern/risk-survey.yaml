# Risk Survey for the swarm-pattern Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: swarm-pattern-sample
  display_name: Swarm Pattern — Shared Work List (Akka Sample)
  one_line_description: >
    A coordinator agent splits a job brief into work items on a shared list;
    worker agents claim items on their own, produce results under a quality gate,
    and relay coordination messages when they need another worker's output.
  scenario: |
    A user (or simulator) submits a job brief. A Coordinator agent decomposes it
    into a dependency-ordered work-item list, and a DecompositionWorkflow writes
    one WorkItemEntity per item onto a shared list (status OPEN). A fixed roster
    of worker agents — each a durable WorkerWorkflow — polls the list, claims an
    eligible OPEN item atomically, runs the Worker agent to produce a result, and
    runs the result through a deterministic quality gate. A passing result marks
    the item DONE; a failing one retries then stalls. When a worker needs another
    worker's output it raises a relay request, which stalls the item and lands a
    message in the target worker's mailbox; a reply unblocks it. An operator can
    pause the whole swarm at any time. This is the canonical "team-shared-list"
    pattern in the general domain.

  primary_regulations: []  # general-domain educational sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - real shell or code execution on the host
    - access to production source repositories
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric processing
    - frontier-scale training compute


# Risk Survey for the kyc-screener Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: kyc-screener-sample
  display_name: KYC Screener (Akka Sample)
  one_line_description: >
    A simulated KYC pipeline where an LLM assembles entity files and produces
    screening findings, a compliance officer gates approval, and a second agent
    closes the case with the final disposition.
  scenario: |
    A compliance operator submits an entity id and references to source documents.
    ScreenerAgent assembles the entity file from the tokenized documents and
    produces findings with a recommendation. The result is persisted on CaseEntity
    and ScreeningWorkflow pauses at an approval task. A compliance officer reads
    the findings in the UI and either approves or rejects the verdict via REST. On
    approval, VerdictAgent closes the case with disposition APPROVED, and the case
    transitions to CLOSED. There is no real external watchlist or sanctions
    database; document review is in-process using supplied text.

  primary_regulations: []  # community sample; deployer must add jurisdiction anchors

  explicitly_not_applicable:
    - synthetic media
    - clinical decision support
    - judicial sentencing
    - employment scoring (unless deployer extends)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


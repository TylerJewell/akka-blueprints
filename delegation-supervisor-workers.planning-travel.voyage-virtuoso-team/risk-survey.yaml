# Risk Survey for the voyage-virtuoso-multi-agent Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: voyage-virtuoso-sample
  display_name: Voyage Virtuoso Multi-Agent (Akka Sample)
  one_line_description: >
    A director delegates flight, accommodation, experience, and logistics planning to four
    specialist agents in parallel, then assembles one premium travel itinerary.
  scenario: |
    A user (or simulator) submits a travel request with destination, origin, dates, and
    traveller tier. An ItineraryDirector decomposes it into four parallel work briefs.
    FlightSpecialist, AccommodationSpecialist, ExperienceSpecialist, and LogisticsSpecialist
    each return a typed pillar plan concurrently. The Director assembles all four into an
    ItineraryPlan. An output guardrail vets the assembled itinerary before it is surfaced;
    a periodic eval sampler scores the assembly decision. Travel tooling is modelled
    in-process in this sample — no live GDS or booking APIs are called. The scenario is the
    canonical "delegation-supervisor-workers" pattern in the planning-travel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["travel and hospitality", "premium travel advisory automation"]
  decisions.types: ["travel-itinerary recommendations"]
  decisions.automated: false
  decisions.authority_level: recommend-only
  decisions.categories: ["travel itineraries"]
  runtime.human_review_required: true

  data.types:

# Risk Survey for the akka-hitl-gate Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: akka-hitl-gate-sample
  display_name: HITL Ops Automation Gate (Akka Sample)
  one_line_description: >
    A simulated ops-automation pipeline where an LLM drafts an action proposal,
    a human gates approval, and a second agent executes the action.
  scenario: |
    An operator submits a task description. ProposalAgent analyzes the request
    and produces an ActionProposal{summary, estimatedImpact, actionPayload}.
    The proposal is persisted on ActionEntity and GateWorkflow pauses at an
    approval task. A human reviewer reads the proposal in the UI and either
    approves or rejects it via REST. On approval, ExecutionAgent invokes a
    simulated execution tool, the action transitions to EXECUTED, and an
    outcome is recorded. There is no real external system being modified;
    the execution step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


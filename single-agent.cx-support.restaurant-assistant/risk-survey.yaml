schema_version: 1
sample_id: restaurant-assistant

# ---- Purpose ----
purpose:
  primary_function: customer-service-assistant
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: action-on-behalf-of-customer
  user_type: restaurant-customer

# ---- Data ----
data:
  inputs:
    - customer-chat-messages
    - session-context
    - menu-catalog
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false

# ---- Decisions ----
decisions:
  authority_level: act-on-behalf
  decision_subject: customer-reservation-or-order
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-session
  failure_modes:
    - hallucinated-menu-item
    - incorrect-price-quoted
    - reservation-write-with-invalid-date
    - order-write-with-nonexistent-item
    - guardrail-exhaustion-leaves-session-failed
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: restaurant-operations-staff
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  customer-data-used-for-model-training: TO_BE_COMPLETED_BY_DEPLOYER

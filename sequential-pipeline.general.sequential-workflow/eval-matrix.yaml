schema_version: 1
sample_id: sequential-workflow
coordination_pattern: sequential-pipeline
domain: general

controls:
  - id: G1
    name: Reject tool calls whose phase precondition is not yet satisfied
    mechanism:
      kind: guardrail
      hook: before-tool-call
      flavor: tool-permission
    enforcement: blocking
    rationale: |
      In a four-phase sequential workflow, the contract between phases is
      carried by typed task results — VALIDATE produces a `ValidationResult`,
      ENRICH produces an `EnrichedJob`, EXECUTE produces a `JobOutput`, and
      SUMMARIZE produces a `JobSummary`. If a later phase's tool is callable
      while an earlier phase has not recorded its result, the pipeline silently
      degrades — an EXECUTE tool called before enrichment completes can operate
      on incomplete context, producing outputs whose provenance cannot be traced
      to validated inputs. The before-tool-call hook is the right cut: catch the
      misordered call at the agent–tool boundary, surface it as a structured
      rejection, and let the agent self-correct inside its iteration budget.
    implementation: |
      `StepGuardrail` is registered on `WorkflowAgent` via the agent's
      guardrail-configuration block, bound to the `before-tool-call` hook.
      Each function-tool class (`ValidateTools`, `EnrichTools`, `ExecuteTools`,
      `SummarizeTools`) carries a `Phase` constant on its methods. On every
      tool call the guardrail reads the candidate's `Phase` and the current
      `JobEntity.status` (looked up via the `jobId` carried in the in-flight
      `TaskDef.metadata`) and applies the matrix:
      `VALIDATE` tools require `status ∈ {CREATED, VALIDATING}`;
      `ENRICH` tools require `status ∈ {VALIDATED, ENRICHING}` AND
      `validation.isPresent()`;
      `EXECUTE` tools require `status ∈ {ENRICHED, EXECUTING}` AND
      `enrichedJob.isPresent()`;
      `SUMMARIZE` tools require `status ∈ {EXECUTED, SUMMARIZING}` AND
      `output.isPresent()`.
      On reject, the guardrail returns a structured `phase-violation` error to
      the agent loop and calls `JobEntity.recordGuardrailRejection` so the
      rejection is visible in the UI's rejection-log strip and in the audit log.
      On accept, the call proceeds.
    regulation_anchors: []

  - id: E1
    name: Score every emitted job result for completeness and artifact traceability
    mechanism:
      kind: eval-event
      flavor: on-completion-eval
    enforcement: non-blocking
    rationale: |
      Even a well-formed job result can be evidence-thin — a summary entry with
      no artifact reference, an artifact id cited in a summary entry but absent
      from the recorded execution output, or an entry count that does not match
      the step count. An on-completion evaluator surfaces these patterns without
      blocking the job result itself, giving the operator a fast signal about
      which results warrant a closer look before downstream consumption. A
      four-phase pipeline multiplies the ways a partially-correct output can
      slip through, so an automated completeness check at the final boundary is
      a proportionate safeguard.
    implementation: |
      `QualityScorer` runs inside `JobPipelineWorkflow.evalStep`, fired
      immediately after `JobSummarized` lands. The scorer is deterministic and
      rule-based (no LLM call — keeping the single-agent sequential-pipeline
      invariant honest). Four checks, one point per check satisfied, on a
      base of 1:
      (1) step coverage — every `JobOutput.steps[i]` has a matching
      `JobSummary.entries[j]` (`step.stepId == entry.stepId`).
      (2) artifact attribution — every `JobSummary.entries[j].artifactIds`
      list is non-empty.
      (3) artifact provenance — every cited `artifactId` appears in the
      flattened `JobOutput.steps[].artifacts[].artifactId` list (no invented
      references).
      (4) entry parity — `entries.size() == steps.size()` (no silent
      expansion or collapse).
      Emits `QualityScored{score: 1-5, rationale: String}` with a rationale
      sentence naming the largest gap. The score is surfaced on the App UI
      tab; jobs with score ≤ 2 are flagged for human inspection.
    regulation_anchors: []

simplified_view:

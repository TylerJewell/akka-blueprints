# Risk Survey for the orchestrator-workers-pattern Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: orchestrator-workers-pattern-sample
  display_name: Orchestrator-Workers Workflow (Akka Sample)
  one_line_description: >
    An orchestrator decomposes a multi-file code-edit task into per-file instructions,
    dispatches worker agents in parallel, collects reviews, and synthesises the final
    changeset.
  scenario: |
    A user (or simulator) submits a code-edit task with a description and a list of
    target files. An Orchestrator agent decomposes it into per-file FileInstruction
    items. A FileEditor worker applies edits to each file — each tool call gated by
    a before-tool-call guardrail that enforces the declared file allowlist. An
    EditReviewer agent checks each edited file. The Orchestrator merges all outputs
    into a Changeset. A periodic QualitySampler scores the synthesis decision.
    No real filesystem is accessed in this sample — file-edit tools are modelled
    in-process. The scenario is the canonical "orchestrator-workers" variant of the
    delegation-supervisor-workers pattern in the dev-code domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


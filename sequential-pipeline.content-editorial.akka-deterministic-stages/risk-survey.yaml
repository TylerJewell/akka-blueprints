schema_version: 1
sample_id: deterministic-multi-stage-agent-pipeline

# ---- Purpose ----
purpose:
  primary_function: multi-stage-story-generation-pipeline
  sector: content-editorial
  decisions_surface: creative-output
  user_type: author-or-editor

# ---- Data ----
data:
  inputs:
    - user-supplied-prompt
    - in-process-genre-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: story-draft
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  human_reviews_every_story_before_publishing: true

# ---- Failure ----
failure:
  blast_radius: single-story
  failure_modes:
    - missing-beats
    - orphaned-paragraph
    - arc-linkage-failure
    - title-mismatch
    - structural-violation
    - empty-closing-text
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: author-or-editor
  reviewer_must_approve_before_publish: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_story: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  generated-content-disclosure-required: TO_BE_COMPLETED_BY_DEPLOYER

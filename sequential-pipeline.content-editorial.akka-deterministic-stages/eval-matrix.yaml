schema_version: 1
sample_id: deterministic-multi-stage-agent-pipeline
coordination_pattern: sequential-pipeline
domain: content-editorial

controls:
  - id: G1
    name: Validate each stage output before advancing the pipeline
    mechanism:
      kind: guardrail
      hook: after-llm-response
      flavor: after-llm-response
    enforcement: blocking
    rationale: |
      In a content-editorial sequential pipeline, the structural integrity of
      each stage's output is the dependency contract for the next stage. An
      Outline with fewer than two beats gives the WRITE_BODY stage no surface
      to expand; a Body whose paragraphs reference beat ids not present in the
      upstream Outline produces an Ending that is structurally disconnected
      from the original prompt. The after-llm-response hook is the correct
      cut: intercept the typed result before the workflow's advancement step
      reads it, check the structural invariants, and surface a structured
      rejection to the agent loop so it can self-correct inside its iteration
      budget. This preserves the typed-handoff property that makes the pipeline
      deterministic — the next stage sees only validated outputs.
    implementation: |
      `StageOutputGuardrail` is registered on `StoryAgent` via the agent's
      guardrail-configuration block, bound to the `after-llm-response` hook.
      After every task returns, the guardrail reads the result's declared stage
      from `TaskDef.metadata("stage", ...)` and applies per-stage structural
      rules: OUTLINE requires `beats.size() >= 2`, all `beatId` values unique,
      all beat `text` fields non-empty; WRITE_BODY requires
      `paragraphs.size() >= outline.beats().size()` and every
      `Paragraph.beatId()` present in `outline.beats()[].beatId()`; WRITE_ENDING
      requires `closingText()` non-empty, `arcs.size() >= 1`, and every
      `Arc.paragraphIds()[0]` present in `body.paragraphs()[].paragraphId()`.
      On rejection, the guardrail returns `Guardrail.reject("structural-violation:
      <field> <constraint>, saw <actual>")` and calls
      `StoryEntity.recordGuardrailRejection(stage, field, reason)` so the
      violation is visible in the UI's rejection-log strip and in the audit log.
    regulation_anchors: []

  - id: E1
    name: Score every completed story for structural coherence
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      A story that passes every per-stage guardrail check can still lack
      end-to-end coherence — an outline beat that appears in no body paragraph,
      an arc that links to a paragraph outside the body, or a story title that
      drifts from the outline title as the pipeline progresses. An on-decision
      evaluator surfaces these cross-stage gaps without blocking story completion,
      giving the reviewer a fast signal about which stories deserve closer
      attention before publication. Because the scorer is deterministic and
      rule-based, the same story always receives the same score across restarts,
      which makes the evaluation trustworthy as an audit artifact.
    implementation: |
      `StoryStructureValidator` runs inside `StoryPipelineWorkflow.validateStep`,
      fired immediately after `EndingWritten` lands. The validator is
      deterministic and rule-based (no LLM call — keeping the single-agent
      sequential-pipeline invariant honest). Four checks, one point per check
      satisfied, on a base of 1:
      (1) genre detection — `outline.genre()` is non-empty.
      (2) beat coverage — every `outline.beats()[i].beatId()` is referenced by
      at least one `body.paragraphs()[j].beatId()`.
      (3) arc linkage — every `ending.arcs()[k].paragraphIds()[0]` appears in
      `body.paragraphs()[].paragraphId()`.
      (4) title consistency — `outline.title()` equals the story title stored
      on the entity.
      Emits `StoryValidated{score: 1-5, rationale: String}` with a rationale
      sentence naming the largest gap. The score is surfaced on the App UI tab;
      stories with score ≤ 2 are flagged for human inspection before publishing.
    regulation_anchors: []

simplified_view:

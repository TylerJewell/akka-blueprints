schema_version: 1
sample_id: agent-metrics-monitor

# ---- Purpose ----
purpose:
  primary_function: governance-risk-monitoring
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: observation-only
  user_type: platform-engineer-or-risk-officer

# ---- Data ----
data:
  inputs:
    - agent-execution-telemetry
    - bigquery-metric-rows
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: observation-only
  decision_subject: agent-system
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible

# ---- Failure ----
failure:
  blast_radius: monitoring-plane-only
  failure_modes:
    - false-negative-on-critical-agent
    - summary-overstates-severity-triggering-unnecessary-escalation
    - eval-score-drift-masking-degraded-summary-quality
    - bigquery-simulator-desync-causing-stale-health-state
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: platform-engineer-or-risk-officer
  reviewer_must_approve_every_outgoing: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    # MetricsPoller calls the BigQuery simulator (or a real BQ client when
    # deployer wires it in). No other outbound calls leave the process.
  rate_limit_per_message: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER

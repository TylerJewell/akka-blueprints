# Risk Survey for the collab-research-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: collab-research-team-sample
  display_name: Collaborative Multi-Agent Research Assistant (Akka Sample)
  one_line_description: >
    A coordinator agent fans a research question out to specialized researcher agents
    who each claim a sub-topic and gather source-backed findings; a synthesis agent
    merges the findings into a cited report that an eval gate checks for citation grounding
    before the report is published.
  scenario: |
    A user (or simulator) submits a research question. A ResearchCoordinator agent
    decomposes it into a set of sub-topics, and a PlanningWorkflow writes one
    ResearchTaskEntity per sub-topic onto a shared board (status OPEN). A fixed roster
    of researcher agents — each a durable ResearcherWorkflow — polls the board, claims
    an eligible OPEN task atomically, runs the ResearcherAgent to gather a FindingsReport,
    and marks the task DONE. An after-llm-response guardrail requires at least two source
    URLs per findings report; reports below the threshold are blocked. Once all sub-topics
    are DONE, a SynthesisWorkflow runs the SynthesisAgent to merge findings into a single
    ResearchReport. Each conclusion in the report is evaluated for citation grounding; any
    un-grounded conclusion moves the question to NEEDS_REVIEW for operator approval.
    There is no real external web search — sources, findings, and synthesis are all
    modelled in-process with Akka primitives. The scenario is the canonical
    "team-shared-list" pattern in the research-intel domain.

  primary_regulations: []  # community research-intel sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - real external web search or live data retrieval
    - access to proprietary research databases
    - clinical decision support with patient data
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric processing
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  # "Which business sector or regulated domain does this AI System operate in?"
  sector.primary: ["research and information services", "knowledge synthesis automation"]

  # "Does this AI System make, recommend, or materially support consequential or material decisions?"
  decisions.types: ["research topic decomposition", "source selection", "conclusion synthesis", "citation grounding assessment"]

  # "Can this AI System make or materially drive a decision without case-by-case human approval?"
  decisions.automated: true

  # "What categories of decisions does this AI System support?"
  decisions.categories: ["research task allocation", "knowledge synthesis", "report publication"]

  # "Is a human required to review system output before downstream action?"
  runtime.human_review_required: false  # only required for NEEDS_REVIEW questions

  # "What regulated or sensitive data does this AI System process?"
  data.types:
    - research questions entered by users
    - gathered source excerpts and URLs
    - agent-generated findings summaries
    - synthesized research reports with conclusions
    - inter-researcher coordination messages


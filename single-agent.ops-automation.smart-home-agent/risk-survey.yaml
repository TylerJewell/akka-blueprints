schema_version: 1
sample_id: smart-home-agent

# ---- Purpose ----
purpose:
  primary_function: smart-home-device-control
  sector: residential-property-management
  decisions_surface: actuation
  user_type: resident-or-home-occupant

# ---- Data ----
data:
  inputs:
    - natural-language-commands
    - device-registry-state
  data_classes:
    pii: true                          # resident identity, location patterns
    phi: false
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: true        # room-level presence implied by device state
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false  # commands are short and low-PII; no sanitizer in this baseline

# ---- Decisions ----
decisions:
  authority_level: actuation           # agent's decisions directly control physical devices
  decision_subject: iot-device
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: mostly-reversible     # lights/blinds are fully reversible; temperature changes have lag
  reviewer_reads_every_verdict_before_action: false  # non-sensitive commands dispatch automatically

# ---- Failure ----
failure:
  blast_radius: single-home
  failure_modes:
    - unintended-lock-state-change
    - thermostat-driven-to-unsafe-range
    - device-id-hallucination
    - confirmation-bypass-if-hitl-skipped
    - guardrail-miss-on-new-device-class
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true                  # HITL confirmation for sensitive commands
  human_on_loop: true                  # resident sees live command list and device state
  reviewer_role: resident
  reviewer_must_read_verdict_before_action: false  # only for HITL-gated commands
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_command: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  connected-device-data-sharing-policy: TO_BE_COMPLETED_BY_DEPLOYER

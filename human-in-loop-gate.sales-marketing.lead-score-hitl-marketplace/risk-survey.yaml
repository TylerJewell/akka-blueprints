# Risk Survey for the lead-score-flow Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: lead-score-flow-sample
  display_name: Lead Score Flow (Akka Sample)
  one_line_description: >
    A simulated lead qualification pipeline where an LLM scores a lead against ICP
    criteria, a human gates approval for ambiguous scores, and a second agent
    generates the qualification summary.
  scenario: |
    A user submits a lead profile (company name, contact email). ScoringAgent scores
    the lead against ideal customer profile criteria and records a numeric score with
    rationale and confidence. The score is persisted on LeadEntity and
    LeadScoringWorkflow pauses at a review task. A sales reviewer reads the score
    in the UI and either approves or rejects via REST. On approval, QualificationAgent
    generates the qualification verdict and recommended next steps. The lead
    transitions to QUALIFIED. There is no real CRM write; qualification is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text


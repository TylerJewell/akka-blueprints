schema_version: 1
sample_id: month-end-closer

# ---- Purpose ----
purpose:
  primary_function: month-end-close-pipeline
  sector: finance
  decisions_surface: financial-reporting
  user_type: accounting-manager

# ---- Data ----
data:
  inputs:
    - ledger-line-data
    - chart-of-accounts
    - entity-and-period-identifiers
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: journal-entry-set-and-close-package
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: reversible-with-accounting-review
  accounting_manager_approves_before_each_phase: true

# ---- Failure ----
failure:
  blast_radius: single-close-run
  failure_modes:
    - debit-credit-imbalance
    - invalid-account-code
    - missing-accrual-reversal-date
    - trial-balance-variance-exceeds-threshold
    - phase-out-of-order-tool-call
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: accounting-manager
  accounting_approval_required_after_gather: true
  accounting_approval_required_after_validate: true
  audit_frequency: monthly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_close_run: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  ledger-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  financial-reporting-standards-applicable: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: merchandiser

# ---- Purpose ----
purpose:
  primary_function: ecommerce-merchandising-proposal
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-and-publish-on-approval
  user_type: ecommerce-merchandiser

# ---- Data ----
data:
  inputs:
    - merchandising-objectives
    - product-catalog-snapshots
    - category-and-promotion-data
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    proprietary-pricing-data: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: product-catalog-change
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_reads_every_proposal_before_publish: true

# ---- Failure ----
failure:
  blast_radius: storefront-category-or-sku-set
  failure_modes:
    - hallucinated-sku
    - incorrect-price-nudge
    - promotion-conflict
    - stale-catalog-context
    - approval-timeout-expiry
    - description-misrepresentation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: ecommerce-merchandiser
  reviewer_must_approve_before_publish: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - storefront-catalog-read
    - storefront-catalog-write-post-approval
  approval_timeout_hours: 72
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  catalog-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

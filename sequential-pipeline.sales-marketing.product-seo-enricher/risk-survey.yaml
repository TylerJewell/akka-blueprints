schema_version: 1
sample_id: product-seo-enricher

# ---- Purpose ----
purpose:
  primary_function: product-seo-enrichment-pipeline
  sector: sales-marketing
  decisions_surface: recommend-only
  user_type: content-editor-or-seo-specialist

# ---- Data ----
data:
  inputs:
    - user-supplied-product-name
    - in-process-serp-fixture-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: product-keyword-enrichment
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  editor_reviews_every_enrichment_before_publishing: true

# ---- Failure ----
failure:
  blast_radius: single-product-enrichment
  failure_modes:
    - phase-violated-browser-tool
    - missing-keyword-coverage
    - hallucinated-competitor
    - meta-description-too-long
    - ungrounded-ranked-keyword
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: content-editor-or-seo-specialist
  reviewer_must_approve_before_publishing: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_enrichment: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  serp-fixture-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

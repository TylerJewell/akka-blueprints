schema_version: 1
sample_id: akka-resumable-agent-http

# ---- Purpose ----
purpose:
  primary_function: durable-agent-http-with-crash-resume
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-with-human-review
  user_type: developer-or-operator

# ---- Data ----
data:
  inputs:
    - location-query-string
    - query-type-enum
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  external_tool_invocations:
    - SlowWeatherTool (in-process mock; replace with real weather API for production)

# ---- Decisions ----
decisions:
  authority_level: automated
  decision_subject: weather-query-result
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-run
  failure_modes:
    - tool-call-with-injected-location-string
    - invalid-query-type-argument
    - repeated-crash-in-tool-call-step
    - tool-latency-exceeds-step-timeout
    - malformed-weather-report-from-tool
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  incident_panel_visible: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - SlowWeatherTool (in-process; latency configurable)
  rate_limit_per_run: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  crash_resume_enabled: true
  checkpoint_granularity: per-workflow-step

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  location-data-privacy-policy: TO_BE_COMPLETED_BY_DEPLOYER

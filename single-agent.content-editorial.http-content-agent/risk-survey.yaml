schema_version: 1
sample_id: http-content-agent

# ---- Purpose ----
purpose:
  primary_function: ai-content-generation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: fully-automated
  user_type: content-author-or-marketer

# ---- Data ----
data:
  inputs:
    - content-brief-text
    - topic-and-audience-descriptors
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  brief_may_contain_proprietary_info: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: fully-automated
  decision_subject: generated-text-content
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  human_reviews_before_publish: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Failure ----
failure:
  blast_radius: single-content-piece
  failure_modes:
    - prohibited-phrase-in-output
    - off-brand-tone
    - factual-hallucination
    - incomplete-output-missing-title-or-body
    - word-count-violation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_job: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: TO_BE_COMPLETED_BY_DEPLOYER
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  output-may-be-published-without-human-review: TO_BE_COMPLETED_BY_DEPLOYER

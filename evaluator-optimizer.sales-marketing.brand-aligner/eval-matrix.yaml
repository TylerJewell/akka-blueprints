schema_version: 1
sample_id: brand-aligner
coordination_pattern: evaluator-optimizer
domain: sales-marketing

controls:
  - id: CC1
    name: Enforce per-material word ceiling before the reviewer runs
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: output-policy
    enforcement: blocking
    rationale: |
      Marketing copy that exceeds the agreed word ceiling is immediately
      non-compliant with placement specs and media-buy contracts — sending
      it to the reviewer wastes a cycle and risks the reviewer giving
      subjective brand feedback that obscures a deterministic length
      violation. A pure-function compliance check catches the violation
      before the reviewer sees the variant, returns structured feedback to
      the Copywriter, and keeps the reviewer focused on brand-quality
      concerns rather than mechanical length errors.
    implementation: |
      Wired as the `complianceStep` of `AlignmentWorkflow`, immediately
      after `generateStep`. A pure-function check on
      `variant.wordCount() <= material.wordCeiling`. On failure, emits
      `ComplianceVerdictRecorded` with `verdict.passed = false` and
      `reasonCode = "OVER_WORD_CEILING"`, then transitions back to
      `generateStep` with a fixed `ReviewNotes("Variant exceeds the
      configured word ceiling; shorten and resubmit.")`. The
      Copywriter's next call sees the structured feedback as the prior
      review. The cycle still counts toward `maxAttempts`.
    regulation_anchors: []

  - id: E1
    name: Record every cycle's brand-compliance verdict as an eval event
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      The reviewer's approve-or-revise verdict is the highest-information
      signal produced by each alignment cycle. Recording it as a typed
      event per attempt gives brand and marketing-ops teams a continuous
      quality stream — approval rate per attempt number, average score
      drift across campaigns, frequency of word-ceiling violations — without
      instrumenting the workflow itself. This data is the foundation for
      ongoing rubric calibration and brand-health reporting.
    implementation: |
      `EvalSampler` (TimedAction) fires every 30 s. Queries
      `MaterialsView.getAllMaterials`, finds attempts that have been reviewed
      but do not yet have a matching `BrandEvalRecorded` event, and calls
      `MaterialEntity.recordEval(attemptNumber, verdict, score,
      wordCeilingExceeded)`. The call is idempotent on
      `(materialId, attemptNumber)`. The workflow itself also emits one
      `BrandEvalRecorded` event on the terminal transition (MaterialApproved
      or MaterialRejectedFinal) carrying the whole loop's outcome.
    regulation_anchors: []

  - id: HT1
    name: Halt the alignment loop gracefully at the retry ceiling
    mechanism:
      kind: halt
      flavor: graceful-degradation
    enforcement: system-level
    rationale: |
      An unconstrained evaluator-optimizer loop over marketing copy risks
      running indefinitely if a brand brief is contradictory or if the
      reviewer's rubric cannot be satisfied by the model in use. Neither
      outcome is acceptable: campaigns have deadlines, and a hung workflow
      blocks the brief queue. The halt mechanism bounds the loop at a
      configured ceiling, preserves every variant and every review on the
      entity for post-mortem analysis, and surfaces a structured rejection
      reason so a human copywriter can take over from a known best-of
      starting point.
    implementation: |
      `AlignmentWorkflow` reads `brand-aligner.alignment.max-attempts`
      (default 4) at start. Before scheduling the next `generateStep`, it
      checks `attemptCount < maxAttempts`. If the ceiling is hit, the
      workflow transitions to `rejectStep`, which emits
      `MaterialRejectedFinal` with the highest-scoring variant's text as
      the best-of and a structured `rejectionReason` ("max attempts reached"
      plus the count). `defaultStepRecovery(maxRetries(2).failoverTo(
      rejectStep))` ensures any unrecoverable agent failure also lands in
      the same terminal state rather than hanging.
    regulation_anchors: []


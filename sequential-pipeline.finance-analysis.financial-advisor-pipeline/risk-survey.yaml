schema_version: 1
sample_id: financial-advisor-pipeline

# ---- Purpose ----
purpose:
  primary_function: financial-advisory-pipeline
  sector: finance
  decisions_surface: recommend-only
  user_type: retail-investor-or-advisor

# ---- Data ----
data:
  inputs:
    - user-supplied-financial-query
    - in-process-market-data-corpus
    - in-process-instrument-registry
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: investment-strategy-and-risk-assessment
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reader_reviews_output_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-advisory
  failure_modes:
    - prohibited-return-language
    - unlicensed-tax-directive
    - directive-securities-recommendation
    - missing-risk-band
    - insufficient-allocation-breadth
    - missing-mitigation-list
    - phase-timeout
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: retail-investor-or-licensed-financial-advisor
  reader_must_review_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_advisory: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  market-data-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  disclaimer-language-reviewed-by-legal: TO_BE_COMPLETED_BY_DEPLOYER
  securities-law-jurisdiction-review-complete: TO_BE_COMPLETED_BY_DEPLOYER

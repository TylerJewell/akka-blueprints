# Risk Survey for the startup-advisor-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: startup-advisor-sample
  display_name: Startup Advisor (Multi-Agent) (Akka Sample)
  one_line_description: >
    A supervisor delegates market research, GTM strategy, content planning, and
    product roadmap work to four specialist agents in parallel, then synthesises
    one advisory report for startup founders.
  scenario: |
    A user (or simulator) submits a startup profile containing a company name,
    sector, stage, and problem statement. An AdvisorSupervisor decomposes it into
    four parallel work items. MarketResearcher maps the competitive landscape;
    GtmStrategist drafts channels and launch sequencing; ContentPlanner outlines
    content pillars; RoadmapAdvisor proposes a phased product roadmap. The
    AdvisorSupervisor merges all four into an AdvisoryReport. An output guardrail
    vets the report before it is surfaced; a periodic eval sampler scores the
    synthesis decision. No real market-data APIs are called in this sample —
    specialist tools are modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


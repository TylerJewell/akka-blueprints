# Risk Survey for the hitl-pattern Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hitl-pattern-sample
  display_name: Human-in-the-Loop (Akka Sample)
  one_line_description: >
    An educational pipeline showing how to insert a mandatory human approval step
    between an agent-produced recommendation and a downstream finalization action.
  scenario: |
    A user submits a task request. TaskProcessorAgent analyzes the request and
    produces a summary and recommendation. The result is persisted on a TaskEntity
    and the ApprovalWorkflow pauses at an approval task. A human reviewer reads the
    recommendation in the UI and either approves or rejects it via REST. On approval,
    TaskFinalizerAgent invokes a simulated finalize tool, the task transitions to
    FINALIZED, and an outcome is shown. There is no real external target system; the
    finalize step is in-process.

  primary_regulations: []  # general-domain educational sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


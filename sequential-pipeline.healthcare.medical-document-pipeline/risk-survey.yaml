schema_version: 1
sample_id: medical-document-pipeline

# ---- Purpose ----
purpose:
  primary_function: medical-document-processing-pipeline
  sector: healthcare
  decisions_surface: clinical-documentation-support
  user_type: clinician-or-clinical-staff

# ---- Data ----
data:
  inputs:
    - uploaded-medical-document-text
    - clinician-correction-annotations
  data_classes:
    pii: true                    # patient name, DOB, MRN, address, phone — tokenised at ingestion
    phi: true                    # diagnoses, medications, vitals, procedure notes — masked at ingestion
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER   # depends on patient population
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: clinical-documentation-support  # summary aids clinician; does not replace clinical judgment
  decision_subject: medical-document-summary
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible                  # summary is reviewed before entering the chart
  clinician_reviews_every_summary_before_submission: true

# ---- Failure ----
failure:
  blast_radius: single-document
  failure_modes:
    - phi-not-sanitized-before-extraction
    - pii-token-leak-in-summary
    - incorrect-field-extraction
    - unapproved-field-cited-in-summary
    - review-timeout-escalation
    - missing-mandatory-clinical-field
    - guardrail-phase-violation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true          # clinician approves extracted fields before summary is written
  human_on_loop: true          # clinician reads every summary before chart submission
  reviewer_role: licensed-clinician
  clinician_must_approve_fields_before_summarization: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_document: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  hipaa_covered_entity_or_business_associate: TO_BE_COMPLETED_BY_DEPLOYER
  phi_handling_agreement_in_place: TO_BE_COMPLETED_BY_DEPLOYER

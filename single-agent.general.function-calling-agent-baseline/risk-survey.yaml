schema_version: 1
sample_id: function-calling-agent-baseline

# ---- Purpose ----
purpose:
  primary_function: general-query-answering-with-tool-use
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: authoritative
  user_type: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Data ----
data:
  inputs:
    - user-query-text
    - tool-definitions
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  tool_results_may_contain_sensitive_data: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: authoritative
  decision_subject: user-query-answer
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_answer_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - tool-hallucination
    - invalid-tool-argument
    - credential-leak-in-answer
    - infinite-tool-loop
    - tool-result-misinterpretation
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-tool-executor
  rate_limit_per_run: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  max_iterations_per_task: 6

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  tool_access_scope_reviewed: TO_BE_COMPLETED_BY_DEPLOYER

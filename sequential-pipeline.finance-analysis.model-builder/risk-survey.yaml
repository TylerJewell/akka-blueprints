schema_version: 1
sample_id: financial-model-builder

purpose:
  primary_function: financial-model-pipeline
  sector: finance
  decisions_surface: investment-analysis
  user_type: financial-analyst

data:
  inputs:
    - user-supplied-ticker-and-period
    - sec-filings-corpus
    - earnings-data-feeds
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

decisions:
  authority_level: recommend-only
  decision_subject: financial-model
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  analyst_reviews_every_model_before_distribution: true

failure:
  blast_radius: single-model
  failure_modes:
    - unsupported-source-derivation
    - aggressive-assumption-deviation
    - missing-validation-flag
    - phase-violation
    - stale-filing-data
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: financial-analyst
  analyst_must_approve_before_distribution: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_model: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  filing-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

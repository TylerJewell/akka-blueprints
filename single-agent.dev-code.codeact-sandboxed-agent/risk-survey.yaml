schema_version: 1
sample_id: codeact-sandboxed-agent

# ---- Purpose ----
purpose:
  primary_function: automated-code-generation-and-execution
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-with-halt
  user_type: developer-or-data-engineer

# ---- Data ----
data:
  inputs:
    - natural-language-task-descriptions
    - context-data-blobs
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    secrets-in-context-data: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  secrets_scrubbed_from_outputs_before_log: true

# ---- Decisions ----
decisions:
  authority_level: automated-with-halt
  decision_subject: code-execution-output
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: task-level-irreversible
  reviewer_reads_every_output_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-sandbox-execution
  failure_modes:
    - runaway-loop
    - secret-exfiltration-via-output
    - forbidden-syscall-bypass
    - incorrect-output-accepted
    - guardrail-exhaustion-with-no-resolution
    - halt-false-positive
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_must_read_output_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - sandboxed-code-execution
  rate_limit_per_task: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  max_iterations_per_task: 5

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  context-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  sandbox-isolation-certified: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: on-brand-genmedia
coordination_pattern: evaluator-optimizer
domain: sales-marketing

controls:
  - id: G1
    name: Block prohibited content from reaching the reviewer
    mechanism:
      kind: guardrail
      hook: after-llm-response
      flavor: after-llm-response
    enforcement: blocking
    rationale: |
      Marketing copy generated by an LLM can drift into territory that exposes the
      brand to legal or reputational risk before any human sees it: competitor
      comparisons, unsubstantiated superlatives ("world's best"), or regulatory
      trigger phrases ("guaranteed results"). A brand review that evaluates such
      content wastes a cycle and risks the reviewer giving subjective feedback that
      obscures the deterministic violation. A post-response, pre-reviewer guardrail
      catches prohibited content, returns structured feedback to the brand agent,
      and keeps the reviewer focused on voice and strategy — not compliance triage.
    implementation: |
      Wired as the `guardrailStep` of `GenerationWorkflow`, immediately after
      `generateStep`. A pure-function scan of the `GeneratedAsset` text against a
      configurable prohibited-terms list (competitor names, unsubstantiated
      superlatives, regulatory trigger phrases). On failure, emits
      `AttemptGuardrailVerdictRecorded` with `verdict.passed = false` and
      `reasonCode = "PROHIBITED_CONTENT"`, then transitions back to `generateStep`
      with a fixed `ReviewNotes("Generated content contains prohibited terms;
      revise to remove them.")`. The brand agent's next call sees the structured
      feedback as the prior review. The cycle still counts toward `maxAttempts`.
    regulation_anchors: []

  - id: E1
    name: Record every review cycle's verdict as an eval event
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      The reviewer's approve-or-revise verdict is the primary quality signal the
      loop produces. Recording it as a typed event per attempt gives brand and
      compliance teams a continuous quality stream — approval rate per attempt
      number, drift in average score over time, frequency of guardrail blocks —
      without coupling the measurement logic to the workflow itself. This stream
      is also the foundation for any downstream brand-quality dashboard or
      alerting on degraded approval rates.
    implementation: |
      `EvalSampler` (TimedAction) fires every 30 s. Queries
      `AssetsView.getAllAssets`, finds attempts that have been reviewed but do not
      yet have a matching `ReviewEvalRecorded` event, and calls
      `AssetEntity.recordEval(attemptNumber, verdict, score, guardrailFailed)`.
      The call is idempotent on `(assetId, attemptNumber)`. The workflow itself
      also emits one `ReviewEvalRecorded` event on the terminal transition
      (AssetApproved or AssetRejectedFinal) carrying the whole loop's outcome.
    regulation_anchors: []

  - id: HT1
    name: Halt the generation loop gracefully at the retry ceiling
    mechanism:
      kind: halt
      flavor: graceful-degradation
    enforcement: system-level
    rationale: |
      Brand content generation loops can consume LLM budget indefinitely if a
      brief proves impossible to satisfy within the current rubric, or if the
      reviewer is inadvertently calibrated too strictly. Neither silent termination
      nor an infinite loop is acceptable for a system that must surface results to
      a campaign manager and preserve evidence for a content audit. The halt
      mechanism ends the loop at a configured ceiling, preserves every generation
      attempt and every reviewer note on the entity, and surfaces a structured
      rejection reason so the campaign team can see why no asset was approved.
    implementation: |
      `GenerationWorkflow` reads `on-brand-genmedia.generation.max-attempts`
      (default 4) at start. Before scheduling the next `generateStep`, it checks
      `attemptCount < maxAttempts`. If the ceiling is hit, the workflow transitions
      to `rejectStep`, which emits `AssetRejectedFinal` with the highest-scoring
      attempt's asset as best-of and a structured `rejectionReason`
      ("max attempts reached" plus the count). `defaultStepRecovery(
      maxRetries(2).failoverTo(rejectStep))` ensures any unrecoverable agent
      failure also lands in the same terminal state rather than hanging.
    regulation_anchors: []


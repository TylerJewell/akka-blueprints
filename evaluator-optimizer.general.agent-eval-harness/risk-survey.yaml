schema_version: 1
sample_id: agent-eval-harness

# ---- Purpose ----
purpose:
  primary_function: agent-quality-measurement
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-assessment
  user_type: ml-engineer

# ---- Data ----
data:
  inputs:
    - free-text-test-case-input
    - expected-answer-string
    - rubric-hint-string
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: automated-assessment
  decision_subject: agent-response-quality
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible

# ---- Failure ----
failure:
  blast_radius: single-run
  failure_modes:
    - judge-bias-consistent-across-cases
    - target-agent-timeout-on-single-case
    - rubric-ambiguity-causing-inconsistent-verdicts
    - suite-dataset-drift
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: weekly

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
    synthetic-media: false
    content-generation: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

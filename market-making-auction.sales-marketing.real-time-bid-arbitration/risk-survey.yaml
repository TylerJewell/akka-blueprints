# Risk Survey for the real-time-bid-arbitration Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: real-time-bid-arbitration-sample
  display_name: Real-Time Bid Arbitration Agent (Akka Sample)
  one_line_description: >
    An agent evaluates auction impression requests and returns bid decisions; pricing
    emerges from market signals, not a static configuration.
  scenario: |
    An auction request arrives carrying a floor price and impression context. A
    BidArbitrationAgent evaluates the request against campaign goals and returns a
    BidDecision (shouldBid, bidPrice, reasoning). BidWorkflow enforces a per-window
    spend cap: if the cap is already breached, the slot is halted without calling the
    agent. A burst detector escalates anomalous placements to an ops queue. A periodic
    PerformanceSampler computes win-rate and ROAS for resolved slots in the current
    window. There is no real external ad exchange in this sample — the auction exchange
    is modelled in-process. The scenario is the canonical "market-making-auction" pattern
    in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation beyond pricing signals
    - synthetic media
    - frontier-scale training compute


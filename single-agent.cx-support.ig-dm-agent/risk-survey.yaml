schema_version: 1
sample_id: ig-dm-agent

# ---- Purpose ----
purpose:
  primary_function: cx-support-dm-response
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: autonomous
  user_type: end-customer-via-social-channel

# ---- Data ----
data:
  inputs:
    - inbound-instagram-direct-messages
    - brand-voice-profiles
  data_classes:
    pii: true
    phi: false
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous
  decision_subject: outbound-brand-reply
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-message-thread
  failure_modes:
    - prohibited-term-in-reply
    - competitor-mention
    - out-of-scope-commitment
    - off-brand-tone
    - pii-leakage-via-llm
    - guardrail-iteration-exhaustion
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_message: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  social-channel-terms-of-service-compliant: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: travel-support-router

# ---- Purpose ----
purpose:
  primary_function: customer-support
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: passenger-facing-booking-change
  user_type: traveling-passenger

# ---- Data ----
data:
  inputs:
    - inbound-travel-support-requests
  data_classes:
    pii: true
    phi: false
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: false
    biometric: false
    location-fine-grained: false
    travel-document: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: hitl-confirmed
  decision_subject: passenger
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible-before-confirmation
  routing_decisions_made_by_ai: true
  booking_mutations_require_passenger_confirmation: true
  resolution_decisions_made_by_ai: true

# ---- Failure ----
failure:
  blast_radius: single-passenger
  failure_modes:
    - wrong-category-routing
    - unauthorized-booking-mutation
    - pii-leakage-via-llm
    - policy-violation-in-tool-call
    - confirmation-bypass
    - non-refundable-cancellation-outside-window
    - upgrade-above-entitlement
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: travel-support-supervisor
  reviewer_must_approve_every_outgoing: false
  passenger_must_confirm_every_booking_mutation: true
  reviewer_must_unblock_guardrail_failures: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_request: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  passenger_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  declared_frameworks: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: ad-spend-payment-agent

# ---- Purpose ----
purpose:
  primary_function: ad-creative-generation-and-media-buying
  sector: sales-marketing
  decisions_surface: act-with-human-approval
  user_type: marketing-operator

# ---- Data ----
data:
  inputs:
    - campaign-brief-free-text
    - brand-asset-fixtures
    - wallet-allow-list
    - placement-fixtures
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-human-approval
  decision_subject: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: irreversible

# ---- Failure ----
failure:
  blast_radius: campaign-budget-scope
  failure_modes:
    - payment-above-budget-cap
    - payment-to-non-allow-listed-wallet
    - approval-gate-timeout
    - credential-leakage-in-creative-output
    - planner-replan-exhaustion
    - stuck-campaign-no-approval
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: continuous
  operator_pause_control: true

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - simulated-crypto-payment
    - simulated-ad-creative-generation
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

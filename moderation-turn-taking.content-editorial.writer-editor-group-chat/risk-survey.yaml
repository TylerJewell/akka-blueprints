# Risk Survey for the writer-editor-group-chat Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: writer-editor-group-chat-sample
  display_name: Writer-Editor Group Chat (Akka Sample)
  one_line_description: >
    A moderated group chat where a Writer agent and an Editor agent take
    round-robin turns until the Editor approves the draft.
  scenario: |
    A user (or simulator) submits a topic. A GroupChatWorkflow acting as the
    group chat manager grants the floor to one agent at a time using a
    RequestToSpeak round-robin protocol. The WriterAgent drafts content; a
    before-agent-response guardrail checks it; on pass the turn is published to
    the ConversationEntity. The EditorAgent then critiques the draft and returns
    an approve/revise decision plus a score, recorded as an event-triggered eval.
    The cycle repeats until the Editor approves or a round limit is reached.
    Conversations with no new turn for two minutes are escalated. There is no
    real external publishing target; everything runs in one process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


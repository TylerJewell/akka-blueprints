schema_version: 1
sample_id: web-scraper-agent

# ---- Purpose ----
purpose:
  primary_function: web-content-extraction
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: data-extraction-only
  user_type: researcher-or-analyst

# ---- Data ----
data:
  inputs:
    - user-submitted-urls
    - operator-maintained-domain-allowlist
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_storage: true
  raw_content_preserved_for_audit: true

# ---- Decisions ----
decisions:
  authority_level: data-extraction-only
  decision_subject: web-page-content
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  downstream_consumer_reads_result_before_action: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Failure ----
failure:
  blast_radius: single-page
  failure_modes:
    - blocked-legitimate-domain
    - pii-leakage-via-downstream
    - rate-limit-false-positive
    - extraction-hallucination
    - stale-allowlist
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - http-fetch
    - llm-completion
  rate_limit_per_origin_per_60s: 5
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  scraped-page-terms-of-service-reviewed: TO_BE_COMPLETED_BY_DEPLOYER
  robots-txt-compliance-policy: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the mortgage-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies for a residential mortgage
# lending assistant. Deployer-specific answers are TO_BE_COMPLETED_BY_DEPLOYER and must be
# filled in before this survey is used to materialise a deployer Eval Matrix.

archetype:
  id: mortgage-team-sample
  display_name: Mortgage Assistant (Multi-Agent) (Akka Sample)
  one_line_description: >
    A supervisor delegates eligibility, documentation, and underwriting in parallel, then
    gates on a human underwriter's sign-off before issuing an approval or decline.
  scenario: |
    An applicant (or simulator) submits a residential mortgage application. A
    MortgageSupervisor decomposes it into three parallel work items: an eligibility check
    (income, credit, LTV), a documentation review (completeness, authenticity), and an
    underwriting analysis (risk band, term structure). A CustomerCommsAgent drafts
    notifications at key lifecycle points. The Supervisor merges all three assessments into
    a RecommendationPacket. A deterministic sectoral compliance filter vets the proposed
    terms against product rules. If the terms are compliant, the workflow pauses at
    PENDING_SIGNOFF until a credentialled underwriter records a decision via the API. On
    decision, CustomerCommsAgent drafts the outcome notification. Applicant PII is stripped
    at the workflow boundary; only an opaque applicantRef is passed to agents. A periodic
    eval sampler scores decided applications for recommendation quality. External credit
    bureaux and document stores are modelled in-process for this sample.

  primary_regulations: []  # community sample; deployer adds jurisdiction-specific anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - employment decisions
    - children data (unless deployer configures otherwise)


schema_version: 1
sample_id: brand-presentation-builder
coordination_pattern: evaluator-optimizer
domain: sales-marketing

controls:
  - id: G1
    name: Enforce per-slide word ceiling before the brand reviewer runs
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: output-policy
    enforcement: blocking
    rationale: |
      Sales presentations that violate word-count limits per slide are by
      definition non-compliant with brand guidelines before any style check
      occurs. Submitting an over-limit slide set to the reviewer wastes a
      review cycle and risks the reviewer returning style feedback that
      obscures the deterministic length violation. A deterministic per-slide
      word-count check catches violations, returns structured feedback to the
      Builder naming the offending slides, and keeps the reviewer focused on
      tone, messaging hierarchy, and call-to-action quality.
    implementation: |
      Wired as the `guardrailStep` of `PresentationWorkflow`, immediately
      after `buildStep`. A pure-function check iterates `slideSet.slides()`
      and asserts each `slide.wordCount() <= presentation.wordsPerSlide()`.
      On failure, emits `AttemptGuardrailVerdictRecorded` with
      `verdict.passed = false`, `reasonCode = "OVER_WORD_LIMIT"`, and a
      detail string listing the offending slide numbers. The workflow
      transitions back to `buildStep` with a fixed `BrandFeedback` payload
      naming those slides. The Builder's next call receives the structured
      feedback as prior context. The cycle still counts toward `maxAttempts`.
    regulation_anchors: []

  - id: E1
    name: Record every cycle's brand verdict as an eval event
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      The brand reviewer's approve-or-revise verdict is the authoritative
      signal that a slide set meets brand standards. Recording it as a typed
      event per attempt gives brand operations teams a continuous quality
      stream — approval rate per attempt number, average score trends,
      frequency of word-limit violations — without instrumenting the workflow
      itself. This stream is the primary input for measuring whether the
      Builder's revisions are converging and whether the rubric is calibrated
      correctly for the target audience.
    implementation: |
      `EvalSampler` (TimedAction) fires every 30 s. Queries
      `PresentationsView.getAllPresentations`, finds attempts that have been
      brand-reviewed but do not yet have a matching `BrandEvalRecorded`
      event, and calls `PresentationEntity.recordBrandEval(attemptNumber,
      verdict, score, guardedSlideNumbers)`. The call is idempotent on
      `(presentationId, attemptNumber)`. The workflow itself also emits one
      `BrandEvalRecorded` event on the terminal transition
      (PresentationApproved or PresentationRejectedFinal) carrying the
      whole loop's outcome.
    regulation_anchors: []

  - id: HT1
    name: Halt the loop gracefully at the retry ceiling
    mechanism:
      kind: halt
      flavor: graceful-degradation
    enforcement: system-level
    rationale: |
      A build-review loop that runs indefinitely is a production liability:
      it consumes model calls without bound and leaves the requesting user
      waiting with no visibility into progress. The halt mechanism ends the
      loop at a configured ceiling, preserves every attempt and every round
      of brand feedback on the entity, and surfaces a structured rejection
      reason so a brand operations team member can inspect why the loop
      stopped and manually curate the best slide set for further review.
    implementation: |
      `PresentationWorkflow` reads `brand-presentation.refinement.max-attempts`
      (default 4) at start. Before scheduling the next `buildStep`, it checks
      `attemptCount < maxAttempts`. If the ceiling is hit, the workflow
      transitions to `rejectStep`, which emits `PresentationRejectedFinal`
      with the highest-scoring attempt's slide set as the best-of and a
      structured `rejectionReason` ("max attempts reached" plus the count).
      `defaultStepRecovery(maxRetries(2).failoverTo(rejectStep))` ensures any
      unrecoverable agent failure also lands in the same terminal state rather
      than hanging indefinitely.
    regulation_anchors: []


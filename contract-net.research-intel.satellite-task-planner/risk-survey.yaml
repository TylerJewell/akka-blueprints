# Risk Survey for the satellite-task-planner Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: satellite-task-planner-sample
  display_name: Contract-Net Satellite Tasker (Akka Sample)
  one_line_description: >
    An auction-based planner that broadcasts observation requests to a satellite fleet,
    collects feasibility-vetted bids, and awards each task to the winning satellite.
  scenario: |
    A user (or simulator) submits an observation request specifying a target and instrument.
    An ObservationAuction workflow broadcasts the request to all registered satellites.
    Each satellite's SatelliteBidder AutonomousAgent evaluates the request against its
    current ephemeris window and returns a bid. A bid-feasibility guardrail rejects bids
    whose proposed window contradicts the satellite's recorded ephemeris before they reach
    the AuctionCoordinator. The coordinator selects the winning bid and awards the task.
    A FleetEvalSampler monitors the fleet's awarded-task completion rate periodically.
    There is no real satellite telemetry in this sample — ephemeris windows are modelled
    in-process. The scenario is the canonical "contract-net" pattern in the research-intel
    domain applied to satellite operations planning.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


schema_version: 1
sample_id: location-discovery-agent

# ---- Purpose ----
purpose:
  primary_function: location-based-place-discovery
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: traveler-or-consumer

# ---- Data ----
data:
  inputs:
    - natural-language-search-query
    - gps-coordinates
    - radius-and-category-filter
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  coordinate_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: place-to-visit
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-search
  failure_modes:
    - hallucinated-place
    - stale-place-data
    - location-leakage-via-llm
    - ranking-collapse
    - irrelevant-category-match
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: end-user
  reviewer_must_read_verdict_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_search: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_location_processing: TO_BE_COMPLETED_BY_DEPLOYER
  location-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the email-auto-responder Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: email-auto-responder-sample
  display_name: Continuous-Monitor Email Auto Responder (Akka Sample)
  one_line_description: >
    A monitored support inbox where an LLM drafts contextual replies, PII is
    redacted, low-risk replies auto-send, and sensitive ones gate on a human.
  scenario: |
    Inbound support emails arrive from a monitored source (a TimedAction drips
    canned emails from a JSONL file; a webhook endpoint also accepts real POSTs).
    Each email is ingested onto an EmailEntity and a ResponderWorkflow runs. The
    workflow first masks PII in the body, then a TriageAgent classifies intent and
    sensitivity and a ResponderAgent drafts a reply. Routine replies auto-send;
    sensitive replies pause in AWAITING_REVIEW for a human to approve or reject in
    the UI. A StuckReviewMonitor escalates emails left unreviewed past a threshold.
    The send action is in-process and simulated; there is no real mail server in
    this sample.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["customer support", "customer service automation"]
  decisions.types: ["customer communication decisions"]
  decisions.automated: false   # sensitive replies require human approval
  decisions.categories: ["outbound customer email"]
  runtime.human_review_required: true   # for the sensitive path

  data.types:

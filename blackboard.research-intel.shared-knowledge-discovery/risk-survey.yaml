archetype:
  id: blackboard-knowledge-discovery-sample
  display_name: Blackboard Knowledge Discovery on a Shared Structured Object (Akka Sample)
  one_line_description: >
    Specialist analyst agents read and write to a shared structured
    knowledge object; a control shell picks the next specialist to invoke
    based on current blackboard state.
  scenario: |
    User (or simulator) submits a research question. `InquiryRequestConsumer`
    starts a `ControlShell` workflow per inquiry. The shell reads the
    inquiry's `BlackboardEntity` state and selects the next specialist:
    `SourceScout` to propose sources, `ClaimExtractor` to derive claims from
    a source, `HypothesisSynthesizer` to propose a hypothesis from the
    current claims, or `Critic` to challenge the weakest item. Each
    specialist returns a `ProposedWrite`. Before the entity commits, a
    schema guardrail validates the payload; malformed writes are recorded
    as `WriteRejected` and never applied. Accepted writes are scored by
    `ContributionScorer` against a contribution-utility metric. The shell
    loops until a non-disputed hypothesis covers every open sub-question or
    the iteration budget is exhausted. An operator can halt the whole shell
    via `SystemControl`. No external retrieval, no web fetch — sources are
    proposed by the specialist agent under the schema guardrail and
    referenced by id in the blackboard.

  primary_regulations: []

  explicitly_not_applicable:
    - real web retrieval or live source fetch from the host
    - access to enterprise knowledge stores
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric processing
    - frontier-scale training compute


schema_version: 1
sample_id: ambient-durable-agent-pubsub

# ---- Purpose ----
purpose:
  primary_function: ops-event-processing
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-with-observable-output
  user_type: ops-engineer-or-automated-system

# ---- Data ----
data:
  inputs:
    - pub-sub-topic-messages
    - weather-request-payloads
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: weather-forecast-and-hazard-flag
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-message-execution
  failure_modes:
    - payload-injection-via-topic
    - hallucinated-forecast
    - missed-hazard-flag
    - pii-leakage-via-llm
    - invalid-payload-silently-processed
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: ops-engineer
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_request: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  topic-publisher-identity-verified: TO_BE_COMPLETED_BY_DEPLOYER

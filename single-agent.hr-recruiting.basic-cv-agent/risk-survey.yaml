schema_version: 1
sample_id: basic-cv-agent

# ---- Purpose ----
purpose:
  primary_function: cv-generation-from-candidate-profile
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: recruiter-or-hr-coordinator

# ---- Data ----
data:
  inputs:
    - candidate-profile-form
    - work-history-entries
    - education-entries
    - skills-list
    - free-text-additional-notes
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: candidate-cv-document
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_output_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-candidate-cv
  failure_modes:
    - hallucinated-experience
    - missing-section
    - pii-leakage-via-llm
    - tone-mismatch
    - empty-structured-output-section
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: recruiter-or-hr-coordinator
  reviewer_must_approve_cv_before_forwarding: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_request: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  candidate_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  profile-data-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

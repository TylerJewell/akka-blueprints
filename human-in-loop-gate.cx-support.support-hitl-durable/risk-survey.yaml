# Risk Survey for the support-hitl-durable Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: support-hitl-durable-sample
  display_name: Support Agent with HITL (Akka Sample)
  one_line_description: >
    A simulated customer support pipeline where an LLM triages a ticket with PII
    sanitization, an operator gates the decision, and a second agent drafts the
    customer response.
  scenario: |
    A user submits a support ticket with a subject and body. TriageAgent
    classifies the ticket, extracts a PII-sanitized summary, and returns a
    TicketTriage record. The summary is persisted on a TicketEntity and
    SupportWorkflow pauses at an operator-decision task. An operator reads the
    triage summary in the UI and either approves or escalates the ticket via
    REST. On approval, ResolutionAgent drafts a customer-facing response, the
    ticket transitions to RESOLVED, and the response is shown. Escalated tickets
    terminate the workflow with the operator's reason recorded. No message is
    sent to the customer by the sample itself; the resolution text is stored on
    the entity only.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - autonomous lethal targeting
    - predictive policing
    - mass surveillance
    - behavioral manipulation
    - children data (unless deployer configures otherwise)


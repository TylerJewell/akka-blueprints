schema_version: 1
sample_id: pipeline
coordination_pattern: sequential-pipeline
domain: general

controls:
  - id: G1
    name: Reject tool calls whose phase precondition is not yet satisfied
    mechanism:
      kind: guardrail
      hook: before-tool-call
      flavor: tool-permission
    enforcement: blocking
    rationale: |
      In a sequential pipeline, the contract between phases is carried by
      typed task results ‚ÄĒ COLLECT writes a `SignalSet`, ANALYZE writes an
      `Analysis`, REPORT writes a `Briefing`. If a later phase's tool is
      callable while an earlier phase has not recorded its result, the
      pipeline silently degrades to "one big agent loop" and the dependency
      property is lost. The before-tool-call hook is the right cut: catch
      the misordered call at the agent‚Äďtool boundary, surface it as a
      structured rejection, and let the agent self-correct inside its
      iteration budget.
    implementation: |
      `PhaseGuardrail` is registered on `ReportAgent` via the agent's
      guardrail-configuration block, bound to the `before-tool-call` hook.
      Each function-tool class (`CollectTools`, `AnalyzeTools`,
      `ReportTools`) carries a `Phase` constant on its methods. On every
      tool call the guardrail reads the candidate's `Phase` and the current
      `BriefingEntity.status` (looked up via the `briefingId` carried in
      the in-flight `TaskDef.metadata`) and applies the matrix:
      `COLLECT` tools require `status ‚ąą {CREATED, COLLECTING}`; `ANALYZE`
      tools require `status ‚ąą {COLLECTED, ANALYZING}` AND
      `signals.isPresent()`; `REPORT` tools require
      `status ‚ąą {ANALYZED, REPORTING}` AND `analysis.isPresent()`. On
      reject, the guardrail returns a structured `phase-violation` error to
      the agent loop and calls `BriefingEntity.recordGuardrailRejection`
      so the rejection is visible in the UI's rejection-log strip and in
      the audit log. On accept, the call proceeds.
    regulation_anchors: []

  - id: E1
    name: Score every emitted briefing for completeness and source attribution
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      Even a well-formed briefing can be evidence-thin ‚ÄĒ a section without
      a source, a source URL not present in the collected signal set, or a
      section count that does not match the analysis theme count. An
      on-decision evaluator surfaces these patterns without blocking the
      briefing itself, giving the reader a fast signal about which briefings
      deserve a closer human look.
    implementation: |
      `CompletenessScorer` runs inside `BriefingPipelineWorkflow.evalStep`,
      fired immediately after `ReportWritten` lands. The scorer is
      deterministic and rule-based (no LLM call ‚ÄĒ keeping the
      single-agent sequential-pipeline invariant honest). Four checks,
      one point per check satisfied, on a base of 1:
      (1) theme coverage ‚ÄĒ every `Analysis.themes[i]` has a matching
      `Briefing.sections[j]` (`theme.themeId == section.themeId`).
      (2) source attribution ‚ÄĒ every `Briefing.sections[j].sources` list is
      non-empty.
      (3) source provenance ‚ÄĒ every cited `Source.url` appears in the
      recorded `SignalSet.signals[].url` list (no hallucinated sources).
      (4) section parity ‚ÄĒ `sections.size() == themes.size()` (no silent
      expansion or collapse).
      Emits `EvaluationScored{score: 1-5, rationale: String}` with a
      rationale sentence naming the largest gap. The score is surfaced on
      the App UI tab; briefings with score ‚Č§ 2 are flagged for human
      inspection.
    regulation_anchors: []


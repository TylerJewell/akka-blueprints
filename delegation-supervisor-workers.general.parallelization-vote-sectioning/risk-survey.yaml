# Risk Survey for the parallelization-vote-sectioning Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: parallelization-vote-sectioning-sample
  display_name: Parallelization Workflow — Sectioning + Voting (Akka Sample)
  one_line_description: >
    A supervisor splits a job across independent section workers or dispatches it to
    multiple vote workers in parallel, then aggregates all results into one output.
  scenario: |
    A user (or simulator) submits a job with a prompt and a mode (SECTIONING or VOTING).
    A ParallelSupervisor partitions the job into section tasks or prepares a shared voting
    prompt. Workers run concurrently: SectionWorkers each process one partition;
    VoteWorkers each independently evaluate the full prompt. The Supervisor aggregates all
    results into an AggregatedOutput. An output guardrail vets the aggregated result before
    it is surfaced; a periodic eval sampler scores the aggregation decision. There are no
    real external tools in this sample — all worker behaviour is modelled in-process. This
    is the canonical "parallelization" sub-pattern of delegation-supervisor-workers in the
    general domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


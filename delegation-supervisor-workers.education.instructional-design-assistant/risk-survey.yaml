# Risk Survey for the instructional-design-assistant Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: instructional-design-assistant-sample
  display_name: Instructional Design Assistant (Akka Sample)
  one_line_description: >
    A supervisor delegates outline, materials, and assessment tasks to three specialist
    agents in parallel, assembles the results into a unit package, and gates publication
    on faculty approval.
  scenario: |
    A user (or simulator) submits a unit-design request specifying subject, grade level,
    and learning objectives. A UnitDesignSupervisor decomposes the request into an outline
    task, a materials task, and an assessment task. Three specialists run in parallel:
    OutlineSpecialist drafts the topic sequence, MaterialsSpecialist authors lesson
    activities, and AssessmentSpecialist writes quiz questions and rubrics.
    The Supervisor merges all three into an AssembledUnit. A before-agent-response
    guardrail checks the assembled content for academic-integrity violations before routing
    the unit to a faculty reviewer for final approval. Published units receive a periodic
    pedagogical quality score from EvalSampler. There are no external content services in
    this sample — all specialist outputs are modelled in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


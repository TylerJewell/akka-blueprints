# Eval Matrix for the instructional-design-assistant Akka sample.
#
# Schema fit: framework/schema/control.schema.yaml requires regulation_anchors on each
# control. This is a community-content sample (education domain) with no industry- or
# jurisdiction-bound anchors, so regulation_anchors is an empty list across all controls.

schema_version: 1
sample_id: instructional-design-assistant
generated_at: 2026-06-29

matrix_cell:
  coordination_pattern: delegation-supervisor-workers
  domain: education

integration_tier: runs-out-of-the-box

controls:
  - id: H1
    name: Require faculty approval before a unit is published
    mechanism:
      kind: hitl
      hook: application
      flavor: application
    enforcement: blocking
    rationale: >
      A unit package assembled by AI specialists carries the institution's academic
      imprimatur once published. Requiring a faculty reviewer to explicitly approve the
      assembled content before publication ensures that a human expert has verified the
      pedagogical quality, factual accuracy, and suitability of every unit, and that the
      AI's output does not reach students without that check.
    implementation: >
      After the guardrail passes, UnitDesignWorkflow writes UnitPendingReview to
      UnitPackageEntity and suspends at pendingReviewStep. The App UI surfaces a review
      form for PENDING_REVIEW units. When a faculty member calls POST /api/units/{id}/review,
      UnitDesignEndpoint records a ReviewDecisionRecorded event on FacultyReviewQueue.
      DesignRequestConsumer delivers this to the waiting workflow step, which either calls
      UnitPackageEntity.publish (PUBLISHED) on approval or UnitPackageEntity.requestRevision
      (REVISION_REQUESTED) on rejection. A rejected unit re-enters the design cycle with
      faculty feedback appended to the learning objectives.
    regulation_anchors: []

  - id: G1
    name: Vet assembled unit content for academic-integrity violations before faculty review
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: before-agent-response
    enforcement: blocking
    rationale: >
      The assembled unit is generated by AI specialists and may contain passages that
      replicate copyrighted educational material or violate academic-integrity policies.
      Checking the content before it enters faculty review prevents reviewers from
      inadvertently approving plagiarised or prohibited material, and stops such content
      from reaching students even if it passed a cursory human glance.
    implementation: >
      A before-agent-response guardrail on UnitDesignSupervisor runs a deterministic
      pattern-matcher plus an LLM judge over the AssembledUnit in
      UnitDesignWorkflow.guardrailStep. The pattern-matcher flags known plagiarism
      indicators and prohibited-content signatures; the LLM judge scores the content
      against the institution's academic-integrity policy. On failure, the workflow calls
      UnitPackageEntity.block and the unit enters BLOCKED, bypassing faculty review
      entirely.
    regulation_anchors: []

simplified_view:
  - id: H1
    name: Faculty publish gate
    mechanism: "hitl · application"
    short: Block publication until a faculty reviewer approves the assembled unit.
  - id: G1
    name: Academic-integrity guardrail
    mechanism: "guardrail · before-agent-response"
    short: Reject assembled units containing plagiarism indicators or prohibited content.

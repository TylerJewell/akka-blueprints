# Risk Survey for the lead-score-hitl Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: lead-score-hitl-sample
  display_name: Human-in-loop Lead Score (Akka Sample)
  one_line_description: >
    A lead pipeline where agents collect, analyze, and score inbound leads, a
    human approves the top-ranked leads, and a final agent drafts outreach email.
  scenario: |
    A lead arrives via API or simulator. LeadCollectionAgent enriches the lead
    after PII is sanitized; LeadAnalysisAgent summarizes fit and intent;
    LeadScoringAgent assigns a 0-100 score. The lead lands in SCORED and the
    LeadScoringWorkflow pauses. LeadRankingMonitor marks the top-ranked leads
    SHORTLISTED. A human reviewer approves or rejects each shortlisted lead. On
    approval, OutreachAgent drafts an outreach email under a before-response
    guardrail and the lead becomes CONTACTED. Rejected leads are terminal. No
    real CRM or email system is contacted; every surface is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - biometric identification
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  # "Which business sector or regulated domain does this AI System operate in?"
  sector.primary: ["sales and marketing automation", "lead generation"]

  # "Does this AI System make, recommend, or materially support consequential decisions?"
  decisions.types: ["lead prioritization", "outreach targeting"]

  # "Can this AI System make or materially drive a decision without case-by-case human approval?"
  decisions.automated: false

  # "What categories of decisions does this AI System support?"
  decisions.categories: ["sales lead scoring", "outreach selection"]

  # "Is a human required to review system output before downstream action?"
  runtime.human_review_required: true


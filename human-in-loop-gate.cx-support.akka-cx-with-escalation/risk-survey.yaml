# Risk Survey for the akka-cx-with-escalation Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: akka-cx-with-escalation-sample
  display_name: OpenAI Agents Customer Service with Escalation (Akka Sample)
  one_line_description: >
    A durable customer service workflow where an LLM handles inbound messages,
    PII is sanitized before persistence, and the conversation can hand off to a
    human agent via a workflow signal.
  scenario: |
    A customer submits a message. SupportAgent replies and decides whether to
    resolve or escalate. The conversation is held on ConversationEntity.
    If escalation is warranted, SupportWorkflow pauses at an acceptance gate.
    A human agent calls the accept-escalation endpoint, taking ownership.
    EscalationAgent then produces a structured handoff summary with priority.
    All customer messages are sanitized for PII before they are stored.
    There is no real external CRM or ticketing target; hand-off is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation targeting protected characteristics
    - synthetic media beyond conversational text


# Risk Survey for the doc-linter Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: doc-linter-sample
  display_name: Doc Linter (Akka Sample)
  one_line_description: >
    A general-assistant agent lints a Markdown file with a custom tool and summarizes the
    findings into actionable edits; user feedback tunes rule emphasis.
  scenario: |
    A user (or simulator) submits a Markdown file path. A LinterAgent calls a custom
    in-process lint tool that runs deterministic checks (heading increment, trailing
    whitespace, hard tabs, line length, missing H1, bare URL, unclosed code fence). The
    model orders the findings and writes a plain-language summary of the edits worth
    making, weighted by a learned rule profile. A documentation gate marks the run PASS or
    FAIL based on error-severity findings. The user can record feedback on a finding, which
    shifts the rule weight for the next run. Files are static sample data inside the
    service; there is no external repository access.

  primary_regulations: []  # developer-tooling sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text summaries
    - clinical decision support
    - judicial process
    - employment decisions
    - children data
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation

answers:

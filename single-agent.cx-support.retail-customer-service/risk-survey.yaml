schema_version: 1
sample_id: retail-customer-service

# ---- Purpose ----
purpose:
  primary_function: retail-customer-service
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: action-with-guardrail
  user_type: retail-customer

# ---- Data ----
data:
  inputs:
    - customer-messages
    - order-records
    - product-catalog
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false
  pii_notes: |
    Customer messages may contain delivery addresses and customer identifiers. These
    are passed as task context to the agent. A deployer handling regulated PII should
    add a sanitizer stage before the agent call or restrict the context attachment to
    the minimum fields required.

# ---- Decisions ----
decisions:
  authority_level: action-with-guardrail
  decision_subject: order-modification
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_verdict_before_action: false
  decision_notes: |
    Order cancellations and address updates are applied automatically when the
    before-tool-call guardrail permits them. A human does not approve each change;
    the guardrail is the sole gate. Deployers with higher-value orders or regulated
    goods should consider adding a human-approval step before applyModificationStep.

# ---- Failure ----
failure:
  blast_radius: single-order
  failure_modes:
    - modification-applied-to-wrong-order
    - guardrail-bypass-via-prompt-injection
    - price-undercut-commitment-in-reply
    - competitor-mention-in-customer-facing-reply
    - stale-order-status-at-guardrail-check-time
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER
  oversight_notes: |
    Human-on-loop: a customer service supervisor can review session transcripts and
    order modification logs post-hoc. No pre-approval of individual agent actions is
    required in the baseline configuration.

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - order-entity-read
    - order-entity-write
    - product-catalog-read
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  consumer-protection-disclosure-required: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the portfolio-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: portfolio-assistant-sample
  display_name: Portfolio Assistant — Multi-Agent (Akka Sample)
  one_line_description: >
    A coordinator delegates position-metrics analysis to a HoldingsAnalyst and macro-sector
    context gathering to a MarketContextAgent in parallel, then consolidates one portfolio
    report vetted by a sector sanitizer and an output guardrail.
  scenario: |
    A user (or simulator) submits a holdings set with a sector tag. A sector sanitizer
    normalizes the tag and rejects prohibited sectors before any agent work begins. For
    permitted sectors, a PortfolioCoordinator decomposes the holdings into a position query
    and a market-context question. A HoldingsAnalyst evaluates position metrics and a
    MarketContextAgent gathers macro background, running in parallel. The Coordinator merges
    both into a ConsolidatedReport. An output guardrail vets the report for explicit
    investment directives before it is surfaced; a periodic eval sampler scores the
    consolidation quality. Market-data tools are modelled in-process — no external data
    vendor is required. The scenario is the "delegation-supervisor-workers" pattern in the
    finance-analysis domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


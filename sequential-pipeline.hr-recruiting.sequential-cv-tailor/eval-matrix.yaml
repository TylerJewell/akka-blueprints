schema_version: 1
sample_id: sequential-cv-tailor
coordination_pattern: sequential-pipeline
domain: hr-recruiting

controls:
  - id: S1
    name: Strip candidate PII from every model payload before the call executes
    mechanism:
      kind: sanitizer
      hook: before-call
      flavor: pii
    enforcement: blocking
    rationale: |
      Candidate profiles in HR workflows routinely contain names, email addresses,
      phone numbers, home addresses, and dates of birth. These fields are necessary
      for downstream recruiter workflows but must not be forwarded to a third-party
      model provider — both because the provider may log inputs and because EU GDPR
      Article 9 and many US state privacy laws treat automatic processing of personal
      data as a separate, higher-scrutiny action that requires a legal basis. Stripping
      at the model boundary, rather than at ingestion, handles the risk that an
      intermediate typed result (BaseCv) re-surfaces fields from the original profile.
      The sanitizer fires on every model call across both agents; a SanitizationApplied
      audit event records each firing without echoing the suppressed values.
    implementation: |
      `PiiSanitizer` is registered on both `CvGeneratorAgent` and `CvTailorAgent`
      via each agent's sanitizer-configuration block, bound to the `before-call` hook.
      On each model call the sanitizer walks the payload looking for fields named
      `candidateName`, `email`, `phone`, `address`, and `dateOfBirth` (checked
      case-insensitively at every nesting level). Each found field is replaced with
      the literal string `"[REDACTED]"`. The number of replacements is counted;
      if `removedCount > 0` the sanitizer calls
      `CvRequestEntity.recordSanitization(requestId, removedCount, agentName)` so
      that a `SanitizationApplied{agent, removedCount, appliedAt}` event lands on the
      entity. The scrubbed payload is then passed to the model. The sanitizer never
      logs original field values; the audit trail is the count, the agent name, and
      the timestamp.
    regulation_anchors: []

  - id: E1
    name: Score every tailored CV for required-keyword alignment before surfacing to recruiter
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      In recruiting, a CV that does not surface the required keywords for a role
      will be filtered before a human reviewer sees it, wasting the candidate's
      opportunity. An on-decision evaluator catches alignment failures immediately
      after the tailor stage — before the recruiter opens the card — so they can
      decide whether to re-run, adjust the posting keywords, or accept the gap.
      The evaluator is rule-based so that the same TailoredCv always produces the
      same score; this makes it trustworthy as a quick triage signal rather than
      a probabilistic estimate that may change run-to-run.
    implementation: |
      `AlignmentScorer` runs inside `CvPipelineWorkflow.evalStep`, fired immediately
      after `TailoredCvReady` lands. The scorer is deterministic and rule-based
      (no LLM call — preserving the sequential-pipeline two-agent invariant).
      Four checks, one point per check satisfied, on a base of 1:
      (1) required-keyword coverage — every entry in `JobPosting.requiredKeywords`
      appears (case-insensitive) in the concatenated text of
      `TailoredCv.tailoredSummary` + all `ExperienceEntry.bulletPoints`.
      (2) preferred-keyword coverage — at least 50 % of `JobPosting.preferredKeywords`
      appear by the same test.
      (3) experience entries present — `TailoredCv.experience.size() >= 1`.
      (4) summary non-trivial — `TailoredCv.tailoredSummary` is non-empty and
      longer than 50 characters.
      Emits `QualityScored{score: 1-5, rationale, keywordsCovered, keywordsMissed}`.
      The score and rationale are surfaced on the App UI card; CVs with score ≤ 2
      have their card border highlighted red so the recruiter knows to inspect before
      forwarding.
    regulation_anchors: []

simplified_view:
  - id: S1
    label: PII sanitizer — strip candidate data from model payloads
    mechanism: Sanitizer
    implementation: before-call
    source: —
  - id: E1

# Risk Survey for the multi-agent-customer-router Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: cx-support-router-sample
  display_name: Multi-Agent Customer Router (Akka Sample)
  one_line_description: >
    An orchestrator agent classifies incoming support tickets and routes them to specialist
    billing, technical, or account-management agents for resolution.
  scenario: |
    A user (or simulator) submits a support ticket with a subject and body. A RouterAgent
    classifies the ticket into one of three categories: BILLING, TECHNICAL, or
    ACCOUNT_MANAGEMENT. A before-invocation guardrail audits the routing decision before
    any specialist is called. If the guardrail passes, the matching specialist agent
    (BillingAgent, TechnicalAgent, or AccountAgent) generates a resolution answer. A
    periodic eval sampler scores whether the chosen specialist actually closed the ticket.
    No external CRM or ticketing system is required in this sample — all components run
    in-process. The scenario is the canonical "delegation-supervisor-workers" pattern in
    the cx-support domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["customer support", "service desk automation"]
  decisions.types: ["ticket routing decisions", "specialist response generation"]
  decisions.automated: true
  decisions.authority_level: recommend-only
  decisions.categories: ["support ticket classification", "resolution drafts"]
  runtime.human_review_required: true

  data.types:

schema_version: 1
sample_id: durable-agent-baseline

# ---- Purpose ----
purpose:
  primary_function: durable-multi-step-work-order-execution
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: autonomous
  user_type: operations-engineer-or-workflow-operator

# ---- Data ----
data:
  inputs:
    - work-order-step-descriptions
    - work-order-metadata
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    operational-config: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  sensitive_operational_data: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: autonomous
  decision_subject: work-order-step-execution
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_reads_every_result_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-work-order
  failure_modes:
    - stalled-step
    - missed-step
    - partial-completion
    - resource-over-run
    - state-desync-on-restart
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: operations-engineer
  reviewer_monitors_via_ui: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_work_order: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  restart_recovery: durable-workflow-journaled

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  work-order-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

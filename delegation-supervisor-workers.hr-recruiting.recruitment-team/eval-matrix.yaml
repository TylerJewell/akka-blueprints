    mechanism: Eval (event)
    implementation: on-decision-eval in screenStep
    source: —
  - id: P1
    label: Fairness / drift watch
    mechanism: Eval (periodic)
    implementation: FairnessDriftMonitor every 45s
    source: —
  - id: H1

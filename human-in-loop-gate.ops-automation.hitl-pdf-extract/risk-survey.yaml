# Risk Survey for the hitl-pdf-extract Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hitl-pdf-extract-sample
  display_name: HITL PDF Data Extraction (Akka Sample)
  one_line_description: >
    A document processing pipeline where an LLM extracts structured fields from
    PDFs, PII is redacted before review, and a human gates approval of
    low-confidence results before data is posted downstream.
  scenario: |
    A user submits a PDF document URL. ExtractionAgent extracts structured field
    values and an overall confidence score. RedactionAgent then replaces PII tokens
    with [REDACTED] markers in a separate field map before any values are displayed.
    ExtractionWorkflow checks confidence: if >= 0.85, the document is auto-approved
    and posted; if < 0.85, it enters PENDING_REVIEW and the workflow pauses.
    A human reviewer reads the redacted fields in the UI and either approves or
    rejects via REST. On approval, the validated data is written to a simulated
    downstream target and the document transitions to POSTED. There is no real
    external posting target; the post step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - autonomous lethal targeting
    - predictive policing
    - mass surveillance
    - behavioral manipulation
    - children data (unless deployer configures otherwise)


# Risk Survey for the trip-planner-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: trip-planner-team-sample
  display_name: Delegation Trip Planner Team (Akka Sample)
  one_line_description: >
    A supervisor delegates a trip request to a local-expert agent, an itinerary
    agent, and a logistics agent, returning a single grounded travel plan.
  scenario: |
    A user submits a destination, free-text preferences, and a trip length. A
    TripPlanningWorkflow plays supervisor and delegates in sequence: the
    LocalExpertAgent gathers city insights from an in-process search-and-scrape
    surface (the scrape tool fenced to an allowlist), the ItineraryAgent drafts a
    day-by-day plan grounded in those insights, and the LogisticsAgent plans
    transport, lodging windows, and daily timing. The supervisor assembles a final
    plan on the TripEntity, which a TripsView streams to the UI over SSE. A
    background simulator seeds requests without UI interaction. No real travel site
    is contacted; the search and scrape surfaces are modeled inside the service.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - biometric identification
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


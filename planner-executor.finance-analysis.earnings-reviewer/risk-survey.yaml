schema_version: 1
sample_id: earnings-reviewer

# ---- Purpose ----
purpose:
  primary_function: earnings-review-and-thesis-flagging
  sector: financial-services
  decisions_surface: assisted-action
  user_type: buy-side-analyst

# ---- Data ----
data:
  inputs:
    - earnings-call-transcripts
    - 10-q-and-10-k-filings
    - internal-financial-model-state
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    material-non-public-information: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-guardrails
  decision_subject: portfolio-positions
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: single-ticker-position
  failure_modes:
    - weak-evidence-flag
    - out-of-vocabulary-category
    - stale-passage-source
    - replan-loop-no-progress
    - model-write-from-incomplete-review
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: per-review
  operator_pause_control: false

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - seeded-transcript-read
    - seeded-filing-read
    - internal-model-write
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
    market-abuse-signals: TO_BE_COMPLETED_BY_DEPLOYER
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

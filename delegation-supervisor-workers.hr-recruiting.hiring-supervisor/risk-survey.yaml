# Risk Survey for the hiring-supervisor Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: hiring-supervisor-sample
  display_name: Hiring Supervisor Orchestration (Akka Sample)
  one_line_description: >
    A hiring supervisor delegates candidate screening to a ScreeningAgent and interview
    scheduling to a SchedulingAgent in parallel, then consolidates a structured hiring
    recommendation.
  scenario: |
    A user (or pipeline simulator) submits a candidate application. A HiringSupervisor
    decomposes it into a screening task and a scheduling task. ScreeningAgent evaluates
    the candidate's qualifications and SchedulingAgent proposes interview slots, running
    in parallel. The supervisor consolidates both outputs into a HiringRecommendation.
    A before-invocation guardrail checks delegation policy before each sub-agent call.
    A special-category sanitizer strips protected-attribute fields from the raw application
    payload before any agent receives it. There is no real ATS integration in this sample —
    the candidate pipeline is modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the hr-recruiting domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - financial credit scoring


schema_version: 1
sample_id: story-teller

# ---- Purpose ----
purpose:
  primary_function: creative-story-generation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: full-automation
  user_type: content-consumer-or-author

# ---- Data ----
data:
  inputs:
    - submitted-creative-prompts
    - style-constraints
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  content_safety_filter_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: full-automation
  decision_subject: creative-story-output
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_output_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-story-output
  failure_modes:
    - incoherent-narrative
    - genre-mismatch
    - truncated-body
    - unsafe-content-generation
    - author-note-missing
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: TO_BE_COMPLETED_BY_DEPLOYER
  reviewer_role: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_request: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  content-moderation-policy_defined: TO_BE_COMPLETED_BY_DEPLOYER
  age-appropriate-content-policy_defined: TO_BE_COMPLETED_BY_DEPLOYER

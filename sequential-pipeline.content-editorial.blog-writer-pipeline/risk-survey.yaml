schema_version: 1
sample_id: blog-writer-pipeline

# ---- Purpose ----
purpose:
  primary_function: blog-content-generation-pipeline
  sector: content-editorial
  decisions_surface: recommend-only
  user_type: content-editor-or-marketer

# ---- Data ----
data:
  inputs:
    - user-supplied-topic
    - user-supplied-style-preference
    - in-process-reference-corpus
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: blog-post-content
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  editor_reviews_every_post_before_publishing: true

# ---- Failure ----
failure:
  blast_radius: single-blog-post
  failure_modes:
    - brand-voice-violation
    - section-depth-insufficient
    - forbidden-phrase
    - missing-cta
    - title-drift
    - research-reference-hallucination
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: content-editor
  editor_must_review_before_publishing: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_post: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  reference-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER
  brand-guidelines-version: TO_BE_COMPLETED_BY_DEPLOYER

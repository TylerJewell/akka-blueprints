schema_version: 1
sample_id: blog-writer-pipeline
coordination_pattern: sequential-pipeline
domain: content-editorial

controls:
  - id: G1
    name: Reject draft responses that violate brand-voice rules before recording
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: before-agent-response
    enforcement: blocking
    rationale: |
      In a content-editorial pipeline, the agent produces text that will be read
      by a human editor and potentially published under a brand identity. A draft
      that is too short, contains forbidden marketing clichés, or omits a
      call-to-action sentence must be caught before it is committed to the event
      log — not after. The before-agent-response hook is the right cut: the full
      generated BlogPost is available as a typed record before DraftWritten is
      emitted, so all three brand-voice checks (word count, forbidden-phrase scan,
      CTA presence) can run deterministically on the candidate response. Rejecting
      at this point keeps the event log clean — only brand-conformant drafts ever
      become DraftWritten events — and surfaces the specific rule violation to the
      agent so it can self-correct within its iteration budget rather than requiring
      human intervention to discard a bad draft.
    implementation: |
      `BrandGuardrail` is registered on `BlogWriterAgent` via the agent's
      guardrail-configuration block, bound to the `before-agent-response` hook.
      It fires on every agent response during the DRAFT_POST task. The guardrail
      reads the candidate `BlogPost` payload and applies three checks in order:
      (1) word-count check — concatenates `introduction`, all `sections[].body`,
      and `conclusion`, splits on whitespace, and verifies the token count is >= 300;
      (2) forbidden-phrase scan — lowercases the full post text and checks for any
      substring match against the lines in
      `src/main/resources/brand-rules/forbidden-phrases.txt`;
      (3) CTA presence — scans the `conclusion` field for at least one sentence
      containing a recognised CTA marker (case-insensitive). On the first failing
      check the guardrail returns `Guardrail.reject("brand-violation: <rule> — <detail>")`
      naming the failing rule and a short excerpt of the offending text, and calls
      `BlogPostEntity.recordGuardrailRejection` so the rejection is visible in the
      UI's rejection-log strip and in the audit log. On full pass the candidate
      BlogPost is forwarded unchanged.
    regulation_anchors: []

  - id: E1
    name: Score every completed post for section coverage, depth, title fidelity, and parity
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      A draft that passes the brand guardrail is brand-conformant, but may still
      be editorially weak — a section with fewer than 50 words, a title that drifted
      far from the agreed outline, or a section count that does not match the outline.
      An on-decision evaluator surfaces these content-quality patterns without blocking
      the post from being recorded, giving the reviewing editor a fast signal about
      which posts need revision before publication. The score is attached to the same
      card in the UI as the draft itself, so the editor sees quality context without
      opening a separate tool.
    implementation: |
      `QualityScorer` runs inside `BlogWritingWorkflow.qualityCheckStep`, fired
      immediately after `DraftWritten` lands. The scorer is deterministic and rule-based
      (no LLM call — keeping the single-agent sequential-pipeline invariant honest).
      Four checks, one point per check satisfied, on a base of 1:
      (1) section coverage — every `Outline.sections[i].sectionId` has a matching
      `BlogPost.sections[j].sectionId`.
      (2) section depth — every `BlogPost.sections[j].body` contains >= 50 words when
      split on whitespace.
      (3) title fidelity — the Levenshtein distance between `BlogPost.title` and
      `Outline.proposedTitle` is <= 20 characters (catches cases where the agent silently
      replaced the agreed title with something unrelated).
      (4) section parity — `post.sections.size() == outline.sections.size()` (no silent
      section expansion or collapse).
      Emits `QualityChecked{score: 1-5, rationale: String}` with a rationale sentence
      naming the largest gap. The score is surfaced on the App UI tab; posts with score
      <= 2 are flagged for mandatory editor review before publication.
    regulation_anchors: []

simplified_view:
  - id: G1
    label: Brand-voice draft guardrail
    mechanism: Guardrail
    implementation: before-agent-response
    source: —
  - id: E1
    label: Post quality eval
    mechanism: Eval · event
    implementation: on-decision-eval
    source: —

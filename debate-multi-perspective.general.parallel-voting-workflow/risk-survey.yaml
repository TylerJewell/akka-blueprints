# Risk Survey for the parallel-voting-workflow Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: parallel-voting-workflow-sample
  display_name: Parallelization Workflow (Akka Sample)
  one_line_description: >
    A parallel voting workflow where a dispatcher briefs three independent voter
    agents — Feasibility, Risk, and Alignment — runs them concurrently over the
    same task input, and aggregates their ballots into a final decision.
  scenario: |
    A user (or simulator) submits a task with a title and description. The
    TaskDispatcher briefs three voter agents on their respective dimensions.
    The FeasibilityVoter, RiskVoter, and AlignmentVoter run in parallel and
    each returns a typed Vote with a ballot value, a confidence score, and a
    list of weighted reasons. The Dispatcher aggregates the three votes into
    an AggregatedDecision, which records whether quorum was met. If fewer than
    two voters agree, the task enters INCONCLUSIVE; otherwise the plurality wins.

    Every five minutes an AggregationJudge scores how consistently the
    aggregated decision reflects the individual votes. There is no real action
    executor in this sample; the decision is advisory and a human decides what
    to do with it. The scenario is the canonical "debate-multi-perspective"
    voting pattern in the general domain.

  primary_regulations: []  # general-domain sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification or categorisation
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute


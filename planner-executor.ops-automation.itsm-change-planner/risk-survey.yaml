schema_version: 1
sample_id: itsm-change-planner

# ---- Purpose ----
purpose:
  primary_function: itsm-change-plan-generation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: assisted-action
  user_type: it-operations-staff

# ---- Data ----
data:
  inputs:
    - change-request-text
    - cmdb-configuration-item-records
    - historical-change-records
    - ci-allow-list
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: act-with-guardrails
  decision_subject: production-infrastructure-change-steps
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible

# ---- Failure ----
failure:
  blast_radius: single-change-scope
  failure_modes:
    - incomplete-backout-on-test-failure
    - guardrail-bypass-via-ambiguous-ci-name
    - cab-approval-spoofing-if-auth-not-enforced
    - stuck-change-blocking-cab-queue
    - planner-hallucinating-nonexistent-ci
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: true
  reviewer_role: change-advisory-board-member
  audit_frequency: per-change
  operator_pause_control: true

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - simulated-executor-action
    - simulated-test-runner
    - simulated-backout-action
  rate_limit_per_user: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER

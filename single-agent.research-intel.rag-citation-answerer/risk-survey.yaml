schema_version: 1
sample_id: rag-citation-answerer

# ---- Purpose ----
purpose:
  primary_function: document-question-answering-with-citations
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: informational
  user_type: researcher-or-analyst

# ---- Data ----
data:
  inputs:
    - uploaded-documents
    - user-submitted-questions
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: TO_BE_COMPLETED_BY_DEPLOYER
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: informational
  decision_subject: document-corpus-query
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - hallucinated-citation
    - out-of-scope-answer
    - pii-leakage-via-retrieval
    - low-confidence-accepted-as-high
    - incomplete-citation-coverage
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: researcher-or-analyst
  reviewer_must_read_answer_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  document-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

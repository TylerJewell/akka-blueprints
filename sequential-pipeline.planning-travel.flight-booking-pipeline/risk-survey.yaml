schema_version: 1
sample_id: flight-booking-pipeline

# ---- Purpose ----
purpose:
  primary_function: flight-booking-pipeline
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: action-on-behalf-of-user
  user_type: traveller

# ---- Data ----
data:
  inputs:
    - user-supplied-origin
    - user-supplied-destination
    - user-supplied-travel-date
    - in-process-flight-inventory
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: action-on-behalf-of-user
  decision_subject: flight-reservation
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: irreversible-with-cost
  user_confirms_before_commit: true

# ---- Failure ----
failure:
  blast_radius: single-booking
  failure_modes:
    - premature-booking-write
    - phase-violation
    - duplicate-reservation
    - seat-unavailable
    - user-confirmation-timeout
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: traveller
  user_must_confirm_before_commit: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_booking: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  flight-inventory-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

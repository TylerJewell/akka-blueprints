schema_version: 1
sample_id: slack-assistant

# ---- Purpose ----
purpose:
  primary_function: ops-channel-assistant
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: answer-and-escalate
  user_type: ops-or-sre-engineer

# ---- Data ----
data:
  inputs:
    - slack-channel-messages
    - channel-history-context-window
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    secrets-or-credentials: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  secrets_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: answer-and-escalate
  decision_subject: ops-channel-query
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_reply_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-channel-thread
  failure_modes:
    - secret-leakage-via-llm-reply
    - hallucinated-runbook-url
    - wrong-action-type-classification
    - escalation-to-wrong-oncall
    - context-window-overflow
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: channel-member-or-oncall
  reviewer_must_read_reply_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - slack-api-post
  rate_limit_per_message: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  slack-workspace-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

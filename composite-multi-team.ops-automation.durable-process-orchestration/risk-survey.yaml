# Risk Survey for the sk-process Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: sk-process-sample
  display_name: Composite SK Process (Akka Sample)
  one_line_description: >
    A durable process-orchestration pipeline where a coordinator agent plans ordered
    steps, a pool of executor agents claims steps off a shared board, and a quality-
    checker panel validates the completed batch before the job is finalised.
  scenario: |
    A user (or simulator) submits an automation job with a process template. A
    ProcessCoordinator agent plans a StepPlan. A StepPlanner agent refines it into
    a DetailedPlan; the workflow writes one StepEntity per step onto the board. A
    roster of ExecutorWorkflow instances (executor-1, executor-2, executor-3) each
    poll the shared StepBoardView, claim open steps atomically, run StepExecutor to
    produce a result, and mark the step done. Once all steps are done, a quality
    panel runs: QualityChecker instances each evaluate the completed batch on one
    criterion (format, completeness, policy), and a deterministic QualityRule turns
    their notes into a pass-or-retry verdict. On a passing verdict the
    ProcessCoordinator assembles the JobSummary under an output guardrail and the
    job is finalised.

    Every write into the shared workspace passes a before-tool-call guardrail. An
    operator dashboard streams live job and step state via SSE; the operator can
    pause and resume any running job through the dashboard. After completion an
    operator can record an audit review. There is no real external execution target
    in this sample; all steps are run in-process. The scenario is the canonical
    "composite-multi-team" pattern in the ops-automation domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  # "Which business sector or regulated domain does this AI System operate in?"
  sector.primary: ["operations automation", "workflow orchestration"]

  # "Does this AI System make, recommend, or materially support consequential or material decisions?"
  decisions.types: ["operational workflow decisions", "quality gate verdicts"]

  # "Can this AI System make or materially drive a decision without case-by-case human approval?"
  decisions.automated: true

  # "What categories of decisions does this AI System support?"
  decisions.categories: ["process step planning", "step execution", "quality validation", "job finalisation"]

  # "Is a human required to review system output before downstream action?"
  runtime.human_review_required: false

  # "What regulated or sensitive data does this AI System process?"
  data.types:
    - process template names and job payloads submitted by operators
    - step outputs generated by executor agents
    - quality checker notes and verdicts
    - job summaries generated at finalisation


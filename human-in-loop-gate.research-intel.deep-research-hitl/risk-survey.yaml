# Risk Survey for the deep-research-hitl Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: deep-research-hitl-sample
  display_name: HITL Deep Research (Akka Sample)
  one_line_description: >
    A multi-agent research pipeline where an LLM decomposes a query, investigates
    sub-topics, synthesises a report, and a human gates approval before delivery.
  scenario: |
    A user submits a research query. PlannerAgent decomposes it into focused
    sub-topics. ResearchAgent investigates each sub-topic in sequence, returning
    findings and cited sources. SynthesisAgent assembles the findings into a
    coherent report draft. The draft is persisted on ResearchEntity and the
    ResearchWorkflow pauses at a review task. A human reviewer reads the report in
    the UI and either approves or rejects it with revision notes via REST. On
    approval, the report transitions to DELIVERED with a timestamp. On rejection,
    the workflow re-enters the synthesis step with the reviewer's notes, producing
    a revised draft for another review cycle. There is no real external delivery
    target; the deliver step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation

answers:

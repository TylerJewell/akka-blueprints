# Risk Survey for the assistloop-support Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: assistloop-support-sample
  display_name: AssistLoop Customer Support (Akka Sample)
  one_line_description: >
    A simulated customer support pipeline where an LLM triages a ticket and
    drafts a response, a human supervisor gates approval, and a second agent
    delivers the response to the customer.
  scenario: |
    A customer submits a support ticket. TriageAgent analyzes the message and
    drafts a resolution response. The draft is persisted on a TicketEntity and
    SupportWorkflow pauses at an approval task. A supervisor reads the draft
    in the UI and either approves or rejects it via REST. On approval,
    ResolutionAgent invokes a simulated deliver-response tool, the ticket
    transitions to RESOLVED, and a confirmation id appears. There is no real
    external delivery target; the resolution step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - children data (unless deployer configures otherwise)


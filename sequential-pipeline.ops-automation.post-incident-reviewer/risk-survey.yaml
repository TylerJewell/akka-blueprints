schema_version: 1
sample_id: post-incident-reviewer

# ---- Purpose ----
purpose:
  primary_function: post-incident-review-pipeline
  sector: technology-operations
  decisions_surface: recommend-only
  user_type: incident-owner-or-ops-manager

# ---- Data ----
data:
  inputs:
    - incident-id-reference
    - in-process-incident-corpus
  data_classes:
    pii: true          # incident records may include employee names and on-call contacts
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: post-incident-review-document
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  incident_owner_approves_before_finalization: true

# ---- Failure ----
failure:
  blast_radius: single-incident-review
  failure_modes:
    - missing-executive-summary
    - action-item-without-owner
    - hallucinated-timeline-reference
    - impact-severity-mismatch
    - signoff-workflow-stall
    - evidence-gap-in-assessment
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reader_role: incident-owner
  incident_owner_must_approve_before_completion: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_review: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  incident-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

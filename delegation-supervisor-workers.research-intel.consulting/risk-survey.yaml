# Risk Survey for the consulting Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: consulting-sample
  display_name: Delegation-with-Handoff Consulting Triage (Akka Sample)
  one_line_description: >
    A coordinator triages each consulting engagement, delegating routine research
    to a junior worker agent or handing high-stakes work off to a senior agent.
  scenario: |
    A user (or intake simulator) submits an engagement brief. A ConsultingCoordinator
    agent classifies the brief and returns a routing decision: DELEGATE routine work
    to the JuniorResearcher, or HANDOFF high-stakes work to the SeniorConsultant. The
    chosen agent produces a typed deliverable, which an output guardrail checks before
    it is persisted on the EngagementEntity and shown in the UI.

    Routing decisions are scored by a non-blocking eval. Senior recommendations on
    escalated engagements receive a non-blocking compliance review recorded by a human
    reviewer. There is no real external client system; intake and delivery are modeled
    in-process. The scenario is the canonical "delegation-supervisor-workers" pattern
    in the research-intel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification
    - synthetic media beyond text

answers:
  # ---- Pre-filled by sample author ----

  # "Which business sector or regulated domain does this AI System operate in?"
  sector.primary: ["management consulting", "market and competitive research"]

  # "Does this AI System make, recommend, or materially support consequential or material decisions?"
  decisions.types: ["routing of engagements", "advisory research and recommendations"]

  # "Can this AI System make or materially drive a decision without case-by-case human approval?"
  decisions.automated: false

  # "What categories of decisions does this AI System support?"
  decisions.categories: ["advisory only"]

  # "Is a human required to review system output before downstream action?"
  runtime.human_review_required: true

  # "What regulated or sensitive data does this AI System process?"
  data.types:
    - engagement briefs entered by users
    - research and recommendation content generated by the agents
    - routing and compliance-review metadata

  # "Will people directly chat with, receive messages from, or otherwise interact with this AI System?"
  capability.direct_human_interaction: false

  # "Can this AI System generate or manipulate synthetic text, audio, image, or video content?"
  capability.synthetic_media: true

  # "Can this AI System generate text or other content for publication or user consumption?"
  capability.content_generation: true

  # "Does this AI System infer emotions or intentions from biometric data?"
  capability.emotion_recognition: false

  # "Does this AI System categorize people based on biometric data?"
  capability.biometric_categorisation: false

  # "Is this AI System used for law-enforcement, public-safety, criminal-justice, investigation, prosecution, or offender-management purposes?"
  capability.law_enforcement_context: false

  # "Does this AI System operate, secure, monitor, or materially support critical infrastructure?"
  capability.critical_infrastructure: false

  # "Is this AI System used in a military, defense, national-security, or rules-of-engagement context?"
  capability.defense_context: false

  # "Is the underlying model a general-purpose AI (GPAI) model?"
  model.gpai: true

  # "Is the underlying model a foundation model?"
  model.foundation: true

  # "Does the model meet systemic-risk thresholds (e.g. EU AI Act systemic-risk GPAI)?"
  model.systemic_risk: false

  # "Which synthetic-media modalities does this system generate?"
  capabilities.synthetic_media_modalities: ["text"]

  # "Is this AI System used for predictive policing?"
  capabilities.predictive_policing: false

  # "Is this AI System used for mass surveillance?"
  capabilities.mass_surveillance: false

  # "Is this AI System capable of autonomous lethal targeting?"
  capabilities.autonomous_lethal_targeting: false

  # "Does this AI System engage in behavioral manipulation?"
  capabilities.behavioral_manipulation: false

  # "Is this AI System used for clinical decision support?"
  capabilities.clinical_decision_support: false

  # "Is this AI System used in a judicial process?"
  capabilities.judicial_process_use: false

  # "Does this AI System make or materially support employment decisions?"
  decisions.employment_decision: false

  # "Which consequential life-domains do this system's decisions touch?"
  decisions.consequential_domains: []

  # "Which modalities does this AI System support?"
  capabilities.modalities: ["text"]

  # "Does this AI System have direct user-facing interaction?"
  capabilities.user_facing_interaction: false

  # "Do this system's decisions affect natural persons?"
  decisions.affects_natural_persons: false

  # "Do this system's decisions affect a protected class?"
  decisions.affects_protected_class: false

  # "Are minors among the users?"
  users.minors: false

  # "Are children among the data subjects?"
  subjects.children: false

  # ---- Sample-author defaults ----

  # "What is the upstream third-party topology of this AI System?"
  third_party.topology: built on Akka

  # "Have third-party vendors provided attestations for their components?"
  third_party.vendor_attested: no


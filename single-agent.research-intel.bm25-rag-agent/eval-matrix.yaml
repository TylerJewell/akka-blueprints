schema_version: 1
sample_id: bm25-rag-agent
coordination_pattern: single-agent
domain: research-intel

controls:
  - id: G1
    name: Reject ungrounded citations before the agent returns
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: citation-grounding-validator
    enforcement: blocking
    rationale: |
      A retrieval-augmented agent that can cite arbitrary passage ids undermines
      the entire point of retrieval: if the answer can reference passages that
      were never retrieved and delivered, the system provides no stronger
      grounding guarantees than a plain LLM call. The before-agent-response
      hook is the right enforcement point — it inspects the candidate answer
      before any downstream component sees it, rejects citations to passages
      outside the delivered attachment set, and forces the agent to retry
      within its iteration budget. This ensures that every QueryAnswer that
      reaches the entity log is provably grounded in the retrieved evidence
      that was actually supplied to the model.
    implementation: |
      `CitationGuardrail` is registered on `CorpusQueryAgent` via the agent's
      guardrail-configuration block, bound to the `before-agent-response` hook.
      On each candidate response it (1) parses the candidate into `QueryAnswer`,
      (2) computes the set of passageIds that were delivered as attachments in
      this task (derived from `RetrievedPassages` on the `QueryEntity`),
      (3) asserts every `citations[].passageId` is a member of that set,
      and (4) asserts `answerType` is in `{DIRECT, PARTIAL, NO_ANSWER}`. On
      any failure it returns `Guardrail.reject(<structured-error>)` with a code
      naming which check failed (`citation-not-grounded` or `invalid-answer-type`);
      the agent loop consumes one of its 3 iterations and retries. Passing
      responses flow through to `QueryWorkflow.answerStep`.
    regulation_anchors: []

simplified_view:
  - id: G1
    label: Citation-grounding guardrail
    mechanism: Guardrail
    implementation: before-agent-response
    source: —

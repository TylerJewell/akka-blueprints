schema_version: 1
sample_id: guardrails-side-by-side

# ---- Purpose ----
purpose:
  primary_function: governance-risk-advisory
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: governance-or-risk-professional

# ---- Data ----
data:
  inputs:
    - user-submitted-prompts
    - policy-profile-selection
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: governance-risk-question
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_verdict_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-prompt
  failure_modes:
    - off-topic-prompt-passes-screener
    - policy-violating-response-passes-validator
    - hallucinated-policy-reference
    - excessive-hedging-providing-no-guidance
    - guardrail-agent-timeout-blocking-pipeline
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: governance-or-risk-professional
  reviewer_must_read_response_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_prompt: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 3
  agent_pattern: single-agent
  guardrail_agents: 2
  primary_agents: 1

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  prompt-content-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the hitl-concierge Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hitl-concierge-sample
  display_name: HITL Concierge (Akka Sample)
  one_line_description: >
    A simulated customer support pipeline where an LLM triages a service
    request, a specialist gates approval, and a second agent fulfils the
    resolution.
  scenario: |
    A customer submits a service request. TriageAgent analyses the request and
    proposes a resolution with an urgency rating. The result is persisted on a
    CaseEntity and the ConciergeWorkflow pauses at an approval task. A support
    specialist reads the proposed resolution in the UI and either approves or
    declines it via REST. On approval, FulfillmentAgent invokes a simulated
    fulfilment tool and the case transitions to FULFILLED with a confirmation
    id. There is no real external fulfilment target; the step is in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - autonomous fulfilment without human gate
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


schema_version: 1
sample_id: ambient-expense-agent

# ---- Purpose ----
purpose:
  primary_function: expense-report-capture-and-categorization
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: autonomous-for-approved-items
  user_type: employee-or-finance-approver

# ---- Data ----
data:
  inputs:
    - raw-receipt-text
    - voice-transcript
  data_classes:
    pii: true
    phi: false
    payment-card-data: true
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous
  decision_subject: expense-line-item
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: reversible-until-erp-sync
  reviewer_reads_every_verdict_before_action: false
  blocked_items_require_human_resolution: true

# ---- Failure ----
failure:
  blast_radius: single-expense-submission
  failure_modes:
    - missed-line-item
    - wrong-category
    - pii-leakage-via-llm
    - amount-extraction-error
    - policy-limit-bypass
    - currency-misparse
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: finance-approver
  human_reviews_blocked_items: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - expense-system-submission
  rate_limit_per_submission: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  expense-policy-version-in-effect: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: customer-service-tool-agent

# ---- Purpose ----
purpose:
  primary_function: customer-support-query-resolution
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-action
  user_type: customer-or-support-operator

# ---- Data ----
data:
  inputs:
    - customer-messages
    - order-records
    - account-records
    - product-catalog
  data_classes:
    pii: true
    phi: false
    payment-card-data: true
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: false
  pii_sanitized_from_log_output: true

# ---- Decisions ----
decisions:
  authority_level: automated-action
  decision_subject: customer-support-request
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-customer-session
  failure_modes:
    - hallucinated-tool-result
    - pii-in-reply
    - over-threshold-write-approved-by-mistake
    - ungrounded-reply
    - tool-call-loop-exhaustion
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: support-supervisor-or-operator
  reviewer_reviews_escalated_sessions: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - order-lookup
    - account-read
    - account-write
    - inventory-check
    - escalation-ticket-create
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  payment-card-handling-compliant: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the bulk-doc-analyzer Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: bulk-doc-analyzer-sample
  display_name: High-Volume Document Analyzer (Akka Sample)
  one_line_description: >
    A coordinator delegates field extraction to an Extractor and risk classification to a
    Classifier in parallel, then merges their outputs into one PII-sanitized document record.
  scenario: |
    A user (or simulator) submits a batch of raw document strings. A BatchCoordinator
    partitions the batch into per-document extraction and classification instructions.
    An Extractor pulls structured fields (date, author, reference number, body text) and
    a Classifier assigns a risk category and sensitivity level, running in parallel per
    document. The Coordinator merges both outputs; a PII sanitizer scrubs personal data
    before the record is persisted. A periodic quality sampler scores the merge decision.
    The document ingest pipeline and agent tools are modelled in-process — no external
    document store is required in this sample. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the ops-automation domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


schema_version: 1
sample_id: docreview
coordination_pattern: single-agent
domain: legal-compliance

controls:
  - id: S1
    name: Redact PII before any LLM call
    mechanism:
      kind: sanitizer
      flavor: pii
    enforcement: blocking
    rationale: |
      Submitted documents routinely contain emails, phone numbers, government
      identifiers, payment-card-like tokens, postal addresses, and account
      identifiers. None of those belong in an LLM call body. Redaction runs in a
      Consumer between the raw submission and the agent invocation; the raw
      document is preserved on the entity for audit but is never the input
      seen by the model.
    implementation: |
      `DocumentSanitizer` Consumer subscribes to `DocumentSubmitted` events
      emitted by `ReviewEntity`. It runs a pipeline of regex stages (well-known
      formats), a heuristic stage (person names, postal addresses), and an
      account-id-token stage. Outputs a `SanitizedDocument` carrying the
      redacted text plus the list of categories found. Calls
      `ReviewEntity.attachSanitized(sanitized)`. `ReviewWorkflow.reviewStep`
      then passes `sanitized.redactedDocument` as the `DocumentReviewerAgent`
      task attachment; the raw payload remains accessible only via
      `request.rawDocument` on the entity, never on the wire to the model.
    regulation_anchors: []

  - id: G1
    name: Reject malformed verdicts before the agent returns
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: structured-output-validator
    enforcement: blocking
    rationale: |
      A single-agent decision-making system is one bad parse away from a
      malformed verdict propagating into the entity log and the UI. The
      before-agent-response hook is the right cut: catch the bad response
      before it leaves the agent's loop, force a retry inside the same task,
      and only let well-formed verdicts reach the workflow.
    implementation: |
      `VerdictGuardrail` is registered on `DocumentReviewerAgent` via the
      agent's guardrail-configuration block, bound to the
      `before-agent-response` hook. On each candidate response it (1) parses
      the response into `ReviewVerdict`, (2) asserts every
      `findings[].instructionId` is present in the submitted
      `List<ReviewInstruction>`, (3) asserts every `severity` is in
      `{LOW, MEDIUM, HIGH, CRITICAL}`, and (4) asserts every submitted
      instruction has at least one corresponding finding. On any failure
      returns a structured rejection naming the failed check; the agent loop
      consumes one of its 3 iterations and retries. Passing responses flow
      through to `reviewStep`.
    regulation_anchors: []

  - id: E1
    name: Score every verdict for evidence quality
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      Even a well-formed verdict can be evidence-thin — findings with empty
      quotes, recommendations that are observations rather than actions,
      severity distributions that collapse to all-LOW. An on-decision
      evaluator surfaces these patterns without blocking the verdict
      itself, giving reviewers a fast signal about which decisions deserve
      a closer human look.
    implementation: |
      `EvaluationScorer` runs inside `ReviewWorkflow.evalStep`, fired
      immediately after `VerdictRecorded` lands. The scorer is deterministic
      and rule-based (no LLM call — keeping the single-agent invariant
      honest): checks that every `Finding.documentSection` and
      `Finding.quote` are non-empty, that every `recommendation` begins
      with an actionable verb, and that the severity distribution across
      findings is not collapsed (a uniform all-LOW or all-CRITICAL verdict
      loses 1 point). Emits `EvaluationScored` with a 1–5 score and a
      one-line rationale. The score is surfaced on the App UI tab; reviews
      with score ≤ 2 are flagged for human inspection.
    regulation_anchors: []


# Risk Survey for the ambient-email-assistant Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: ambient-email-assistant-sample
  display_name: Ambient Email Assistant (Akka Sample)
  one_line_description: >
    An ops-automation agent that triages incoming email, drafts replies or meeting
    proposals, and requires human approval before executing any outbound action.
  scenario: |
    An operator submits an incoming email (sender, subject, body) via the API.
    TriageAgent classifies the email by category and urgency and suggests an action
    (reply or meeting). ReplyDraftAgent or MeetingSchedulerAgent drafts the action.
    EmailWorkflow pauses at an approval gate. The operator reviews the draft in the
    UI and either approves or dismisses it. On approval, the workflow executes the
    action (simulated Gmail send or Calendar create) and closes the thread. Email
    content is sanitized of PII before entering any LLM prompt. Eval events with
    LLM-as-judge scores are emitted after each agent decision.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions affecting natural persons without human review
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation

answers:
  # ---- Pre-filled by sample author ----
  sector.primary: ["operations automation", "enterprise productivity", "email management"]
  decisions.types: ["communication routing decisions", "calendar scheduling decisions"]
  decisions.automated: false
  decisions.categories: ["operational workflow decisions"]
  runtime.human_review_required: true
  data.types:
    - email subject lines and bodies submitted by the operator
    - sender identifiers (email addresses)
    - LLM-generated reply drafts and meeting proposals
    - triage classification metadata (category, urgency, suggested action)
    - eval scores (sanitized input/output summaries and judge scores)
  capability.direct_human_interaction: true
  capability.synthetic_media: false
  capability.content_generation: true
  capability.emotion_recognition: false
  capability.biometric_categorisation: false
  capability.law_enforcement_authorization: false
  capability.law_enforcement_context: false
  capability.critical_infrastructure: false
  capability.defense_context: false
  model.gpai: true
  model.foundation: true
  model.systemic_risk: false
  capabilities.synthetic_media_modalities: []
  capabilities.predictive_policing: false
  capabilities.mass_surveillance: false

schema_version: 1
sample_id: voice-agent

# ---- Purpose ----
purpose:
  primary_function: voice-cx-support-agent
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: autonomous-action
  user_type: contact-centre-caller

# ---- Data ----
data:
  inputs:
    - caller-audio-transcripts
    - caller-identifier
    - conversation-history
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: true
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous-action
  decision_subject: caller-response-text
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: non-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-caller-session
  failure_modes:
    - disallowed-output
    - pii-leakage-via-llm
    - off-script-escalation-bypass
    - response-too-long-for-tts
    - wrong-tone-for-context
    - hallucinated-policy-commitment
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: contact-centre-supervisor
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - tts-synthesis
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  caller-audio-recording-consent: TO_BE_COMPLETED_BY_DEPLOYER

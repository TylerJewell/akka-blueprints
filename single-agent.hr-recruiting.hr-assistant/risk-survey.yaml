schema_version: 1
sample_id: hr-assistant

# ---- Purpose ----
purpose:
  primary_function: hr-policy-and-lookup-assistant
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: assist-only
  user_type: employee-self-service

# ---- Data ----
data:
  inputs:
    - employee-submitted-queries
    - employee-profile-records
    - seeded-policy-corpus
    - seeded-job-postings
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    special_category: true
    payment-card-data: false
    children-data: TO_BE_COMPLETED_BY_DEPLOYER
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true
  special_category_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: assist-only
  decision_subject: hr-policy-interpretation-or-job-lookup
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_answer_before_action: false
  hr_professional_reviews_escalated_queries: true

# ---- Failure ----
failure:
  blast_radius: single-employee-session
  failure_modes:
    - hallucinated-policy-citation
    - stale-policy-reference
    - pii-leakage-via-llm
    - special-category-leakage-via-llm
    - inapplicable-policy-cited
    - missing-citation-for-answer-claim
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: hr-professional
  escalation_trigger: employee-flags-answer-as-incorrect
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  employee_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  special_category_lawful_basis: TO_BE_COMPLETED_BY_DEPLOYER
  policy-corpus-origin-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

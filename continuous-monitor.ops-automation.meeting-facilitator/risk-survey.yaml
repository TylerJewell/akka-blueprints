schema_version: 1
sample_id: meeting-facilitator

# ---- Purpose ----
purpose:
  primary_function: ops-automation
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: auto-publish
  user_type: meeting-participant

# ---- Data ----
data:
  inputs:
    - meeting-transcripts
    - chat-threads
  data_classes:
    pii: true
    phi: TO_BE_COMPLETED_BY_DEPLOYER
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
    confidential-business-data: TO_BE_COMPLETED_BY_DEPLOYER
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: auto-publish
  decision_subject: meeting-participants
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: suppression-only-after-publication

# ---- Failure ----
failure:
  blast_radius: all-meeting-participants
  failure_modes:
    - pii-in-published-summary
    - confidential-detail-exposed-to-wrong-audience
    - missed-guardrail-on-policy-violating-content
    - notes-inaccuracy-from-truncated-transcript
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: meeting-organizer
  reviewer_must_approve_every_outgoing: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    # The simulated MeetingSessionQueue is in-process; replace with real transcript
    # ingestion when deploying to production.
  rate_limit_per_session: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: TO_BE_COMPLETED_BY_DEPLOYER
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  participant_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER

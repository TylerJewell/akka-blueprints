# Risk Survey for the instagram-post-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey
# is used to materialize a deployer Eval Matrix.

archetype:
  id: instagram-post-team-sample
  display_name: Sequential Instagram Post Team (Akka Sample)
  one_line_description: >
    A pipeline of agents turns one creative brief into an Instagram caption with
    hashtags and an image-generation prompt, running a brand and platform-policy
    check before the content is marked ready.
  scenario: |
    A marketer (or simulator) submits a creative brief. A caption agent writes a
    caption with hashtags and an image-prompt agent writes an image-generation
    prompt from the brief and caption. A before-agent-response guardrail checks each
    result for brand voice and platform policy. Content that passes is marked ready;
    content that fails is blocked with the reason recorded.

    There is no real external publishing target in this sample; the pipeline produces
    post content and stops at a ready or blocked state. The scenario is the canonical
    sequential-pipeline pattern in the sales-marketing domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


schema_version: 1
sample_id: spot-edge-agent

# ---- Purpose ----
purpose:
  primary_function: robot-mission-execution
  sector: industrial-robotics
  decisions_surface: autonomous-with-oversight
  user_type: robot-operator

# ---- Data ----
data:
  inputs:
    - mission-brief
    - waypoint-map
    - live-telemetry-stream
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: true     # robot GPS + facility map are location data
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  telemetry_stored_on_entity: true

# ---- Decisions ----
decisions:
  authority_level: autonomous-with-oversight
  decision_subject: robot-motion-command
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible   # most navigation is reversible; tipping / payload is not
  non_trivial_maneuvers_require_approval: true

# ---- Failure ----
failure:
  blast_radius: TO_BE_COMPLETED_BY_DEPLOYER   # depends on facility occupancy
  failure_modes:
    - physical-collision
    - joint-overload
    - forbidden-zone-entry
    - stale-waypoint-map
    - guardrail-bypass-via-prompt-injection
    - approval-timeout-default-reject
    - telemetry-polling-gap
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true     # approval gate for non-trivial maneuvers
  human_on_loop: true     # operator monitors live telemetry during execution
  reviewer_role: robot-operator
  automatic_halt_independent_of_agent: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - spot-mcp-navigate_to
    - spot-mcp-capture_image
    - spot-mcp-change_gait
    - spot-mcp-dock
    - spot-mcp-halt
  rate_limit_per_mission: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  facility-access-permissions-verified: TO_BE_COMPLETED_BY_DEPLOYER
  robot-safety-certification-in-scope: TO_BE_COMPLETED_BY_DEPLOYER

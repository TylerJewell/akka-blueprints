schema_version: 1
sample_id: sequential-pipeline-content-editorial-screenplay-writer-marketplace

# ---- Purpose ----
purpose:
  primary_function: screenplay-generation-pipeline
  sector: content-editorial
  decisions_surface: recommend-only
  user_type: author-or-content-producer

# ---- Data ----
data:
  inputs:
    - user-submitted-email-thread
    - user-submitted-plain-text
    - in-process-sample-corpus
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: screenplay-content
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  author_reviews_before_production: true

# ---- Failure ----
failure:
  blast_radius: single-screenplay
  failure_modes:
    - pii-in-output
    - missing-scene-coverage
    - delivery-blocked
    - evidence-thin-scene
    - placeholder-reconstruction
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: author-or-content-producer
  reviewer_must_approve_before_production: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - in-process-function-tools
  rate_limit_per_screenplay: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: sequential-pipeline

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  source-email-content-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

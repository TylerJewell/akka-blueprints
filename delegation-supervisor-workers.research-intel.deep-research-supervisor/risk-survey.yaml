# Risk Survey for the deep-research-supervisor Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: deep-research-supervisor-sample
  display_name: Deep Research Supervisor (Akka Sample)
  one_line_description: >
    A supervisor decomposes a research question into subqueries, delegates each to parallel
    search/extract/summarise workers, then synthesises a cited deep-research report.
  scenario: |
    A user (or simulator) submits a research question. A ResearchSupervisor decomposes it into
    2–4 subqueries. For each subquery, a SearchWorker retrieves raw passages, an ExtractionWorker
    distils key claims, and a SummaryWorker produces a cited per-subquery summary — the three
    worker steps run sequentially within a subquery but the subquery pipelines run in parallel.
    The ResearchSupervisor then merges all SubquerySummaries into a SynthesisedReport containing
    an executive summary and a citation list. An after-llm-response guardrail vets citation
    grounding before the report is surfaced; a periodic eval sampler scores synthesis quality.
    There is no real external search target in this sample — the corpus is modelled in-process.
    The scenario is the "delegation-supervisor-workers" pattern with a multi-stage worker
    pipeline in the research-intel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


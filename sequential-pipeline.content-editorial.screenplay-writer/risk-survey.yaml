# Risk Survey for the screenplay-writer Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: screenplay-writer-sample
  display_name: Sequential Screenplay Writer (Akka Sample)
  one_line_description: >
    A sequential pipeline that redacts personal data from a conversational thread,
    extracts characters and setting, drafts dialogue, and formats a screenplay.
  scenario: |
    A user (or simulator) submits a conversational thread — newsgroup posts or an
    email exchange. The workflow first runs a deterministic PII sanitizer over the
    raw text so no agent sees raw names or addresses. A ThreadAnalyzerAgent then
    extracts characters, setting, synopsis, and tone; a DialogueWriterAgent drafts
    scene dialogue; a ScreenplayFormatterAgent renders standard screenplay format
    and runs a final guardrail that blocks any output still carrying source
    personal data. The finished screenplay is persisted on a ScreenplayEntity and
    streamed to the UI. There is no external publishing target; output stays
    in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - biometric identification
    - frontier-scale training compute


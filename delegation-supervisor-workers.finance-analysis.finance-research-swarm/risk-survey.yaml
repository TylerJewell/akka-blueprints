# Risk Survey for the finance-research-swarm Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialise a deployer Eval Matrix.

archetype:
  id: finance-research-swarm-sample
  display_name: Finance Assistant Swarm Agent (Akka Sample)
  one_line_description: >
    A lead coordinator delegates ticker resolution, price analysis, news analysis, and
    fundamentals analysis to four specialist agents in parallel, then merges the results
    into one integrated stock report with an output guardrail and sector sanitizer.
  scenario: |
    A user (or simulator) submits a company name or ticker symbol. A ReportCoordinator
    decomposes the query, then a TickerResolver normalises it to a canonical ticker. With
    the resolved ticker, three specialist workers run in parallel: PriceAnalyst retrieves
    and interprets recent price data; NewsAnalyst retrieves and summarises recent
    headlines; FundamentalsAnalyst retrieves and interprets key fundamental metrics.
    The Coordinator merges all four outputs into an IntegratedReport. A sector sanitizer
    scrubs compliance phrases; an output guardrail vets numeric accuracy. The report is
    published or blocked. A periodic eval sampler scores the numeric accuracy of published
    reports. Market data tools are modelled in-process — no real exchange API is called in
    this sample. The scenario is the canonical "delegation-supervisor-workers" pattern in
    the finance-analysis domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute
    - autonomous trade execution


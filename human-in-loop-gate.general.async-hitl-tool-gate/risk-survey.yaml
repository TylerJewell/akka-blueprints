# Risk Survey for the async-hitl-tool-gate Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and should be filled before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: async-hitl-tool-gate-sample
  display_name: Async Human-in-loop Tool Gate (Akka Sample)
  one_line_description: >
    An async workflow where an agent plans a tool call, a human approves it, and a second
    agent runs the approved tool.
  scenario: |
    A user (or simulator) submits a request. An ActionAgent built on an LLM plans a single
    tool call with arguments and a rationale. The plan is persisted on an ActionEntity and
    the ApprovalWorkflow pauses in an awaitApproval state. A human reviewer reads the planned
    action in the UI and either approves or rejects it via REST. On approval, a before-tool-call
    guardrail confirms the status is APPROVED and the ExecutorAgent runs the simulated tool;
    the action transitions to EXECUTED. Planned actions left untouched for more than two
    minutes are escalated by a StuckActionMonitor TimedAction. The tool is simulated in-process;
    there is no real external side effect in this sample.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media generation
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


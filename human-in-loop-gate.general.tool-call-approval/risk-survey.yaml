# Risk Survey for the tool-call-approval Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: tool-call-approval-sample
  display_name: HITL Tool Approval (Akka Sample)
  one_line_description: >
    A general-purpose pipeline where an LLM selects and parameterizes a tool
    call, a human gates approval (with optional parameter edits), and a second
    agent executes the approved call.
  scenario: |
    A user submits a goal. PlannerAgent selects an appropriate tool and builds
    its call parameters. The plan is persisted on ToolRequestEntity and the
    ApprovalWorkflow pauses at an approval task. A human operator reads the
    planned tool name, parameters, and rationale in the UI and either approves
    (optionally editing the parameters), or rejects the call via REST. On
    approval, ExecutorAgent invokes a simulated tool with the approved parameters;
    the request transitions to EXECUTED and the output is displayed. There is no
    real external tool target; execution is simulated in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


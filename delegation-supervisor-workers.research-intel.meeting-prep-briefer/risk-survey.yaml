# Risk Survey for the meeting-prep-briefer Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers are
# TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: meeting-prep-briefer-sample
  display_name: Meeting Prep Briefer (Akka Sample)
  one_line_description: >
    A supervisor agent delegates research about meeting participants and topics to worker
    agents, which a composer assembles into a single briefing document.
  scenario: |
    A user (or simulator) submits a meeting topic and a participant list. A BriefingSupervisor
    agent plans the research subtasks. Worker agents research each participant and the topic
    against an in-process research source, with a before-tool-call guardrail restricting
    lookups to the named subjects. Each profile is PII-redacted before being stored on the
    BriefingEntity. A BriefingComposer assembles background, talking points, and questions
    into a briefing document that the UI streams over SSE. This is the canonical
    delegation-supervisor-workers pattern in the research-intel domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute

answers:
  # ---- Pre-filled by sample author ----

  sector.primary: ["business productivity", "research and intelligence workflow automation"]
  decisions.types: ["meeting preparation support"]
  decisions.automated: false

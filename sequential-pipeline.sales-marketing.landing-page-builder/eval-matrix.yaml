# Eval Matrix for the landing-page-builder Akka sample.
#
# Note on schema fit: framework/schema/control.schema.yaml requires regulation_anchors
# on each control. This is a community-content sample (sales-marketing domain) with no
# industry- or jurisdiction-bound anchors, so regulation_anchors is intentionally an empty
# list across all controls. Treat the requirement as relaxed for non-anchored samples.

schema_version: 1
sample_id: landing-page-builder
generated_at: 2026-06-28

matrix_cell:
  coordination_pattern: sequential-pipeline
  domain: sales-marketing

integration_tier: runs-out-of-the-box

controls:
  - id: G1
    name: Restrict the scrape tool to allowlisted, robots-permitted URLs
    mechanism:
      kind: guardrail
      hook: before-tool-call
      flavor: tool-permission
    enforcement: blocking
    rationale: >
      The template-selection stage fetches reference markup from external sites.
      Unbounded scraping risks hitting disallowed hosts or paths. The guardrail
      fires before the scrape tool runs and blocks any off-allowlist or
      robots-disallowed URL.
    implementation: >
      before-tool-call guardrail on TemplateSelector's scrape tool checks the
      target URL against an allowlist and a robots rule before the tool executes;
      a blocked call falls back to a canned source served by ScraperEndpoint.
    regulation_anchors: []

  - id: G2
    name: Sanitize generated markup before it is stored
    mechanism:
      kind: guardrail
      hook: before-agent-response
      flavor: llm-content-evaluation
    enforcement: blocking
    rationale: >
      Generated landing-page markup is public-facing. Script tags, inline event
      handlers, and external form actions in model output would ship unsafe markup.
      The guardrail strips them before the result is returned.
    implementation: >
      before-agent-response guardrail on CustomizationAgent removes <script>
      elements, on* attribute handlers, and external form actions from the
      generated html before the LandingPage result is persisted on PageEntity.
    regulation_anchors: []

  - id: A1
    name: Lint generated markup before a page is published
    mechanism:
      kind: ci-gate
      flavor: test-gate
    enforcement: build-gate
    rationale: >
      Markup that does not parse or is missing required structure should never
      reach the published list. A lint gate validates output before publication,
      and the Maven test phase is the deploy-time build gate.
    implementation: >
      GenerationWorkflow.validateStep runs the in-process HtmlValidator (balanced
      tags, no script, has <title>, non-empty body); on pass it calls
      PageEntity.publish, on fail PageEntity.reject. The Maven test phase plus an
      integration test driving the full pipeline form the deploy-time gate.
    regulation_anchors: []

simplified_view:
  - id: G1
    name: Scrape allowlist guard
    mechanism: "guardrail · before-tool-call"
    short: Block scrape of off-allowlist or robots-disallowed URLs.
  - id: G2
    name: Markup sanitizer
    mechanism: "guardrail · before-agent-response"
    short: Strip script/handlers/external actions before storing markup.
  - id: A1
    name: Markup lint gate
    mechanism: "ci-gate · test-gate"
    short: Lint output before publish; tests gate the deploy.

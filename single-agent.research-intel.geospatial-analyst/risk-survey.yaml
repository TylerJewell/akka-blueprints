schema_version: 1
sample_id: earth-engine-geospatial

# ---- Purpose ----
purpose:
  primary_function: geospatial-data-analysis
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: recommend-only
  user_type: researcher-or-analyst

# ---- Data ----
data:
  inputs:
    - spatial-bounding-region
    - indicator-definitions
    - satellite-derived-raster-snapshots
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: true
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  location_data_handled_by_bounds_check_before_assembly: true

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: geospatial-indicator-reading
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_report_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-analysis
  failure_modes:
    - hallucinated-anomaly
    - missed-indicator
    - false-alarm-fatigue
    - confidence-miscalibration
    - bounds-too-coarse-for-resolution
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: researcher-or-earth-observation-specialist
  reviewer_must_read_report_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_analysis: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  spatial-data-use-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

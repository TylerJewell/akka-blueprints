# Risk Survey for the investment-research-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and must be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: investment-research-team-sample
  display_name: Investment Research Multi-Agent (Akka Sample)
  one_line_description: >
    A coordinator delegates fundamental financial data gathering to an Equity Analyst and
    market-sentiment gathering to a Market Scout in parallel, then synthesises one investment
    research report with sector content validation.
  scenario: |
    A user (or simulator) submits a ticker symbol and a research question. A ReportCoordinator
    decomposes the request into a fundamental-data query and a sentiment query. An EquityAnalyst
    gathers financial fundamentals (earnings, ratios, guidance) and a MarketScout gathers
    market sentiment and price-action signals, running in parallel. The Coordinator merges both
    into a SynthesisedReport. A sector sanitizer vets the report for regulated investment
    content before it is published; a periodic eval sampler scores the synthesis for
    numeric-claim accuracy. There is no real external market data feed in this sample — the
    financial data tools are modelled in-process. The scenario is the canonical
    "delegation-supervisor-workers" pattern in the finance-analysis domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - synthetic media beyond text
    - frontier-scale training compute


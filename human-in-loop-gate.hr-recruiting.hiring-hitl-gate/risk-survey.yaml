# Risk Survey for the hiring-hitl-gate Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: hiring-hitl-gate-sample
  display_name: Human-in-the-Loop Hiring (Akka Sample)
  one_line_description: >
    A simulated hiring pipeline where AI agents propose a hiring decision and
    interview meeting, a human validator gates approval, and outcomes are
    recorded only after human sign-off.
  scenario: |
    A recruiter submits a candidate application with name and target role.
    HiringDecisionProposer evaluates the application and returns a hiring
    recommendation. MeetingProposer drafts an interview invitation with
    suggested time slots. Both proposals are persisted on ApplicationEntity
    and the HiringWorkflow pauses at a validator task. A human reviewer reads
    the proposals in the UI and either approves or declines via REST. On
    approval, the workflow records the outcome via DecisionsReachedService and
    the application transitions to DECIDED. There is no real external ATS
    integration; all writes are in-process.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation


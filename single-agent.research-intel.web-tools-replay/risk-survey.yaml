schema_version: 1
sample_id: web-tools-replay

# ---- Purpose ----
purpose:
  primary_function: research-query-with-replay-eval
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: informational-only
  user_type: research-analyst-or-developer

# ---- Data ----
data:
  inputs:
    - research-queries
    - web-search-tool-results
    - recorded-search-traces
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  traces_retained_for_replay: true

# ---- Decisions ----
decisions:
  authority_level: informational-only
  decision_subject: search-result-set
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_result_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-query-run
  failure_modes:
    - stale-result-set-without-alert
    - provider-api-unavailable
    - drift-false-positive-on-minor-ranking-change
    - replay-stub-mismatch-with-live-provider
    - trace-recording-gap-on-partial-agent-failure
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: research-analyst
  reviewer_must_review_drift_detected_runs: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - web-search-tool
    - llm-completion
  rate_limit_per_run: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  web-search-provider-terms-permit-automated-querying: TO_BE_COMPLETED_BY_DEPLOYER

schema_version: 1
sample_id: global-kyc-agent
coordination_pattern: sequential-pipeline
domain: legal-compliance

controls:
  - id: S1
    name: Sanitize PII fields before writing to the read model
    mechanism:
      kind: sanitizer
      hook: before-response
      flavor: pii
    enforcement: system-level
    rationale: |
      KYC processing ingests the most sensitive category of personal data an
      organisation can hold: full legal name, date of birth, and government-issued
      document numbers. Even if the entity event log is access-controlled, a leaking
      view layer — exposed to the UI, SSE stream, and any downstream consumer — would
      make that access control irrelevant. The sanitizer runs on the view-projection
      path, before any write to `KycView`, so the boundary is enforced structurally
      rather than by convention. A `SanitizerApplied` audit event is emitted for every
      projection write, giving the operator a countable, queryable record that PII
      containment actually fired — not just that it was configured to fire.
    implementation: |
      `PiiSanitizer` is a pure static utility invoked inside `KycView`'s table-updater
      before the `DocumentsCollected` event's payload is written to the view columns.
      `tokenizeName(fullName)` produces `"NAME-" + sha1(fullName).substring(0,8)`;
      `tokenizeDob(dateOfBirth)` produces `"DOB-" + sha1(dob).substring(0,8)`;
      `tokenizeDocNumber(documentNumber)` produces `"DOC-****-" + last4(documentNumber)`.
      Each token is stable across restarts (deterministic hash) so existing UI references
      remain consistent after a service restart. After writing the tokenised row,
      `KycCaseEntity.recordSanitizer(fieldsRedacted)` emits `SanitizerApplied` listing
      the three field names that were redacted. The entity event log retains the original
      `DocumentSet` under its own access control; the view, SSE stream, and UI never
      receive raw values.
    regulation_anchors: []

  - id: H1
    name: Hold adverse decisions for compliance officer review before finalising
    mechanism:
      kind: hitl
      hook: application
      flavor: application
    enforcement: blocking
    rationale: |
      A KYC DECLINE carries regulatory and reputational weight: it may deny a customer
      access to financial services and must be defensible under anti-money-laundering and
      customer due-diligence rules in every jurisdiction the pipeline serves. An automated
      agent reasoning over document verifications and rule checks is not an adequate final
      decision-maker for adverse outcomes in this context. The HITL gate ensures that
      every DECLINE (and every ambiguous REFER or PENDING_DOCUMENTS outcome) must be
      explicitly acknowledged by a named compliance officer before the case reaches a
      terminal state. The officer's identity, decision, and notes are recorded on the
      entity event log alongside the agent's reasoning, creating an auditable two-party
      record for each adverse outcome.
    implementation: |
      `KycPipelineWorkflow.decideStep` inspects the `KycDecision.outcome` returned by
      `KycAgent`. When outcome is `DECLINE`, `REFER`, or `PENDING_DOCUMENTS`, the step
      calls `HitlReviewGate.request(caseId)`, which writes `ReviewRequested` on
      `KycCaseEntity` (status → `PENDING_REVIEW`) and returns a workflow step effect
      that transitions to `reviewStep`. `reviewStep` calls the Akka workflow engine's
      `waitForInput()` and parks indefinitely. `KycEndpoint.submitReview(caseId,
      resolution)` validates the `ReviewResolution` payload (reviewerId, resolution enum,
      notes) and calls `componentClient.forWorkflow(...).input(resolution)` to resume.
      On receipt the workflow writes `ReviewResolved` (carrying the full `ReviewResolution`
      record including `reviewerId`) and advances to `evalStep`. A PASS outcome bypasses
      `reviewStep` entirely. The `reviewStep` has `maxRetries(0)` — no automatic retry
      of a human gate is permitted.
    regulation_anchors: []

  - id: E1
    name: Score every KYC decision for documentation completeness and rule citation validity
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      A syntactically valid `KycDecision` may still be evidentially weak: it might cite
      fewer jurisdiction rules than the minimum required for a defensible outcome, reference
      rule IDs that do not exist in the loaded rule registry, or render an outcome against a
      `VerificationResult` where no document was actually verified. These gaps do not cause
      the pipeline to error — the agent produced a well-typed result — but they represent
      exactly the failure modes a compliance audit would flag. The on-decision evaluator
      surfaces these patterns immediately, scoring every decision before it reaches
      `EVALUATED`, so the compliance officer can inspect flagged cases without waiting for
      a periodic batch audit. Score ≤ 2 triggers a visible flag in the UI and signals that
      the case needs manual re-review regardless of the HITL outcome.
    implementation: |
      `DecisionScorer` runs inside `KycPipelineWorkflow.evalStep`, fired immediately after
      `DecisionRendered` (or `ReviewResolved`) lands. The scorer is deterministic and
      rule-based — no LLM call. Four checks, one point per check satisfied, on a base of 1:
      (1) rule citation coverage — `KycDecision.citedRuleIds.size() >= 2`;
      (2) rule ID validity — every `citedRuleId` exists in
      `DocumentSet.applicableRules[].ruleId` (no phantom rule references);
      (3) document verification — at least one `DocumentVerification` in
      `VerificationResult.documentVerifications` has `status == VERIFIED`;
      (4) outcome validity — `KycDecision.outcome` is one of the four valid
      `KycOutcome` enum values. Emits `DecisionEvaluated{score: 1-5, rationale: String}`
      with a one-sentence rationale naming the lowest-ordinal failing check. The score is
      surfaced on the App UI tab; cases with score ≤ 2 have their card border highlighted
      in red and a flag icon added to the live-list entry.
    regulation_anchors: []

simplified_view:
  - id: S1
    label: PII sanitizer on view projection
    mechanism: Sanitizer
    implementation: before-response (pii)
    source: —
  - id: H1
    label: Compliance officer review gate for adverse outcomes
    mechanism: HITL
    implementation: application (workflow pause)
    source: —
  - id: E1
    label: Decision completeness and rule-citation eval
    mechanism: Eval · event

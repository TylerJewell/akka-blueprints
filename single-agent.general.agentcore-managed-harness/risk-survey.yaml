schema_version: 1
sample_id: managed-harness-tool-use-agent

# ---- Purpose ----
purpose:
  primary_function: operations-question-answering
  sector: operations
  decisions_surface: recommend-only
  user_type: operations-engineer-or-analyst

# ---- Data ----
data:
  inputs:
    - natural-language-questions
    - agent-profile-selection
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  tool_outputs_contain_sensitive_infra_data: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: recommend-only
  decision_subject: operations-question
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  reviewer_reads_every_answer_before_action: true

# ---- Failure ----
failure:
  blast_radius: single-query
  failure_modes:
    - disallowed-tool-invocation
    - hallucinated-tool-output
    - argument-injection
    - runaway-tool-loop
    - stale-data-in-stub
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: true
  human_on_loop: false
  reviewer_role: operations-engineer
  reviewer_must_read_answer_before_action: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_query: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent
  max_tool_iterations_per_task: 8

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  tool-output-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

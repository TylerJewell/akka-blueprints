schema_version: 1
sample_id: sandboxed-code-agent

# ---- Purpose ----
purpose:
  primary_function: sandboxed-code-execution
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: fully-autonomous
  user_type: developer-or-data-scientist

# ---- Data ----
data:
  inputs:
    - task-description-text
    - generated-python-source
  data_classes:
    pii: false
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  code_screened_before_execution: true

# ---- Decisions ----
decisions:
  authority_level: fully-autonomous
  decision_subject: generated-code-execution
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: irreversible-per-run
  reviewer_reads_every_result_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-sandbox-process
  failure_modes:
    - malicious-code-generation
    - sandbox-escape
    - resource-exhaustion
    - env-secret-harvest
    - path-traversal
    - infinite-loop
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: platform-operator
  operator_monitors_live_list: true
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - sandbox-process-execution
  sandbox_backends_supported:
    - docker
    - e2b
    - modal
    - playwright
  rate_limit_per_execution: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  sandbox_network_isolation_enforced: true
  sandbox_filesystem_isolation_enforced: true

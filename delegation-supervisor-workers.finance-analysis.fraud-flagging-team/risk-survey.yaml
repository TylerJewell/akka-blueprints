# Risk Survey for the fraud-flagging-team Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: fraud-flagging-team-sample
  display_name: Delegation Supervisor-Workers Fraud Flagging Team (Akka Sample)
  one_line_description: >
    A supervisor agent delegates a customer transaction to fraud-scoring,
    compliance, and risk-assessment workers, synthesizes a fraud verdict, and
    pauses for a human analyst to confirm before any account action runs.
  scenario: |
    A transaction (customer id, amount, reference, memo) arrives from an analyst
    or a background feed. FraudReviewWorkflow delegates it to three worker agents
    in parallel: a fraud-scoring worker, a compliance worker, and a per-customer
    risk-assessment worker. A SupervisorAgent synthesizes their typed outputs into
    a verdict. The case is flagged or cleared. A flagged case pauses for a human
    analyst, who confirms or dismisses it. On confirmation a before-tool-call
    guardrail allows the in-process account-action tool to run. Flagged cases left
    untouched past the review window are escalated. There is no real banking
    backend in this sample; the account action is in-process.

  primary_regulations: []  # sample is not jurisdiction-bound; deployer anchors these

  explicitly_not_applicable:
    - synthetic media generation
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - biometric identification
    - real-time access to a live banking core


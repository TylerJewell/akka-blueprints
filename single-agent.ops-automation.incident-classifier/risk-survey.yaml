schema_version: 1
sample_id: incident-classifier

# ---- Purpose ----
purpose:
  primary_function: it-incident-routing
  sector: TO_BE_COMPLETED_BY_DEPLOYER
  decisions_surface: automated-with-override
  user_type: it-operations-staff

# ---- Data ----
data:
  inputs:
    - incident-short-description
    - incident-long-description
    - caller-id
    - priority-hint
  data_classes:
    pii: TO_BE_COMPLETED_BY_DEPLOYER
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  incident-descriptions-may-contain-pii: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Decisions ----
decisions:
  authority_level: automated-with-override
  decision_subject: it-incident-record
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: fully-reversible
  human_override_path: ops-staff-can-reclassify-before-routing

# ---- Failure ----
failure:
  blast_radius: single-incident-record
  failure_modes:
    - wrong-category
    - wrong-subcategory
    - unknown-ci
    - accuracy-drift
    - stale-taxonomy
    - misrouted-high-priority-incident
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: it-operations-manager
  override_window_minutes: TO_BE_COMPLETED_BY_DEPLOYER
  audit_frequency: daily

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
  rate_limit_per_incident: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  incident-data-permitted-for-ai-processing: TO_BE_COMPLETED_BY_DEPLOYER

# Risk Survey for the helloworld Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific
# answers are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this
# survey is used to materialize a deployer Eval Matrix.

archetype:
  id: helloworld-sample
  display_name: Single-Agent Question Answerer (Akka Sample)
  one_line_description: >
    A single LLM-backed agent answers one user question and returns a typed
    answer with a confidence score; an output check screens the answer.
  scenario: |
    A user submits a question. A single QuestionAnswerer agent runs one ANSWER
    task and returns a typed Answer with a confidence score. Before the answer
    is shown, a before-agent-response check screens it: low-confidence or empty
    answers are blocked. There is no coordination, no tool use, and no second
    agent. The scenario is the minimum-viable single-agent pattern in the
    general domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - frontier-scale training compute


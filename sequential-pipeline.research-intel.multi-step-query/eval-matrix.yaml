schema_version: 1
sample_id: multi-step-query-engine
coordination_pattern: sequential-pipeline
domain: research-intel

controls:
  - id: E1
    name: Score every emitted answer for evidence coverage and stopping-criterion satisfaction
    mechanism:
      kind: eval-event
      flavor: on-decision-eval
    enforcement: non-blocking
    rationale: |
      A research-intelligence pipeline that chains decomposition тЖТ retrieval тЖТ
      synthesis carries a specific failure mode: the synthesized answer may cite
      passages that were never retrieved, assign a confidence level that
      overstates the actual evidence density, or collapse multiple sub-questions
      into a single section without acknowledgement. None of these failures block
      the pipeline from completing тАФ they are output-quality failures, not
      control-flow failures. An on-decision evaluator fires after every
      `AnswerSynthesized` event and provides an immediate, deterministic quality
      signal the reader can act on before the answer is used in downstream
      research decisions. The score is non-blocking: a score of 1 surfaces the
      gap; it does not discard the answer or re-run the query.
    implementation: |
      `StoppingEvaluator` runs inside `QueryPipelineWorkflow.evalStep`, fired
      immediately after `AnswerSynthesized` lands. The evaluator is deterministic
      and rule-based (no LLM call тАФ keeping the single-agent sequential-pipeline
      invariant intact). Four checks, one point per check satisfied, on a base
      of 1:
      (1) sub-question coverage тАФ every `DecomposedQuestion.subQuestions[i]` has
      at least one `Passage` in `EvidenceSet.passages` whose `subQuestionId`
      matches (`subQuestion.subQuestionId`).
      (2) citation provenance тАФ every `passageId` appearing in any
      `AnswerSection.citedPassageIds` must be present in
      `EvidenceSet.passages[].passageId` (no hallucinated citations).
      (3) confidence calibration тАФ `QueryAnswer.confidence == HIGH` requires
      тЙе 2 passages per sub-question; `MEDIUM` requires тЙе 1; `LOW` or
      `INSUFFICIENT` are always self-consistent.
      (4) section parity тАФ `answer.sections.size() == decomposition.subQuestions
      .size()` (no silent expansion or collapse of sub-questions).
      Emits `AnswerEvaluated{score: 1-5, rationale: String}` with a rationale
      sentence naming the largest gap. The score is surfaced on the App UI tab;
      answers with score тЙд 2 are flagged for researcher review.
    regulation_anchors: []

simplified_view:
  - id: E1
    label: Answer quality eval
    mechanism: Eval ┬╖ event
    implementation: on-decision-eval
    source: тАФ

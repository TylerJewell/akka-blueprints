schema_version: 1
sample_id: sdr-lead-nurture

# ---- Purpose ----
purpose:
  primary_function: lead-nurture-and-meeting-booking
  sector: sales-marketing
  decisions_surface: autonomous-with-tool-calls
  user_type: inbound-prospect

# ---- Data ----
data:
  inputs:
    - inbound-lead-contact-record
    - lead-initial-message
    - subsequent-conversation-turns
  data_classes:
    pii: true
    phi: false
    payment-card-data: false
    children-data: false
    biometric: false
    location-fine-grained: false
  data_retention_days: TO_BE_COMPLETED_BY_DEPLOYER
  data_residency: TO_BE_COMPLETED_BY_DEPLOYER
  pii_handled_by_sanitizer_before_llm: true

# ---- Decisions ----
decisions:
  authority_level: autonomous-with-guardrails
  decision_subject: outbound-message-and-calendar-booking
  decisions_per_day: TO_BE_COMPLETED_BY_DEPLOYER
  reversibility: partially-reversible
  reviewer_reads_every_verdict_before_action: false

# ---- Failure ----
failure:
  blast_radius: single-lead-conversation
  failure_modes:
    - brand-unsafe-message-sent
    - meeting-booked-outside-business-hours
    - crm-field-set-to-invalid-value
    - pii-leakage-via-llm
    - premature-close-push
    - lead-incorrectly-dismissed
  acceptable_downtime_minutes: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Oversight ----
oversight:
  human_in_loop: false
  human_on_loop: true
  reviewer_role: account-executive-or-sales-ops
  reviewer_must_read_verdict_before_action: false
  audit_frequency: TO_BE_COMPLETED_BY_DEPLOYER

# ---- Operations ----
operations:
  model_family: TO_BE_COMPLETED_BY_DEPLOYER
  model_version_pinned: false
  external_tool_calls:
    - llm-completion
    - calendar-booking-stub
    - crm-status-update
  rate_limit_per_lead: TO_BE_COMPLETED_BY_DEPLOYER
  agent_count: 1
  agent_pattern: single-agent

# ---- Compliance ----
compliance:
  capabilities:
    predictive-policing: false
    mass-surveillance: false
    emotion-recognition-in-workplace: false
    real-time-biometric-id: false
    social-scoring: false
    untargeted-image-scraping: false
    political-microtargeting: false
  jurisdictions_in_scope: TO_BE_COMPLETED_BY_DEPLOYER
  data-protection-officer_assigned: TO_BE_COMPLETED_BY_DEPLOYER
  customer_consent_to_ai_processing: TO_BE_COMPLETED_BY_DEPLOYER
  can-spam-or-equivalent-compliance: TO_BE_COMPLETED_BY_DEPLOYER
  gdpr-lawful-basis-for-processing: TO_BE_COMPLETED_BY_DEPLOYER

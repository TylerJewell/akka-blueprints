# Risk Survey for the book-writer-fanout Akka sample.
#
# Pre-filled answers reflect what the sample's surface implies. Deployer-specific answers
# are TO_BE_COMPLETED_BY_DEPLOYER and should be filled in before this survey is used to
# materialize a deployer Eval Matrix.

archetype:
  id: book-writer-fanout-sample
  display_name: Composite Multi-Team Book Writer (Akka Sample)
  one_line_description: >
    A simulated long-form authoring pipeline where one agent plans a book outline, a fresh
    writing pass drafts each chapter, and a final step consolidates them into one manuscript.
  scenario: |
    A user (or simulator) submits a book topic. An OutlineAgent built on an LLM produces a
    titled chapter plan. For each planned chapter the BookWritingWorkflow runs a fresh
    ChapterAgent pass, which may call an in-process, guarded web-search tool for on-topic
    lookups. Each drafted chapter is scored by an out-of-band eval. A consolidation step
    asserts every chapter is present and non-empty, then joins them into one manuscript and
    marks the book complete. There is no real external publishing or search target; both are
    modeled in-process. The scenario is the canonical composite-multi-team pattern in the
    content-editorial domain.

  primary_regulations: []  # community sample, no jurisdiction-bound anchors

  explicitly_not_applicable:
    - synthetic media beyond text
    - clinical decision support
    - judicial process
    - employment decisions
    - children data (unless deployer configures otherwise)
    - predictive policing
    - mass surveillance
    - autonomous lethal targeting
    - behavioral manipulation
    - the EU voluntary Code of Practice for general-purpose AI (not signed unless deployer signs it)
    - frontier-scale training compute

